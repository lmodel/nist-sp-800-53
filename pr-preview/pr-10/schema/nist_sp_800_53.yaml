name: NIST-SP-800-53
description: 'Electronic (LinkML) Version of NIST SP 800-53 Rev 5 Controls and SP
  800-53A Rev 5 Assessment Procedures '
source: https://doi.org/10.6028/NIST.SP.800-53r5
id: https://w3id.org/lmodel/nist-sp-800-53
version: 5.2.0
imports:
- linkml:types
license: https://creativecommons.org/publicdomain/zero/1.0/
prefixes:
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  nist_sp_800_53:
    prefix_prefix: nist_sp_800_53
    prefix_reference: https://w3id.org/lmodel/nist-sp-800-53/
  oscal_catalog:
    prefix_prefix: oscal_catalog
    prefix_reference: https://w3id.org/lmodel/oscal_catalog/
  oscal_profile:
    prefix_prefix: oscal_profile
    prefix_reference: https://w3id.org/lmodel/oscal_profile/
default_prefix: nist_sp_800_53
default_range: string
subsets:
  nist_sp_800_53r5_catalog:
    name: nist_sp_800_53r5_catalog
    definition_uri: https://w3id.org/lmodel/nist-sp-800-53/NistSp80053r5Catalog
    description: NIST SP 800-53 Rev 5 catalog subset for controls and assessment procedures
    from_schema: https://w3id.org/lmodel/nist-sp-800-53
  nist_sp_800_53r5_profile:
    name: nist_sp_800_53r5_profile
    definition_uri: https://w3id.org/lmodel/nist-sp-800-53/NistSp80053r5Profile
    description: NIST SP 800-53 Rev 5 profile subset for baselines and overlays
    from_schema: https://w3id.org/lmodel/nist-sp-800-53
  nist_sp_800_53r4_catalog:
    name: nist_sp_800_53r4_catalog
    definition_uri: https://w3id.org/lmodel/nist-sp-800-53/NistSp80053r4Catalog
    description: NIST SP 800-53 Rev 4 backward-compatibility subset for catalog elements
      present in OSCAL 1.2.x representations but removed in Rev 5 (e.g. depends-on
      parameter dependency)
    from_schema: https://w3id.org/lmodel/nist-sp-800-53
  nist_sp_800_53r5_cprt:
    name: nist_sp_800_53r5_cprt
    definition_uri: https://w3id.org/lmodel/nist-sp-800-53/NistSp80053r5Cprt
    description: NIST CPRT (Cybersecurity and Privacy Reference Tool) export subset
      covering SP 800-53, SP 800-53A, and SP 800-53B element and relationship data
    from_schema: https://w3id.org/lmodel/nist-sp-800-53
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string. If you are authoring schemas in LinkML YAML, the type is referenced
      with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  CatalogElementClassValue:
    name: CatalogElementClassValue
    definition_uri: https://w3id.org/lmodel/nist-sp-800-53/CatalogElementClassValue
    description: Allowed values for element-level class values
    in_subset:
    - nist_sp_800_53r5_catalog
    from_schema: https://w3id.org/lmodel/nist-sp-800-53
    permissible_values:
      family:
        text: family
      SP800-53:
        text: SP800-53
      SP800-53-enhancement:
        text: SP800-53-enhancement
      assessment-objective:
        text: assessment-objective
  CatalogPropertyClassValue:
    name: CatalogPropertyClassValue
    definition_uri: https://w3id.org/lmodel/nist-sp-800-53/CatalogPropertyClassValue
    description: Allowed values for property-level class values
    in_subset:
    - nist_sp_800_53r5_catalog
    from_schema: https://w3id.org/lmodel/nist-sp-800-53
    permissible_values:
      sp800-53:
        text: sp800-53
      sp800-53a:
        text: sp800-53a
      zero-padded:
        text: zero-padded
  CPRTElementTypeValue:
    name: CPRTElementTypeValue
    definition_uri: https://w3id.org/lmodel/nist-sp-800-53/CPRTElementTypeValue
    description: Allowed element_type values in NIST CPRT export data
    in_subset:
    - nist_sp_800_53r5_cprt
    from_schema: https://w3id.org/lmodel/nist-sp-800-53
    permissible_values:
      family:
        text: family
        description: SP 800-53 control family (e.g. AC, AU)
      control:
        text: control
        description: Top-level security or privacy control (e.g. AC-1)
      control_enhancement:
        text: control_enhancement
        description: Control enhancement (e.g. AC-1(1))
      control_statement:
        text: control_statement
        description: Normative control statement text
      discussion:
        text: discussion
        description: Non-normative discussion text for a control
      odp:
        text: odp
        description: Organization-Defined Parameter
      odp_type:
        text: odp_type
        description: ODP category (e.g. assignment, selection)
      odp_statement:
        text: odp_statement
        description: Full ODP statement text
      examine:
        text: examine
        description: SP 800-53A Examine assessment objective
      interview:
        text: interview
        description: SP 800-53A Interview assessment objective
      test:
        text: test
        description: SP 800-53A Test assessment objective
      determination:
        text: determination
        description: Assessment determination criterion
      withdraw_reason:
        text: withdraw_reason
        description: Reason a control was withdrawn from SP 800-53
      reference:
        text: reference
        description: Informational reference to an external publication
      security_baseline:
        text: security_baseline
        description: Security baseline designation (LOW / MODERATE / HIGH / NOT SELECTED)
      privacy_baseline:
        text: privacy_baseline
        description: Privacy baseline designation (P-HIGH / NOT SELECTED)
      sort:
        text: sort
        description: Sort-order key for display purposes
      control_name_sort:
        text: control_name_sort
        description: Sort-order key for control name ordering
  CPRTRelationshipTypeValue:
    name: CPRTRelationshipTypeValue
    definition_uri: https://w3id.org/lmodel/nist-sp-800-53/CPRTRelationshipTypeValue
    description: Relationship type identifiers used in NIST CPRT export data
    in_subset:
    - nist_sp_800_53r5_cprt
    from_schema: https://w3id.org/lmodel/nist-sp-800-53
    permissible_values:
      projection:
        text: projection
        description: Represents a relationship between two elements
      related:
        text: related
        description: Denotes where a control is related to another control
      incorporated_into:
        text: incorporated_into
        description: Denotes where a withdrawn control was incorporated into another
      moved_to:
        text: moved_to
        description: Denotes where a withdrawn control was moved to

id: https://w3id.org/lmodel/nist-sp-800-53r5/catalog
name: NIST-SP-800-53
description: >-
  Electronic (OSCAL) Version of NIST SP 800-53 Rev 5.2.0 Controls and SP
  800-53A Rev 5.2.0 Assessment Procedures
version: 5.2.0
source: https://doi.org/10.6028/NIST.SP.800-53r5
annotations:
  uuid: 5ba2a3ba-1aa2-47d8-ad69-5beef7372b98
  last-modified: "2025-08-26T14:33:16.00000-00:00"

default_prefix: catalog
default_range: string

prefixes:
  linkml: https://w3id.org/linkml/
  catalog: https://w3id.org/lmodel/nist-sp-800-53/catalog/

types:
  string:
    description: A character string
    uri: xsd:string
    base: str

slots:
  catalog:
    description: Root catalog payload
    range: CatalogBody
    inlined: true

  groups:
    description: List of control groups in the catalog
    range: ControlGroup
    multivalued: true
    inlined: true
    inlined_as_list: true

  metadata:
    description: Catalog metadata
    range: Metadata
    inlined: true

  "back-matter":
    description: Back-matter references and resources
    range: BackMatter
    inlined: true

  controls:
    description: List of controls in a group
    range: Control
    multivalued: true
    inlined: true
    inlined_as_list: true

  params:
    description: List of parameters for a control
    range: Parameter
    multivalued: true
    inlined: true
    inlined_as_list: true

  props:
    description: List of properties
    range: Property
    multivalued: true
    inlined: true
    inlined_as_list: true

  guidelines:
    description: List of guidelines
    range: Guideline
    multivalued: true
    inlined: true
    inlined_as_list: true

  links:
    description: List of links and relationships
    range: Link
    multivalued: true
    inlined: true
    inlined_as_list: true

  parts:
    description: Nested parts that provide prose and structure
    range: Part
    multivalued: true
    inlined: true
    inlined_as_list: true

  select:
    description: Selection parameters for a parameter definition
    range: Selection
    inlined: true

  id:
    description: Unique identifier for an element
    # removed identifier/requires for elements like Parts that don't require unique identifiers

  uuid:
    description: UUID for a metadata or resource element

  title:
    description: Human-readable title

  version:
    description: Version identifier

  "last-modified":
    description: Last modification timestamp

  "oscal-version":
    description: OSCAL version identifier

  "class":
    description: Classification of a catalog element or property

  label:
    description: Human-readable label

  name:
    description: Name of a property or part

  value:
    description: Property value

  ns:
    description: Namespace URI for a property

  prose:
    description: Free-text prose content

  #### Additional slots for metadata and back-matter elements
  remarks:
    description: Supplemental remarks

  revisions:
    description: Metadata revisions
    range: Revision
    multivalued: true
    inlined: true
    inlined_as_list: true

  roles:
    description: Roles used in metadata
    range: Role
    multivalued: true
    inlined: true
    inlined_as_list: true

  parties:
    description: Parties used in metadata
    range: Party
    multivalued: true
    inlined: true
    inlined_as_list: true

  "responsible-parties":
    description: Responsible party assignments
    range: ResponsibleParty
    multivalued: true
    inlined: true
    inlined_as_list: true

  "role-id":
    description: Assigned role identifier

  "party-uuids":
    description: Referenced party UUIDs
    multivalued: true

  type:
    description: Party type

  "short-name":
    description: Short display name

  "email-addresses":
    description: Party email addresses
    multivalued: true

  addresses:
    description: Postal addresses
    range: Address
    multivalued: true
    inlined: true
    inlined_as_list: true

  "addr-lines":
    description: Address lines
    multivalued: true

  city:
    description: City name

  state:
    description: State or region

  "postal-code":
    description: Postal code

  
  # Additional slots for selection criteria and resource references

  "how-many":
    description: How many selections are allowed

  choice:
    description: List of selection options
    multivalued: true

  href:
    description: Link reference target

  rel:
    description: Relationship type for a link

  # Additional slots for back-matter resources and citations
  
  resources:
    description: Back-matter resources
    range: Resource
    multivalued: true
    inlined: true
    inlined_as_list: true

  citation:
    description: Citation details for a resource
    range: Citation
    inlined: true

  text:
    description: Citation text

  rlinks:
    description: Resource links
    range: ResourceLink
    multivalued: true
    inlined: true
    inlined_as_list: true

  "media-type":
    description: Media type for a resource link

enums:
  CatalogElementClassValue:
    description: Allowed values for element-level class values
    permissible_values:
      family:
      SP800-53:
      SP800-53-enhancement:

  CatalogPropertyClassValue:
    description: Allowed values for property-level class values
    permissible_values:
      sp800-53:
      sp800-53a:
      zero-padded:

classes:
  Catalog:
    description: Top-level wrapper that mirrors the OSCAL YAML shape
    tree_root: true
    slots:
      - catalog

  # Base classes for catalog elements and properties

  CatalogBody:
    description: Main catalog object
    class_uri: linkml:Any
    slots:
      - uuid
      - metadata
      - groups
      - "back-matter"

  Metadata:
    description: OSCAL metadata section
    class_uri: linkml:Any
    slots:
      - title
      - "last-modified"
      - version
      - "oscal-version"
      - revisions
      - props
      - links
      - roles
      - parties
      - "responsible-parties"
      - remarks

  Revision:
    description: Metadata revision entry
    class_uri: linkml:Any
    slots:
      - title
      - "last-modified"
      - version
      - "oscal-version"
      - links
      - remarks

  Role:
    description: Role definition
    slots:
      - id
      - title

  Party:
    description: Party definition
    class_uri: linkml:Any
    slots:
      - uuid
      - type
      - name
      - "short-name"
      - "email-addresses"
      - addresses

  Address:
    description: Postal address
    class_uri: linkml:Any
    slots:
      - "addr-lines"
      - city
      - state
      - "postal-code"

  ResponsibleParty:
    description: Assignment of parties to a role
    class_uri: linkml:Any
    slots:
      - "role-id"
      - "party-uuids"

  BackMatter:
    description: OSCAL back-matter section
    class_uri: linkml:Any
    slots:
      - resources

  Resource:
    description: Referenced resource
    class_uri: linkml:Any
    slots:
      - uuid
      - title
      - citation
      - rlinks

  Citation:
    description: Citation wrapper
    class_uri: linkml:Any
    slots:
      - text

  ResourceLink:
    description: Reference link for a resource
    class_uri: linkml:Any
    slots:
      - href
      - "media-type"

  # Base classes for catalog elements and properties
  
  CatalogElement:
    description: Base class for catalog elements
    abstract: true
    slots:
      - id
      - props
      - links
      - parts

  IdentifiedElement:
    description: A catalog element with required id and optional title/class
    is_a: CatalogElement
    slots:
      - title
      - "class"
      - label
    slot_usage:
      class:
        range: CatalogElementClassValue

  ControlGroup:
    description: A group of controls (family)
    is_a: IdentifiedElement
    slots:
      - controls

  Control:
    description: A security control
    is_a: IdentifiedElement
    slots:
      - params
      - controls
    slot_usage:
      controls:
        range: ControlEnhancement

  ControlEnhancement:
    description: An enhancement to a control
    is_a: IdentifiedElement
    slots:
      - params
      - controls
    slot_usage:
      controls:
        range: ControlEnhancement

  Parameter:
    description: A configurable parameter used by a control
    is_a: IdentifiedElement
    slots:
      - guidelines
      - select

  Guideline:
    description: Additional prose guidance associated with a parameter
    slots:
      - prose

  Property:
    description: A name-value property with optional namespace and class attributes
    slots:
      - name
      - value
      - ns
      - "class"
    slot_usage:
      class:
        range: CatalogPropertyClassValue

  Selection:
    description: Selection criteria for a parameter
    class_uri: linkml:Any
    slots:
      - "how-many"
      - choice

  Link:
    description: Relationship link
    slots:
      - href
      - rel

  Part:
    description: Structured narrative part that can contain nested parts
    is_a: IdentifiedElement
    slots:
      - name
      - prose

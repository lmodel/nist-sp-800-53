    exact_mappings: [oscal_profile:alters]
  adds:
    description: Parts, parameters, or properties added to a control by an alteration
    range: ProfileAdd
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
    - nist_sp_800_53r5_profile

    exact_mappings: [oscal_profile:adds]
  "param-id":
    description: Identifier of the parameter to be set
    aliases:

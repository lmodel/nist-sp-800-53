  revisions:
    description: Metadata revisions
    range: Revision
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
    - nist_sp_800_53r5_catalog

    exact_mappings: [oscal_catalog:revisions]
  roles:

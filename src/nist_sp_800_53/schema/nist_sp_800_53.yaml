    range: CPRTResponse
    inlined: true
    in_subset:
    - nist_sp_800_53r5_cprt

enums:
  CatalogElementClassValue:
    description: Allowed values for element-level class values
    permissible_values:
      family:
      SP800-53:
      SP800-53-enhancement:
      assessment-objective:
    in_subset:
    - nist_sp_800_53r5_catalog

  CatalogPropertyClassValue:
    description: Allowed values for property-level class values
    permissible_values:
      sp800-53:
      sp800-53a:
      zero-padded:
    in_subset:
    - nist_sp_800_53r5_catalog

  CPRTElementTypeValue:
    description: Allowed element_type values in NIST CPRT export data
    in_subset:
    - nist_sp_800_53r5_cprt
    permissible_values:
      family:
        description: SP 800-53 control family (e.g. AC, AU)
      control:
        description: Top-level security or privacy control (e.g. AC-1)
      control_enhancement:
        description: Control enhancement (e.g. AC-1(1))
      control_statement:
        description: Normative control statement text
      discussion:
        description: Non-normative discussion text for a control
      odp:
        description: Organization-Defined Parameter
      odp_type:
        description: ODP category (e.g. assignment, selection)
      odp_statement:
        description: Full ODP statement text
      examine:
        description: SP 800-53A Examine assessment objective
      interview:
        description: SP 800-53A Interview assessment objective
      test:
        description: SP 800-53A Test assessment objective
      determination:
        description: Assessment determination criterion
      withdraw_reason:
        description: Reason a control was withdrawn from SP 800-53
      reference:
        description: Informational reference to an external publication
      security_baseline:
        description: Security baseline designation (LOW / MODERATE / HIGH / NOT SELECTED)
      privacy_baseline:
        description: Privacy baseline designation (P-HIGH / NOT SELECTED)
      sort:
        description: Sort-order key for display purposes
      control_name_sort:
        description: Sort-order key for control name ordering

  CPRTRelationshipTypeValue:
    description: Relationship type identifiers used in NIST CPRT export data
    in_subset:
    - nist_sp_800_53r5_cprt
    permissible_values:
      projection:
        description: Represents a relationship between two elements
      related:
        description: Denotes where a control is related to another control
      incorporated_into:
        description: Denotes where a withdrawn control was incorporated into another
      moved_to:
        description: Denotes where a withdrawn control was moved to

classes:
  SP80053Document:
    description: Unified root wrapper for catalog, profile, or CPRT content
    tree_root: true
    class_uri: linkml:Any
    slots:
    - catalog
    - profile
    - response
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile
    - nist_sp_800_53r5_cprt

  Catalog:
    description: Top-level wrapper that mirrors OSCAL catalog shape
    close_mappings:
    - oscal_catalog:CatalogDocument
    slots:
    - catalog
    in_subset:
    - nist_sp_800_53r5_catalog

  ProfileDocument:
    description: Top-level wrapper for OSCAL profile files
    exact_mappings:
    - oscal_profile:ProfileDocument
    slots:
    - profile
    in_subset:
    - nist_sp_800_53r5_profile

  CatalogBody:
    description: Main catalog object
    exact_mappings:
    - oscal_catalog:Catalog
    class_uri: linkml:Any
    slots:
    - uuid
    - metadata
    - groups
    - "back-matter"
    in_subset:
    - nist_sp_800_53r5_catalog

  ProfileBody:
    description: OSCAL profile body
    exact_mappings:
    - oscal_profile:Profile
    class_uri: linkml:Any
    slots:
    - uuid
    - metadata
    - imports
    - merge
    - modify
    - "back-matter"
    in_subset:
    - nist_sp_800_53r5_profile

  Metadata:
    description: OSCAL metadata section used in catalogs and profiles
    close_mappings:
    - oscal_catalog:Metadata
    class_uri: linkml:Any
    slots:
    - title
    - "last-modified"
    - version
    - "oscal-version"
    - revisions
    - props
    - links
    - roles
    - parties
    - "responsible-parties"
    - remarks
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile

  Revision:
    description: Metadata revision entry
    close_mappings:
    - oscal_catalog:Revision
    class_uri: linkml:Any
    slots:
    - title
    - "last-modified"
    - version
    - "oscal-version"
    - links
    - remarks
    in_subset:
    - nist_sp_800_53r5_catalog

  Role:
    description: Role definition
    close_mappings:
    - oscal_catalog:Role
    slots:
    - id
    - title
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile

  Party:
    description: Party definition
    close_mappings:
    - oscal_catalog:Party
    class_uri: linkml:Any
    slots:
    - uuid
    - type
    - name
    - "short-name"
    - "email-addresses"
    - addresses
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile

  Address:
    description: Postal address
    close_mappings:
    - oscal_catalog:Address
    class_uri: linkml:Any
    slots:
    - "addr-lines"
    - city
    - state
    - "postal-code"
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile

  ResponsibleParty:
    description: Assignment of parties to a role
    exact_mappings:
    - oscal_catalog:ResponsibleParty
    class_uri: linkml:Any
    slots:
    - "role-id"
    - "party-uuids"
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile

  BackMatter:
    description: OSCAL back-matter section
    exact_mappings:
    - oscal_catalog:BackMatter
    class_uri: linkml:Any
    slots:
    - resources
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile

  Resource:
    description: Referenced resource
    close_mappings:
    - oscal_catalog:Resource
    class_uri: linkml:Any
    slots:
    - uuid
    - title
    - description
    - citation
    - rlinks
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile

  Citation:
    description: Citation wrapper
    exact_mappings:
    - oscal_catalog:Citation
    class_uri: linkml:Any
    slots:
    - text
    in_subset:
    - nist_sp_800_53r5_catalog

  ResourceLink:
    description: Reference link for a resource
    close_mappings:
    - oscal_catalog:ResourceLink
    class_uri: linkml:Any
    slots:
    - href
    - "media-type"
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile

  CatalogElement:
    description: Base class for catalog elements
    abstract: true
    slots:
    - id
    - props
    - links
    - parts
    in_subset:
    - nist_sp_800_53r5_catalog

  IdentifiedElement:
    description: A catalog element with required id and optional title/class
    is_a: CatalogElement
    slots:
    - title
    - _class
    - label
    slot_usage:
      _class:
        range: CatalogElementClassValue
    in_subset:
    - nist_sp_800_53r5_catalog

  ControlGroup:
    description: A group of controls (family)
    is_a: IdentifiedElement
    exact_mappings:
    - oscal_catalog:Group
    slots:
    - groups
    - controls
    in_subset:
    - nist_sp_800_53r5_catalog

  Control:
    description: A security control
    is_a: IdentifiedElement
    close_mappings:
    - oscal_catalog:Control
    slots:
    - params
    - controls
    slot_usage:
      controls:
        range: ControlEnhancement
    in_subset:
    - nist_sp_800_53r5_catalog

  ControlEnhancement:
    description: An enhancement to a control
    is_a: IdentifiedElement
    close_mappings:
    - oscal_catalog:Control
    slots:
    - params
    - controls
    slot_usage:
      controls:
        range: ControlEnhancement
    in_subset:
    - nist_sp_800_53r5_catalog

  Parameter:
    description: A configurable parameter used by a control
    is_a: IdentifiedElement
    close_mappings:
    - oscal_catalog:Parameter
    class_uri: linkml:Any
    slots:
    - guidelines
    - select
    - "depends-on"
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r4_catalog

  Guideline:
    description: Additional prose guidance associated with a parameter
    exact_mappings:
    - oscal_catalog:ParameterGuideline
    slots:
    - prose
    in_subset:
    - nist_sp_800_53r5_catalog

  Property:
    description: A name-value property with optional namespace and class attributes
    close_mappings:
    - oscal_catalog:Property
    slots:
    - name
    - value
    - ns
    - _class
    slot_usage:
      _class:
        range: CatalogPropertyClassValue
    in_subset:
    - nist_sp_800_53r5_catalog

  Selection:
    description: Selection criteria for a parameter
    exact_mappings:
    - oscal_catalog:ParameterSelection
    class_uri: linkml:Any
    slots:
    - "how-many"
    - choice
    in_subset:
    - nist_sp_800_53r5_catalog

  Link:
    description: Relationship link
    close_mappings:
    - oscal_catalog:Link
    slots:
    - href
    - rel
    in_subset:
    - nist_sp_800_53r5_catalog

  Part:
    description: Structured narrative part that can contain nested parts
    is_a: IdentifiedElement
    close_mappings:
    - oscal_catalog:Part
    slots:
    - name
    - prose
    in_subset:
    - nist_sp_800_53r5_catalog

  ImportResource:
    description: Imported profile or catalog reference
    exact_mappings:
    - oscal_profile:ProfileImport
    class_uri: linkml:Any
    slots:
    - href
    - "include-controls"
    - "exclude-controls"
    in_subset:
    - nist_sp_800_53r5_profile

  IncludeControlsSelection:
    description: Control inclusion selector
    close_mappings:
    - oscal_catalog:SelectControlById
    class_uri: linkml:Any
    slots:
    - "with-ids"
    - matching
    in_subset:
    - nist_sp_800_53r5_profile

  MergeRules:
    description: Merge configuration
    exact_mappings:
    - oscal_profile:ProfileMerge
    class_uri: linkml:Any
    slots:
    - "as-is"
    - flat
    in_subset:
    - nist_sp_800_53r5_profile

  FlatMerge:
    description: Marker object indicating flat merge strategy for profile resolution
    exact_mappings:
    - oscal_profile:MergeFlat
    class_uri: linkml:Any
    in_subset:
    - nist_sp_800_53r5_profile

  ControlPattern:
    description: Glob or regex pattern for selecting controls by identifier
    exact_mappings:
    - oscal_catalog:ControlMatching
    class_uri: linkml:Any
    slots:
    - pattern
    in_subset:
    - nist_sp_800_53r5_profile

  ExcludeControlsSelection:
    description: Selection of controls to explicitly exclude from a profile import
    close_mappings:
    - oscal_catalog:SelectControlById
    class_uri: linkml:Any
    slots:
    - "with-ids"
    - matching
    in_subset:
    - nist_sp_800_53r5_profile

  ProfileModify:
    description: Profile modification section containing parameter overrides and control alterations
    exact_mappings:
    - oscal_profile:ProfileModify
    class_uri: linkml:Any
    slots:
    - "set-parameters"
    - alters
    in_subset:
    - nist_sp_800_53r5_profile

  ProfileSetParameter:
    description: Override the value of a parameter in a referenced control
    exact_mappings:
    - oscal_profile:ParameterSetting
    class_uri: linkml:Any
    slots:
    - "param-id"
    - label
    in_subset:
    - nist_sp_800_53r5_profile

  ProfileAlter:
    description: Alteration to a referenced control — adds or removes parts
    exact_mappings:
    - oscal_profile:Alteration
    class_uri: linkml:Any
    slots:
    - "control-id"
    - adds
    in_subset:
    - nist_sp_800_53r5_profile

  ProfileAdd:
    description: Content to be added to a control via profile alteration
    exact_mappings:
    - oscal_profile:Addition
    class_uri: linkml:Any
    slots:
    - position
    - "by-id"
    - parts
    - props
    in_subset:
    - nist_sp_800_53r5_profile

  CPRTDocument:
    description: >-
      Semantic class for NIST CPRT (Cybersecurity and Privacy Reference Tool)
      export documents covering SP 800-53, SP 800-53A, and SP 800-53B.
      Validate with: linkml validate -C SP80053Document -s <schema> <file.json>
    class_uri: linkml:Any
    slots:
    - response
    in_subset:
    - nist_sp_800_53r5_cprt

  CPRTResponse:
    description: >-
      CPRT API response container holding document metadata, typed elements
      (controls, enhancements, ODPs, assessment objectives, baselines),
      relationship types, and element relationships
    class_uri: linkml:Any
    in_subset:
    - nist_sp_800_53r5_cprt

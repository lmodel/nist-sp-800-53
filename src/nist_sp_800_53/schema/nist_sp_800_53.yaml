  "control-id":
    description: Identifier of the control to alter
    aliases:
    - control_id
    in_subset:
    - nist_sp_800_53r5_profile

    exact_mappings: [oscal_catalog:control-id]
  position:
    description: Position at which to add content relative to the by-id anchor
    in_subset:
    - nist_sp_800_53r5_profile

    exact_mappings: [oscal_profile:position]
  "by-id":
    description: Identifier of the anchor part relative to which additions are positioned
    aliases:
    - by_id
    in_subset:

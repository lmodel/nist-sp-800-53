id: https://w3id.org/lmodel/nist-sp-800-53
name: NIST-SP-800-53
description: >-
  Electronic (LinkML) Version of NIST SP 800-53 Rev 5 Controls and SP 800-53A Rev 5 Assessment Procedures 
version: 5.2.0
source: https://doi.org/10.6028/NIST.SP.800-53r5

default_prefix: nist_sp_800_53
default_range: string

prefixes:
  linkml: https://w3id.org/linkml/
  nist_sp_800_53: https://w3id.org/lmodel/nist-sp-800-53/
  oscal_catalog: https://w3id.org/lmodel/oscal_catalog/
  oscal_profile: https://w3id.org/lmodel/oscal_profile/

imports:
- linkml:types

subsets:
  nist_sp_800_53r5_catalog:
    description: >-
      NIST SP 800-53 Rev 5 catalog subset for controls and assessment procedures
  nist_sp_800_53r5_profile:
    description: >-
      NIST SP 800-53 Rev 5 profile subset for baselines and overlays

  nist_sp_800_53r4_catalog:
    description: >-
      NIST SP 800-53 Rev 4 backward-compatibility subset for catalog elements
      present in OSCAL 1.2.x representations but removed in Rev 5
      (e.g. depends-on parameter dependency)

  nist_sp_800_53r5_cprt:
    description: >-
      NIST CPRT (Cybersecurity and Privacy Reference Tool) export subset
      covering SP 800-53, SP 800-53A, and SP 800-53B element and relationship data

slots:
  catalog:
    description: Root catalog payload
    range: CatalogBody
    inlined: true
    in_subset:
    - nist_sp_800_53r5_catalog

    exact_mappings: [oscal_catalog:catalog]
  profile:
    description: Root profile payload
    range: ProfileBody
    inlined: true
    in_subset:
    - nist_sp_800_53r5_profile

    exact_mappings: [oscal_profile:profile]
  metadata:
    description: Profile and Catalog metadata
    range: Metadata
    inlined: true
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile

    exact_mappings: [oscal_catalog:metadata]
  groups:
    description: List of control groups in the catalog
    range: ControlGroup
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
    - nist_sp_800_53r5_catalog

    exact_mappings: [oscal_catalog:groups]
  controls:
    description: List of controls in a group
    range: Control
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
    - nist_sp_800_53r5_catalog

    exact_mappings: [oscal_catalog:controls]
  params:
    description: List of parameters for a control
    range: Parameter
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
    - nist_sp_800_53r5_catalog

    exact_mappings: [oscal_catalog:params]
  props:
    description: List of properties
    range: Property
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
    - nist_sp_800_53r5_catalog

    exact_mappings: [oscal_catalog:props]
  guidelines:
    description: List of guidelines
    range: Guideline
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
    - nist_sp_800_53r5_catalog

    exact_mappings: [oscal_catalog:guidelines]
  links:
    description: List of links and relationships
    range: Link
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
    - nist_sp_800_53r5_catalog

    exact_mappings: [oscal_catalog:links]
  parts:
    description: Nested parts that provide prose and structure
    range: Part
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
    - nist_sp_800_53r5_catalog

    exact_mappings: [oscal_catalog:parts]
  select:
    description: Selection parameters for a parameter definition
    range: Selection
    inlined: true
    in_subset:
    - nist_sp_800_53r5_catalog

    exact_mappings: [oscal_catalog:select]
  id:
    description: Unique identifier for an element
    in_subset:
    - nist_sp_800_53r5_catalog
    - nist_sp_800_53r5_profile

    exact_mappings: [oscal_catalog:id]
  uuid:

id: https://w3id.org/lmodel/nist-sp-800-53r5
name: NIST-SP-800-53
description: Top-level schema importing catalog and profile sub-schemas
version: 5.2.0
source: https://doi.org/10.6028/NIST.SP.800-53r5

default_prefix: sp80053
default_range: string

prefixes:
  linkml: https://w3id.org/linkml/
  sp80053: https://w3id.org/lmodel/nist-sp-800-53/

imports:
  - linkml:types
  - sp_800_53_catalog
  - sp_800_53_profile

slots:
  catalog:
    description: Root catalog payload
    range: CatalogBody
    inlined: true

  profile:
    description: Root profile payload
    range: ProfileBody
    inlined: true

classes:
  SP80053Document:
    description: Unified root wrapper for catalog or profile content
    tree_root: true
    class_uri: linkml:Any
    slots:
      - catalog
      - profile

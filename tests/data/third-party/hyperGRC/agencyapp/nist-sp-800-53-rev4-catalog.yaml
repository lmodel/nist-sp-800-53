  - id: ir
    title: Incident Response
    class: family
    props:
    - name: label
      value: IR
    controls:
    - id: ir-1
      title: Incident Response Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: IR-1
      parts:
      - id: ir-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  An incident response policy that addresses purpose, scope, roles,\
          \ responsibilities,\nmanagement commitment, coordination among organizational entities, and\
          \ compliance; and\n    2.  Procedures to facilitate the implementation of the incident response\
          \ policy\nand associated incident response controls; and\n  b.  Reviews and updates the current:\n\
          \    1.  Incident response policy [Assignment: organization-defined frequency];\nand\n    2.\
          \  Incident response procedures [Assignment: organization-defined frequency]."
    - id: ir-2
      title: Incident Response Training
      class: SP800-53
      props:
      - name: label
        value: IR-2
      parts:
      - id: ir-2_smt
        name: statement
        prose: "The organization provides incident response training to information system users consistent\
          \ with assigned roles and responsibilities:\n  a.  Within [Assignment: organization-defined\
          \ time period] of assuming an incident\nresponse role or responsibility;\n  b.  When required\
          \ by information system changes; and\n  c.  [Assignment: organization-defined frequency] thereafter."
      controls:
      - id: ir-2.1
        title: Simulated Events
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-2 (1)
        parts:
        - id: ir-2.1_smt
          name: statement
          prose: The organization incorporates simulated events into incident response training to facilitate
            effective response by personnel in crisis situations.
      - id: ir-2.2
        title: Automated Training Environments
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-2 (2)
        parts:
        - id: ir-2.2_smt
          name: statement
          prose: The organization employs automated mechanisms to provide a more thorough and realistic
            incident response training environment.
    - id: ir-3
      title: Incident Response Testing
      class: SP800-53
      props:
      - name: label
        value: IR-3
      parts:
      - id: ir-3_smt
        name: statement
        prose: 'The organization tests the incident response capability for the information system [Assignment:
          organization-defined frequency] using [Assignment: organization-defined tests] to determine
          the incident response effectiveness and documents the results.'
      controls:
      - id: ir-3.1
        title: Automated Testing
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-3 (1)
        parts:
        - id: ir-3.1_smt
          name: statement
          prose: The organization employs automated mechanisms to more thoroughly and effectively test
            the incident response capability.
      - id: ir-3.2
        title: Coordination With Related Plans
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-3 (2)
        parts:
        - id: ir-3.2_smt
          name: statement
          prose: The organization coordinates incident response testing with organizational elements responsible
            for related plans.
    - id: ir-4
      title: Incident Handling
      class: SP800-53
      props:
      - name: label
        value: IR-4
      parts:
      - id: ir-4_smt
        name: statement
        prose: "The organization:\n  a.  Implements an incident handling capability for security incidents\
          \ that includes\npreparation, detection and analysis, containment, eradication, and recovery;\n\
          \  b.  Coordinates incident handling activities with contingency planning activities;\nand\n\
          \  c.  Incorporates lessons learned from ongoing incident handling activities into\nincident\
          \ response procedures, training, and testing, and implements the resulting changes accordingly."
      controls:
      - id: ir-4.1
        title: Automated Incident Handling Processes
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-4 (1)
        parts:
        - id: ir-4.1_smt
          name: statement
          prose: The organization employs automated mechanisms to support the incident handling process.
      - id: ir-4.2
        title: Dynamic Reconfiguration
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-4 (2)
        parts:
        - id: ir-4.2_smt
          name: statement
          prose: 'The organization includes dynamic reconfiguration of [Assignment: organization-defined
            information system components] as part of the incident response capability.'
      - id: ir-4.3
        title: Continuity Of Operations
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-4 (3)
        parts:
        - id: ir-4.3_smt
          name: statement
          prose: 'The organization identifies [Assignment: organization-defined classes of incidents]
            and [Assignment: organization-defined actions to take in response to classes of incidents]
            to ensure continuation of organizational missions and business functions.'
      - id: ir-4.4
        title: Information Correlation
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-4 (4)
        parts:
        - id: ir-4.4_smt
          name: statement
          prose: The organization correlates incident information and individual incident responses to
            achieve an organization-wide perspective on incident awareness and response.
      - id: ir-4.5
        title: Automatic Disabling Of Information System
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-4 (5)
        parts:
        - id: ir-4.5_smt
          name: statement
          prose: 'The organization implements a configurable capability to automatically disable the information
            system if [Assignment: organization-defined security violations] are detected.'
      - id: ir-4.6
        title: Insider Threats - Specific Capabilities
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-4 (6)
        parts:
        - id: ir-4.6_smt
          name: statement
          prose: The organization implements incident handling capability for insider threats.
      - id: ir-4.7
        title: Insider Threats - Intra-Organization Coordination
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-4 (7)
        parts:
        - id: ir-4.7_smt
          name: statement
          prose: 'The organization coordinates incident handling capability for insider threats across
            [Assignment: organization-defined components or elements of the organization].'
      - id: ir-4.8
        title: Correlation With External Organizations
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-4 (8)
        parts:
        - id: ir-4.8_smt
          name: statement
          prose: 'The organization coordinates with [Assignment: organization-defined external organizations]
            to correlate and share [Assignment: organization-defined incident information] to achieve
            a cross-organization perspective on incident awareness and more effective incident responses.'
      - id: ir-4.9
        title: Dynamic Response Capability
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-4 (9)
        parts:
        - id: ir-4.9_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined dynamic response capabilities]
            to effectively respond to security incidents.'
      - id: ir-4.10
        title: Supply Chain Coordination
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-4 (10)
        parts:
        - id: ir-4.10_smt
          name: statement
          prose: The organization coordinates incident handling activities involving supply chain events
            with other organizations involved in the supply chain.
    - id: ir-5
      title: Incident Monitoring
      class: SP800-53
      props:
      - name: label
        value: IR-5
      parts:
      - id: ir-5_smt
        name: statement
        prose: The organization tracks and documents information system security incidents.
      controls:
      - id: ir-5.1
        title: Automated Tracking / Data Collection / Analysis
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-5 (1)
        parts:
        - id: ir-5.1_smt
          name: statement
          prose: The organization employs automated mechanisms to assist in the tracking of security incidents
            and in the collection and analysis of incident information.
    - id: ir-6
      title: Incident Reporting
      class: SP800-53
      props:
      - name: label
        value: IR-6
      parts:
      - id: ir-6_smt
        name: statement
        prose: "The organization:\n  a.  Requires personnel to report suspected security incidents to\
          \ the organizational\nincident response capability within [Assignment: organization-defined\
          \ time period]; and\n  b.  Reports security incident information to [Assignment: organization-defined\n\
          authorities]."
      controls:
      - id: ir-6.1
        title: Automated Reporting
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-6 (1)
        parts:
        - id: ir-6.1_smt
          name: statement
          prose: The organization employs automated mechanisms to assist in the reporting of security
            incidents.
      - id: ir-6.2
        title: Vulnerabilities Related To Incidents
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-6 (2)
        parts:
        - id: ir-6.2_smt
          name: statement
          prose: 'The organization reports information system vulnerabilities associated with reported
            security incidents to [Assignment: organization-defined personnel or roles].'
      - id: ir-6.3
        title: Coordination With Supply Chain
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-6 (3)
        parts:
        - id: ir-6.3_smt
          name: statement
          prose: The organization provides security incident information to other organizations involved
            in the supply chain for information systems or information system components related to the
            incident.
    - id: ir-7
      title: Incident Response Assistance
      class: SP800-53
      props:
      - name: label
        value: IR-7
      parts:
      - id: ir-7_smt
        name: statement
        prose: The organization provides an incident response support resource, integral to the organizational
          incident response capability that offers advice and assistance to users of the information system
          for the handling and reporting of security incidents.
      controls:
      - id: ir-7.1
        title: Automation Support For Availability Of Information / Support
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-7 (1)
        parts:
        - id: ir-7.1_smt
          name: statement
          prose: The organization employs automated mechanisms to increase the availability of incident
            response-related information and support.
      - id: ir-7.2
        title: Coordination With External Providers
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-7 (2)
        parts:
        - id: ir-7.2_smt
          name: statement
          prose: "The organization:\n   (2)(a).  Establishes a direct, cooperative relationship between\
            \ its incident\nresponse capability and external providers of information system protection\
            \ capability; and\n   (2)(b).  Identifies organizational incident response team members to\
            \ the external\nproviders."
    - id: ir-8
      title: Incident Response Plan
      class: SP800-53
      props:
      - name: label
        value: IR-8
      parts:
      - id: ir-8_smt
        name: statement
        prose: "The organization:\n  a.  Develops an incident response plan that:\n    1.  Provides the\
          \ organization with a roadmap for implementing its incident\nresponse capability;\n    2.  Describes\
          \ the structure and organization of the incident response capability;\n    3.  Provides a high-level\
          \ approach for how the incident response capability\nfits into the overall organization;\n \
          \   4.  Meets the unique requirements of the organization, which relate to mission,\nsize, structure,\
          \ and functions;\n    5.  Defines reportable incidents;\n    6.  Provides metrics for measuring\
          \ the incident response capability within\nthe organization;\n    7.  Defines the resources\
          \ and management support needed to effectively maintain\nand mature an incident response capability;\
          \ and\n    8.  Is reviewed and approved by [Assignment: organization-defined personnel\nor roles];\n\
          \  b.  Distributes copies of the incident response plan to [Assignment: organization-defined\n\
          incident response personnel (identified by name and/or by role) and organizational elements];\n\
          \  c.  Reviews the incident response plan [Assignment: organization-defined frequency];\n  d.\
          \  Updates the incident response plan to address system/organizational changes\nor problems\
          \ encountered during plan implementation, execution, or testing;\n  e.  Communicates incident\
          \ response plan changes to [Assignment: organization-defined\nincident response personnel (identified\
          \ by name and/or by role) and organizational elements]; and\n  f.  Protects the incident response\
          \ plan from unauthorized disclosure and modification."
    - id: ir-9
      title: Information Spillage Response
      class: SP800-53
      props:
      - name: label
        value: IR-9
      parts:
      - id: ir-9_smt
        name: statement
        prose: "The organization responds to information spills by:\n  a.  Identifying the specific information\
          \ involved in the information system\ncontamination;\n  b.  Alerting [Assignment: organization-defined\
          \ personnel or roles] of the information\nspill using a method of communication not associated\
          \ with the spill;\n  c.  Isolating the contaminated information system or system component;\n\
          \  d.  Eradicating the information from the contaminated information system or\ncomponent;\n\
          \  e.  Identifying other information systems or system components that may have\nbeen subsequently\
          \ contaminated; and\n  f.  Performing other [Assignment: organization-defined actions]."
      controls:
      - id: ir-9.1
        title: Responsible Personnel
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-9 (1)
        parts:
        - id: ir-9.1_smt
          name: statement
          prose: 'The organization assigns [Assignment: organization-defined personnel or roles] with
            responsibility for responding to information spills.'
      - id: ir-9.2
        title: Training
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-9 (2)
        parts:
        - id: ir-9.2_smt
          name: statement
          prose: 'The organization provides information spillage response training [Assignment: organization-defined
            frequency].'
      - id: ir-9.3
        title: Post-Spill Operations
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-9 (3)
        parts:
        - id: ir-9.3_smt
          name: statement
          prose: 'The organization implements [Assignment: organization-defined procedures] to ensure
            that organizational personnel impacted by information spills can continue to carry out assigned
            tasks while contaminated systems are undergoing corrective actions.'
      - id: ir-9.4
        title: Exposure To Unauthorized Personnel
        class: SP800-53-enhancement
        props:
        - name: label
          value: IR-9 (4)
        parts:
        - id: ir-9.4_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined security safeguards] for
            personnel exposed to information not within assigned access authorizations.'
    - id: ir-10
      title: Integrated Information Security Analysis Team
      class: SP800-53
      props:
      - name: label
        value: IR-10
      parts:
      - id: ir-10_smt
        name: statement
        prose: The organization establishes an integrated team of forensic/malicious code analysts, tool
          developers, and real-time operations personnel.
  - id: ma
    title: Maintenance
    class: family
    props:
    - name: label
      value: MA
    controls:
    - id: ma-1
      title: System Maintenance Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: MA-1
      parts:
      - id: ma-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A system maintenance policy that addresses purpose, scope, roles,\
          \ responsibilities,\nmanagement commitment, coordination among organizational entities, and\
          \ compliance; and\n    2.  Procedures to facilitate the implementation of the system maintenance\n\
          policy and associated system maintenance controls; and\n  b.  Reviews and updates the current:\n\
          \    1.  System maintenance policy [Assignment: organization-defined frequency];\nand\n    2.\
          \  System maintenance procedures [Assignment: organization-defined frequency]."
    - id: ma-2
      title: Controlled Maintenance
      class: SP800-53
      props:
      - name: label
        value: MA-2
      parts:
      - id: ma-2_smt
        name: statement
        prose: "The organization:\n  a.  Schedules, performs, documents, and reviews records of maintenance\
          \ and repairs\non information system components in accordance with manufacturer or vendor specifications\
          \ and/or organizational requirements;\n  b.  Approves and monitors all maintenance activities,\
          \ whether performed on site\nor remotely and whether the equipment is serviced on site or removed\
          \ to another location;\n  c.  Requires that [Assignment: organization-defined personnel or roles]\
          \ explicitly\napprove the removal of the information system or system components from organizational\
          \ facilities for off-site maintenance or repairs;\n  d.  Sanitizes equipment to remove all information\
          \ from associated media prior\nto removal from organizational facilities for off-site maintenance\
          \ or repairs;\n  e.  Checks all potentially impacted security controls to verify that the controls\n\
          are still functioning properly following maintenance or repair actions; and\n  f.  Includes\
          \ [Assignment: organization-defined maintenance-related information]\nin organizational maintenance\
          \ records."
      controls:
      - id: ma-2.1
        title: Record Content
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-2 (1)
        parts:
        - id: ma-2.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MA-2].'
      - id: ma-2.2
        title: Automated Maintenance Activities
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-2 (2)
        parts:
        - id: ma-2.2_smt
          name: statement
          prose: "The organization:\n   (2)(a).  Employs automated mechanisms to schedule, conduct, and\
            \ document maintenance\nand repairs; and\n   (2)(b).  Produces up-to date, accurate, and complete\
            \ records of all maintenance\nand repair actions requested, scheduled, in process, and completed."
    - id: ma-3
      title: Maintenance Tools
      class: SP800-53
      props:
      - name: label
        value: MA-3
      parts:
      - id: ma-3_smt
        name: statement
        prose: The organization approves, controls, and monitors information system maintenance tools.
      controls:
      - id: ma-3.1
        title: Inspect Tools
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-3 (1)
        parts:
        - id: ma-3.1_smt
          name: statement
          prose: The organization inspects the maintenance tools carried into a facility by maintenance
            personnel for improper or unauthorized modifications.
      - id: ma-3.2
        title: Inspect Media
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-3 (2)
        parts:
        - id: ma-3.2_smt
          name: statement
          prose: The organization checks media containing diagnostic and test programs for malicious code
            before the media are used in the information system.
      - id: ma-3.3
        title: Prevent Unauthorized Removal
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-3 (3)
        parts:
        - id: ma-3.3_smt
          name: statement
          prose: "The organization prevents the unauthorized removal of maintenance equipment containing\
            \ organizational information by:\n   (3)(a).  Verifying that there is no organizational information\
            \ contained on\nthe equipment;\n   (3)(b).  Sanitizing or destroying the equipment;\n   (3)(c).\
            \  Retaining the equipment within the facility; or\n   (3)(d).  Obtaining an exemption from\
            \ [Assignment: organization-defined personnel\nor roles] explicitly authorizing removal of\
            \ the equipment from the facility."
      - id: ma-3.4
        title: Restricted Tool Use
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-3 (4)
        parts:
        - id: ma-3.4_smt
          name: statement
          prose: The information system restricts the use of maintenance tools to authorized personnel
            only.
    - id: ma-4
      title: Nonlocal Maintenance
      class: SP800-53
      props:
      - name: label
        value: MA-4
      parts:
      - id: ma-4_smt
        name: statement
        prose: "The organization:\n  a.  Approves and monitors nonlocal maintenance and diagnostic activities;\n\
          \  b.  Allows the use of nonlocal maintenance and diagnostic tools only as consistent\nwith\
          \ organizational policy and documented in the security plan for the information system;\n  c.\
          \  Employs strong authenticators in the establishment of nonlocal maintenance\nand diagnostic\
          \ sessions;\n  d.  Maintains records for nonlocal maintenance and diagnostic activities; and\n\
          \  e.  Terminates session and network connections when nonlocal maintenance is\ncompleted."
      controls:
      - id: ma-4.1
        title: Auditing And Review
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-4 (1)
        parts:
        - id: ma-4.1_smt
          name: statement
          prose: "The organization:\n   (1)(a).  Audits nonlocal maintenance and diagnostic sessions [Assignment:\
            \ organization-defined audit events]; and\n   (1)(b).  Reviews the records of the maintenance\
            \ and diagnostic sessions."
      - id: ma-4.2
        title: Document Nonlocal Maintenance
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-4 (2)
        parts:
        - id: ma-4.2_smt
          name: statement
          prose: The organization documents in the security plan for the information system, the policies
            and procedures for the establishment and use of nonlocal maintenance and diagnostic connections.
      - id: ma-4.3
        title: Comparable Security / Sanitization
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-4 (3)
        parts:
        - id: ma-4.3_smt
          name: statement
          prose: "The organization:\n   (3)(a).  Requires that nonlocal maintenance and diagnostic services\
            \ be performed\nfrom an information system that implements a security capability comparable\
            \ to the capability implemented on the system being serviced; or\n   (3)(b).  Removes the\
            \ component to be serviced from the information system prior\nto nonlocal maintenance or diagnostic\
            \ services, sanitizes the component (with regard to organizational information) before removal\
            \ from organizational facilities, and after the service is performed, inspects and sanitizes\
            \ the component (with regard to potentially malicious software) before reconnecting the component\
            \ to the information system."
      - id: ma-4.4
        title: Authentication / Separation Of Maintenance Sessions
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-4 (4)
        parts:
        - id: ma-4.4_smt
          name: statement
          prose: "The organization protects nonlocal maintenance sessions by:\n   (4)(a).  Employing [Assignment:\
            \ organization-defined authenticators that are\nreplay resistant]; and\n   (4)(b).  Separating\
            \ the maintenance sessions from other network sessions with\nthe information system by either:\n\
            \   (4)(b)(1).  Physically separated communications paths; or\n   (4)(b)(2).  Logically separated\
            \ communications paths based upon encryption."
      - id: ma-4.5
        title: Approvals And Notifications
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-4 (5)
        parts:
        - id: ma-4.5_smt
          name: statement
          prose: "The organization:\n   (5)(a).  Requires the approval of each nonlocal maintenance session\
            \ by [Assignment:\norganization-defined personnel or roles]; and\n   (5)(b).  Notifies [Assignment:\
            \ organization-defined personnel or roles] of\nthe date and time of planned nonlocal maintenance."
      - id: ma-4.6
        title: Cryptographic Protection
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-4 (6)
        parts:
        - id: ma-4.6_smt
          name: statement
          prose: The information system implements cryptographic mechanisms to protect the integrity and
            confidentiality of nonlocal maintenance and diagnostic communications.
      - id: ma-4.7
        title: Remote Disconnect Verification
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-4 (7)
        parts:
        - id: ma-4.7_smt
          name: statement
          prose: The information system implements remote disconnect verification at the termination of
            nonlocal maintenance and diagnostic sessions.
    - id: ma-5
      title: Maintenance Personnel
      class: SP800-53
      props:
      - name: label
        value: MA-5
      parts:
      - id: ma-5_smt
        name: statement
        prose: "The organization:\n  a.  Establishes a process for maintenance personnel authorization\
          \ and maintains\na list of authorized maintenance organizations or personnel;\n  b.  Ensures\
          \ that non-escorted personnel performing maintenance on the information\nsystem have required\
          \ access authorizations; and\n  c.  Designates organizational personnel with required access\
          \ authorizations\nand technical competence to supervise the maintenance activities of personnel\
          \ who do not possess the required access authorizations."
      controls:
      - id: ma-5.1
        title: Individuals Without Appropriate Access
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-5 (1)
        parts:
        - id: ma-5.1_smt
          name: statement
          prose: "The organization:\n   (1)(a).  Implements procedures for the use of maintenance personnel\
            \ that lack\nappropriate security clearances or are not U.S. citizens, that include the following\
            \ requirements:\n   (1)(a)(1).  Maintenance personnel who do not have needed access authorizations,\n\
            clearances, or formal access approvals are escorted and supervised during the performance\
            \ of maintenance and diagnostic activities on the information system by approved organizational\
            \ personnel who are fully cleared, have appropriate access authorizations, and are technically\
            \ qualified;\n   (1)(a)(2).  Prior to initiating maintenance or diagnostic activities by personnel\n\
            who do not have needed access authorizations, clearances or formal access approvals, all volatile\
            \ information storage components within the information system are sanitized and all nonvolatile\
            \ storage media are removed or physically disconnected from the system and secured; and\n\
            \   (1)(b).  Develops and implements alternate security safeguards in the event\nan information\
            \ system component cannot be sanitized, removed, or disconnected from the system."
      - id: ma-5.2
        title: Security Clearances For Classified Systems
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-5 (2)
        parts:
        - id: ma-5.2_smt
          name: statement
          prose: The organization ensures that personnel performing maintenance and diagnostic activities
            on an information system processing, storing, or transmitting classified information possess
            security clearances and formal access approvals for at least the highest classification level
            and for all compartments of information on the system.
      - id: ma-5.3
        title: Citizenship Requirements For Classified Systems
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-5 (3)
        parts:
        - id: ma-5.3_smt
          name: statement
          prose: The organization ensures that personnel performing maintenance and diagnostic activities
            on an information system processing, storing, or transmitting classified information are U.S.
            citizens.
      - id: ma-5.4
        title: Foreign Nationals
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-5 (4)
        parts:
        - id: ma-5.4_smt
          name: statement
          prose: "The organization ensures that:\n   (4)(a).  Cleared foreign nationals (i.e., foreign\
            \ nationals with appropriate\nsecurity clearances), are used to conduct maintenance and diagnostic\
            \ activities on classified information systems only when the systems are jointly owned and\
            \ operated by the United States and foreign allied governments, or owned and operated solely\
            \ by foreign allied governments; and\n   (4)(b).  Approvals, consents, and detailed operational\
            \ conditions regarding\nthe use of foreign nationals to conduct maintenance and diagnostic\
            \ activities on classified information systems are fully documented within Memoranda of Agreements."
      - id: ma-5.5
        title: Nonsystem-Related Maintenance
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-5 (5)
        parts:
        - id: ma-5.5_smt
          name: statement
          prose: The organization ensures that non-escorted personnel performing maintenance activities
            not directly associated with the information system but in the physical proximity of the system,
            have required access authorizations.
    - id: ma-6
      title: Timely Maintenance
      class: SP800-53
      props:
      - name: label
        value: MA-6
      parts:
      - id: ma-6_smt
        name: statement
        prose: 'The organization obtains maintenance support and/or spare parts for [Assignment: organization-defined
          information system components] within [Assignment: organization-defined time period] of failure.'
      controls:
      - id: ma-6.1
        title: Preventive Maintenance
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-6 (1)
        parts:
        - id: ma-6.1_smt
          name: statement
          prose: 'The organization performs preventive maintenance on [Assignment: organization-defined
            information system components] at [Assignment: organization-defined time intervals].'
      - id: ma-6.2
        title: Predictive Maintenance
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-6 (2)
        parts:
        - id: ma-6.2_smt
          name: statement
          prose: 'The organization performs predictive maintenance on [Assignment: organization-defined
            information system components] at [Assignment: organization-defined time intervals].'
      - id: ma-6.3
        title: Automated Support For Predictive Maintenance
        class: SP800-53-enhancement
        props:
        - name: label
          value: MA-6 (3)
        parts:
        - id: ma-6.3_smt
          name: statement
          prose: The organization employs automated mechanisms to transfer predictive maintenance data
            to a computerized maintenance management system.
  - id: mp
    title: Media Protection
    class: family
    props:
    - name: label
      value: MP
    controls:
    - id: mp-1
      title: Media Protection Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: MP-1
      parts:
      - id: mp-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A media protection policy that addresses purpose, scope, roles,\
          \ responsibilities,\nmanagement commitment, coordination among organizational entities, and\
          \ compliance; and\n    2.  Procedures to facilitate the implementation of the media protection\
          \ policy\nand associated media protection controls; and\n  b.  Reviews and updates the current:\n\
          \    1.  Media protection policy [Assignment: organization-defined frequency];\nand\n    2.\
          \  Media protection procedures [Assignment: organization-defined frequency]."
    - id: mp-2
      title: Media Access
      class: SP800-53
      props:
      - name: label
        value: MP-2
      parts:
      - id: mp-2_smt
        name: statement
        prose: 'The organization restricts access to [Assignment: organization-defined types of digital
          and/or non-digital media] to [Assignment: organization-defined personnel or roles].'
      controls:
      - id: mp-2.1
        title: Automated Restricted Access
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-2 (1)
        parts:
        - id: mp-2.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-4 (2)].'
      - id: mp-2.2
        title: Cryptographic Protection
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-2 (2)
        parts:
        - id: mp-2.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SC-28 (1)].'
    - id: mp-3
      title: Media Marking
      class: SP800-53
      props:
      - name: label
        value: MP-3
      parts:
      - id: mp-3_smt
        name: statement
        prose: "The organization:\n  a.  Marks information system media indicating the distribution limitations,\n\
          handling caveats, and applicable security markings (if any) of the information; and\n  b.  Exempts\
          \ [Assignment: organization-defined types of information system media]\nfrom marking as long\
          \ as the media remain within [Assignment: organization-defined controlled areas]."
    - id: mp-4
      title: Media Storage
      class: SP800-53
      props:
      - name: label
        value: MP-4
      parts:
      - id: mp-4_smt
        name: statement
        prose: "The organization:\n  a.  Physically controls and securely stores [Assignment: organization-defined\n\
          types of digital and/or non-digital media] within [Assignment: organization-defined controlled\
          \ areas]; and\n  b.  Protects information system media until the media are destroyed or sanitized\n\
          using approved equipment, techniques, and procedures."
      controls:
      - id: mp-4.1
        title: Cryptographic Protection
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-4 (1)
        parts:
        - id: mp-4.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SC-28 (1)].'
      - id: mp-4.2
        title: Automated Restricted Access
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-4 (2)
        parts:
        - id: mp-4.2_smt
          name: statement

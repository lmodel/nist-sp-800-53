  - id: ca
    title: Security Assessment and Authorization
    class: family
    props:
    - name: label
      value: CA
    controls:
    - id: ca-1
      title: Security Assessment And Authorization Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: CA-1
      parts:
      - id: ca-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A security assessment and authorization policy that addresses\
          \ purpose,\nscope, roles, responsibilities, management commitment, coordination among organizational\
          \ entities, and compliance; and\n    2.  Procedures to facilitate the implementation of the\
          \ security assessment\nand authorization policy and associated security assessment and authorization\
          \ controls; and\n  b.  Reviews and updates the current:\n    1.  Security assessment and authorization\
          \ policy [Assignment: organization-defined\nfrequency]; and\n    2.  Security assessment and\
          \ authorization procedures [Assignment: organization-defined\nfrequency]."
    - id: ca-2
      title: Security Assessments
      class: SP800-53
      props:
      - name: label
        value: CA-2
      parts:
      - id: ca-2_smt
        name: statement
        prose: "The organization:\n  a.  Develops a security assessment plan that describes the scope\
          \ of the assessment\nincluding:\n    1.  Security controls and control enhancements under assessment;\n\
          \    2.  Assessment procedures to be used to determine security control effectiveness;\nand\n\
          \    3.  Assessment environment, assessment team, and assessment roles and responsibilities;\n\
          \  b.  Assesses the security controls in the information system and its environment\nof operation\
          \ [Assignment: organization-defined frequency] to determine the extent to which the controls\
          \ are implemented correctly, operating as intended, and producing the desired outcome with respect\
          \ to meeting established security requirements;\n  c.  Produces a security assessment report\
          \ that documents the results of the\nassessment; and\n  d.  Provides the results of the security\
          \ control assessment to [Assignment:\norganization-defined individuals or roles]."
      controls:
      - id: ca-2.1
        title: Independent Assessors
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-2 (1)
        parts:
        - id: ca-2.1_smt
          name: statement
          prose: 'The organization employs assessors or assessment teams with [Assignment: organization-defined
            level of independence] to conduct security control assessments.'
      - id: ca-2.2
        title: Specialized Assessments
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-2 (2)
        parts:
        - id: ca-2.2_smt
          name: statement
          prose: 'The organization includes as part of security control assessments, [Assignment: organization-defined
            frequency], [Selection: announced; unannounced], [Selection (one or more): in-depth monitoring;
            vulnerability scanning; malicious user testing; insider threat assessment; performance/load
            testing; [Assignment: organization-defined other forms of security assessment]].'
      - id: ca-2.3
        title: External Organizations
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-2 (3)
        parts:
        - id: ca-2.3_smt
          name: statement
          prose: 'The organization accepts the results of an assessment of [Assignment: organization-defined
            information system] performed by [Assignment: organization-defined external organization]
            when the assessment meets [Assignment: organization-defined requirements].'
    - id: ca-3
      title: System Interconnections
      class: SP800-53
      props:
      - name: label
        value: CA-3
      parts:
      - id: ca-3_smt
        name: statement
        prose: "The organization:\n  a.  Authorizes connections from the information system to other information\n\
          systems through the use of Interconnection Security Agreements;\n  b.  Documents, for each interconnection,\
          \ the interface characteristics, security\nrequirements, and the nature of the information communicated;\
          \ and\n  c.  Reviews and updates Interconnection Security Agreements [Assignment: organization-defined\n\
          frequency]."
      controls:
      - id: ca-3.1
        title: Unclassified National Security System Connections
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-3 (1)
        parts:
        - id: ca-3.1_smt
          name: statement
          prose: 'The organization prohibits the direct connection of an [Assignment: organization-defined
            unclassified, national security system] to an external network without the use of [Assignment:
            organization-defined boundary protection device].'
      - id: ca-3.2
        title: Classified National Security System Connections
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-3 (2)
        parts:
        - id: ca-3.2_smt
          name: statement
          prose: 'The organization prohibits the direct connection of a classified, national security
            system to an external network without the use of [Assignment: organization-defined boundary
            protection device].'
      - id: ca-3.3
        title: Unclassified Non-National Security System Connections
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-3 (3)
        parts:
        - id: ca-3.3_smt
          name: statement
          prose: 'The organization prohibits the direct connection of an [Assignment: organization-defined
            unclassified, non-national security system] to an external network without the use of [Assignment;
            organization-defined boundary protection device].'
      - id: ca-3.4
        title: Connections To Public Networks
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-3 (4)
        parts:
        - id: ca-3.4_smt
          name: statement
          prose: 'The organization prohibits the direct connection of an [Assignment: organization-defined
            information system] to a public network.'
      - id: ca-3.5
        title: Restrictions On External System Connections
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-3 (5)
        parts:
        - id: ca-3.5_smt
          name: statement
          prose: 'The organization employs [Selection: allow-all, deny-by-exception; deny-all, permit-by-exception]
            policy for allowing [Assignment: organization-defined information systems] to connect to external
            information systems.'
    - id: ca-4
      title: Security Certification
      class: SP800-53
      props:
      - name: label
        value: CA-4
      parts:
      - id: ca-4_smt
        name: statement
        prose: '[Withdrawn: Incorporated into CA-2].'
    - id: ca-5
      title: Plan Of Action And Milestones
      class: SP800-53
      props:
      - name: label
        value: CA-5
      parts:
      - id: ca-5_smt
        name: statement
        prose: "The organization:\n  a.  Develops a plan of action and milestones for the information\
          \ system to document\nthe organization�s planned remedial actions to correct weaknesses or deficiencies\
          \ noted during the assessment of the security controls and to reduce or eliminate known vulnerabilities\
          \ in the system; and\n  b.  Updates existing plan of action and milestones [Assignment: organization-defined\n\
          frequency] based on the findings from security controls assessments, security impact analyses,\
          \ and continuous monitoring activities."
      controls:
      - id: ca-5.1
        title: Automation Support For Accuracy / Currency
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-5 (1)
        parts:
        - id: ca-5.1_smt
          name: statement
          prose: The organization employs automated mechanisms to help ensure that the plan of action
            and milestones for the information system is accurate, up to date, and readily available.
    - id: ca-6
      title: Security Authorization
      class: SP800-53
      props:
      - name: label
        value: CA-6
      parts:
      - id: ca-6_smt
        name: statement
        prose: "The organization:\n  a.  Assigns a senior-level executive or manager as the authorizing\
          \ official\nfor the information system;\n  b.  Ensures that the authorizing official authorizes\
          \ the information system\nfor processing before commencing operations; and\n  c.  Updates the\
          \ security authorization [Assignment: organization-defined frequency]."
    - id: ca-7
      title: Continuous Monitoring
      class: SP800-53
      props:
      - name: label
        value: CA-7
      parts:
      - id: ca-7_smt
        name: statement
        prose: "The organization develops a continuous monitoring strategy and implements a continuous\
          \ monitoring program that includes:\n  a.  Establishment of [Assignment: organization-defined\
          \ metrics] to be monitored;\n  b.  Establishment of [Assignment: organization-defined frequencies]\
          \ for monitoring\nand [Assignment: organization-defined frequencies] for assessments supporting\
          \ such monitoring;\n  c.  Ongoing security control assessments in accordance with the organizational\n\
          continuous monitoring strategy;\n  d.  Ongoing security status monitoring of organization-defined\
          \ metrics in accordance\nwith the organizational continuous monitoring strategy;\n  e.  Correlation\
          \ and analysis of security-related information generated by assessments\nand monitoring;\n \
          \ f.  Response actions to address results of the analysis of security-related\ninformation;\
          \ and\n  g.  Reporting the security status of organization and the information system\nto [Assignment:\
          \ organization-defined personnel or roles] [Assignment: organization-defined frequency]."
      controls:
      - id: ca-7.1
        title: Independent Assessment
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-7 (1)
        parts:
        - id: ca-7.1_smt
          name: statement
          prose: 'The organization employs assessors or assessment teams with [Assignment: organization-defined
            level of independence] to monitor the security controls in the information system on an ongoing
            basis.'
      - id: ca-7.2
        title: Types Of Assessments
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-7 (2)
        parts:
        - id: ca-7.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CA-2].'
      - id: ca-7.3
        title: Trend Analyses
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-7 (3)
        parts:
        - id: ca-7.3_smt
          name: statement
          prose: The organization employs trend analyses to determine if security control implementations,
            the frequency of continuous monitoring activities, and/or the types of activities used in
            the continuous monitoring process need to be modified based on empirical data.
    - id: ca-8
      title: Penetration Testing
      class: SP800-53
      props:
      - name: label
        value: CA-8
      parts:
      - id: ca-8_smt
        name: statement
        prose: 'The organization conducts penetration testing [Assignment: organization-defined frequency]
          on [Assignment: organization-defined information systems or system components].'
      controls:
      - id: ca-8.1
        title: Independent Penetration Agent Or Team
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-8 (1)
        parts:
        - id: ca-8.1_smt
          name: statement
          prose: The organization employs an independent penetration agent or penetration team to perform
            penetration testing on the information system or system components.
      - id: ca-8.2
        title: Red Team Exercises
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-8 (2)
        parts:
        - id: ca-8.2_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined red team exercises] to simulate
            attempts by adversaries to compromise organizational information systems in accordance with
            [Assignment: organization-defined rules of engagement].'
    - id: ca-9
      title: Internal System Connections
      class: SP800-53
      props:
      - name: label
        value: CA-9
      parts:
      - id: ca-9_smt
        name: statement
        prose: "The organization:\n  a.  Authorizes internal connections of [Assignment: organization-defined\
          \ information\nsystem components or classes of components] to the information system; and\n\
          \  b.  Documents, for each internal connection, the interface characteristics,\nsecurity requirements,\
          \ and the nature of the information communicated."
      controls:
      - id: ca-9.1
        title: Security Compliance Checks
        class: SP800-53-enhancement
        props:
        - name: label
          value: CA-9 (1)
        parts:
        - id: ca-9.1_smt
          name: statement
          prose: The information system performs security compliance checks on constituent system components
            prior to the establishment of the internal connection.

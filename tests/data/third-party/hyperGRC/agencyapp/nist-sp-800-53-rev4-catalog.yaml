  - id: si
    title: System and Information Integrity
    class: family
    props:
    - name: label
      value: SI
    controls:
    - id: si-1
      title: System And Information Integrity Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: SI-1
      parts:
      - id: si-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A system and information integrity policy that addresses purpose,\
          \ scope,\nroles, responsibilities, management commitment, coordination among organizational\
          \ entities, and compliance; and\n    2.  Procedures to facilitate the implementation of the\
          \ system and information\nintegrity policy and associated system and information integrity controls;\
          \ and\n  b.  Reviews and updates the current:\n    1.  System and information integrity policy\
          \ [Assignment: organization-defined\nfrequency]; and\n    2.  System and information integrity\
          \ procedures [Assignment: organization-defined\nfrequency]."
    - id: si-2
      title: Flaw Remediation
      class: SP800-53
      props:
      - name: label
        value: SI-2
      parts:
      - id: si-2_smt
        name: statement
        prose: "The organization:\n  a.  Identifies, reports, and corrects information system flaws;\n\
          \  b.  Tests software and firmware updates related to flaw remediation for effectiveness\nand\
          \ potential side effects before installation;\n  c.  Installs security-relevant software and\
          \ firmware updates within [Assignment:\norganization-defined time period] of the release of\
          \ the updates; and\n  d.  Incorporates flaw remediation into the organizational configuration\
          \ management\nprocess."
      controls:
      - id: si-2.1
        title: Central Management
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-2 (1)
        parts:
        - id: si-2.1_smt
          name: statement
          prose: The organization centrally manages the flaw remediation process.
      - id: si-2.2
        title: Automated Flaw Remediation Status
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-2 (2)
        parts:
        - id: si-2.2_smt
          name: statement
          prose: 'The organization employs automated mechanisms [Assignment: organization-defined frequency]
            to determine the state of information system components with regard to flaw remediation.'
      - id: si-2.3
        title: Time To Remediate Flaws / Benchmarks For Corrective Actions
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-2 (3)
        parts:
        - id: si-2.3_smt
          name: statement
          prose: "The organization:\n   (3)(a).  Measures the time between flaw identification and flaw\
            \ remediation; and\n   (3)(b).  Establishes [Assignment: organization-defined benchmarks]\
            \ for taking corrective actions."
      - id: si-2.4
        title: Automated Patch Management Tools
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-2 (4)
        parts:
        - id: si-2.4_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SI-2].'
      - id: si-2.5
        title: Automatic Software / Firmware Updates
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-2 (5)
        parts:
        - id: si-2.5_smt
          name: statement
          prose: 'The organization installs [Assignment: organization-defined security-relevant software
            and firmware updates] automatically to [Assignment: organization-defined information system
            components].'
      - id: si-2.6
        title: Removal Of Previous Versions Of Software / Firmware
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-2 (6)
        parts:
        - id: si-2.6_smt
          name: statement
          prose: 'The organization removes [Assignment: organization-defined software and firmware components]
            after updated versions have been installed.'
    - id: si-3
      title: Malicious Code Protection
      class: SP800-53
      props:
      - name: label
        value: SI-3
      parts:
      - id: si-3_smt
        name: statement
        prose: "The organization:\n  a.  Employs malicious code protection mechanisms at information system\
          \ entry\nand exit points to detect and eradicate malicious code;\n  b.  Updates malicious code\
          \ protection mechanisms whenever new releases are available\nin accordance with organizational\
          \ configuration management policy and procedures;\n  c.  Configures malicious code protection\
          \ mechanisms to:\n    1.  Perform periodic scans of the information system [Assignment: organization-defined\n\
          frequency] and real-time scans of files from external sources at [Selection (one or more); endpoint;\
          \ network entry/exit points] as the files are downloaded, opened, or executed in accordance\
          \ with organizational security policy; and\n    2.  [Selection (one or more): block malicious\
          \ code; quarantine malicious code;  send\nalert to administrator; [Assignment: organization-defined\
          \ action]] in response to malicious code detection; and\n  d.  Addresses the receipt of false\
          \ positives during malicious code detection\nand eradication and the resulting potential impact\
          \ on the availability of the information system."
      controls:
      - id: si-3.1
        title: Central Management
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-3 (1)
        parts:
        - id: si-3.1_smt
          name: statement
          prose: The organization centrally manages malicious code protection mechanisms.
      - id: si-3.2
        title: Automatic Updates
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-3 (2)
        parts:
        - id: si-3.2_smt
          name: statement
          prose: The information system automatically updates malicious code protection mechanisms.
      - id: si-3.3
        title: Non-Privileged Users
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-3 (3)
        parts:
        - id: si-3.3_smt
          name: statement
          prose: '[Withdrawn: Incorporated into AC-6 (10)].'
      - id: si-3.4
        title: Updates Only By Privileged Users
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-3 (4)
        parts:
        - id: si-3.4_smt
          name: statement
          prose: The information system updates malicious code protection mechanisms only when directed
            by a privileged user.
      - id: si-3.5
        title: Portable Storage Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-3 (5)
        parts:
        - id: si-3.5_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-7].'
      - id: si-3.6
        title: Testing / Verification
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-3 (6)
        parts:
        - id: si-3.6_smt
          name: statement
          prose: "The organization:\n   (6)(a).  Tests malicious code protection mechanisms [Assignment:\
            \ organization-defined\nfrequency] by introducing a known benign, non-spreading test case\
            \ into the information system; and\n   (6)(b).  Verifies that both detection of the test case\
            \ and associated incident\nreporting occur."
      - id: si-3.7
        title: Nonsignature-Based Detection
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-3 (7)
        parts:
        - id: si-3.7_smt
          name: statement
          prose: The information system implements nonsignature-based malicious code detection mechanisms.
      - id: si-3.8
        title: Detect Unauthorized Commands
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-3 (8)
        parts:
        - id: si-3.8_smt
          name: statement
          prose: 'The information system detects [Assignment: organization-defined unauthorized operating
            system commands] through the kernel application programming interface at [Assignment: organization-defined
            information system hardware components] and [Selection (one or more): issues a warning; audits
            the command execution; prevents the execution of the command].'
      - id: si-3.9
        title: Authenticate Remote Commands
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-3 (9)
        parts:
        - id: si-3.9_smt
          name: statement
          prose: 'The information system implements [Assignment: organization-defined security safeguards]
            to authenticate [Assignment: organization-defined remote commands].'
      - id: si-3.10
        title: Malicious Code Analysis
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-3 (10)
        parts:
        - id: si-3.10_smt
          name: statement
          prose: "The organization:\n   (10)(a).  Employs [Assignment: organization-defined tools and\
            \ techniques] to\nanalyze the characteristics and behavior of malicious code; and\n   (10)(b).\
            \  Incorporates the results from malicious code analysis into organizational\nincident response\
            \ and flaw remediation processes."
    - id: si-4
      title: Information System Monitoring
      class: SP800-53
      props:
      - name: label
        value: SI-4
      parts:
      - id: si-4_smt
        name: statement
        prose: "The organization:\n  a.  Monitors the information system to detect:\n    1.  Attacks and\
          \ indicators of potential attacks in accordance with [Assignment:\norganization-defined monitoring\
          \ objectives]; and\n    2.  Unauthorized local, network, and remote connections;\n  b.  Identifies\
          \ unauthorized use of the information system through [Assignment:\norganization-defined techniques\
          \ and methods];\n  c.  Deploys monitoring devices:\n    1.  Strategically within the information\
          \ system to collect organization-determined\nessential information; and\n    2.  At ad hoc locations\
          \ within the system to track specific types of transactions\nof interest to the organization;\n\
          \  d.  Protects information obtained from intrusion-monitoring tools from unauthorized\naccess,\
          \ modification, and deletion;\n  e.  Heightens the level of information system monitoring activity\
          \ whenever there\nis an indication of increased risk to organizational operations and assets,\
          \ individuals, other organizations, or the Nation based on law enforcement information, intelligence\
          \ information, or other credible sources of information;\n  f.  Obtains legal opinion with regard\
          \ to information system monitoring activities\nin accordance with applicable federal laws, Executive\
          \ Orders, directives, policies, or regulations; and\n  g.  Provides [Assignment: organization-defined\
          \ information system monitoring\ninformation] to [Assignment: organization-defined personnel\
          \ or roles] [Selection (one or more): as needed; [Assignment: organization-defined frequency]]."
      controls:
      - id: si-4.1
        title: System-Wide Intrusion Detection System
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (1)
        parts:
        - id: si-4.1_smt
          name: statement
          prose: The organization connects and configures individual intrusion detection tools into an
            information system-wide intrusion detection system.
      - id: si-4.2
        title: Automated Tools For Real-Time Analysis
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (2)
        parts:
        - id: si-4.2_smt
          name: statement
          prose: The organization employs automated tools to support near real-time analysis of events.
      - id: si-4.3
        title: Automated Tool Integration
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (3)
        parts:
        - id: si-4.3_smt
          name: statement
          prose: The organization employs automated tools to integrate intrusion detection tools into
            access control and flow control mechanisms for rapid response to attacks by enabling reconfiguration
            of these mechanisms in support of attack isolation and elimination.
      - id: si-4.4
        title: Inbound And Outbound Communications Traffic
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (4)
        parts:
        - id: si-4.4_smt
          name: statement
          prose: 'The information system monitors inbound and outbound communications traffic [Assignment:
            organization-defined frequency] for unusual or unauthorized activities or conditions.'
      - id: si-4.5
        title: System-Generated Alerts
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (5)
        parts:
        - id: si-4.5_smt
          name: statement
          prose: 'The information system alerts [Assignment: organization-defined personnel or roles]
            when the following indications of compromise or potential compromise occur: [Assignment: organization-defined
            compromise indicators].'
      - id: si-4.6
        title: Restrict Non-Privileged Users
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (6)
        parts:
        - id: si-4.6_smt
          name: statement
          prose: '[Withdrawn: Incorporated into AC-6 (10)].'
      - id: si-4.7
        title: Automated Response To Suspicious Events
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (7)
        parts:
        - id: si-4.7_smt
          name: statement
          prose: 'The information system notifies [Assignment: organization-defined incident response
            personnel (identified by name and/or by role)] of detected suspicious events and takes [Assignment:
            organization-defined least-disruptive actions to terminate suspicious events].'
      - id: si-4.8
        title: Protection Of Monitoring Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (8)
        parts:
        - id: si-4.8_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SI-4].'
      - id: si-4.9
        title: Testing Of Monitoring Tools
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (9)
        parts:
        - id: si-4.9_smt
          name: statement
          prose: 'The organization tests intrusion-monitoring tools [Assignment: organization-defined
            frequency].'
      - id: si-4.10
        title: Visibility Of Encrypted Communications
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (10)
        parts:
        - id: si-4.10_smt
          name: statement
          prose: 'The organization makes provisions so that [Assignment: organization-defined encrypted
            communications traffic] is visible to [Assignment: organization-defined information system
            monitoring tools].'
      - id: si-4.11
        title: Analyze Communications Traffic Anomalies
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (11)
        parts:
        - id: si-4.11_smt
          name: statement
          prose: 'The organization analyzes outbound communications traffic at the external boundary of
            the information system and selected [Assignment: organization-defined interior points within
            the system (e.g., subnetworks, subsystems)] to discover anomalies.'
      - id: si-4.12
        title: Automated Alerts
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (12)
        parts:
        - id: si-4.12_smt
          name: statement
          prose: 'The organization employs automated mechanisms to alert security personnel of the following
            inappropriate or unusual activities with security implications: [Assignment: organization-defined
            activities that trigger alerts].'
      - id: si-4.13
        title: Analyze Traffic / Event Patterns
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (13)
        parts:
        - id: si-4.13_smt
          name: statement
          prose: "The organization:\n   (13)(a).  Analyzes communications traffic/event patterns for the\
            \ information\nsystem;\n   (13)(b).  Develops profiles representing common traffic patterns\
            \ and/or events;\nand\n   (13)(c).  Uses the traffic/event profiles in tuning system-monitoring\
            \ devices\nto reduce the number of false positives and the number of false negatives."
      - id: si-4.14
        title: Wireless Intrusion Detection
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (14)
        parts:
        - id: si-4.14_smt
          name: statement
          prose: The organization employs a wireless intrusion detection system to identify rogue wireless
            devices and to detect attack attempts and potential compromises/breaches to the information
            system.
      - id: si-4.15
        title: Wireless To Wireline Communications
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (15)
        parts:
        - id: si-4.15_smt
          name: statement
          prose: The organization employs an intrusion detection system to monitor wireless communications
            traffic as the traffic passes from wireless to wireline networks.
      - id: si-4.16
        title: Correlate Monitoring Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (16)
        parts:
        - id: si-4.16_smt
          name: statement
          prose: The organization correlates information from monitoring tools employed throughout the
            information system.
      - id: si-4.17
        title: Integrated Situational Awareness
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (17)
        parts:
        - id: si-4.17_smt
          name: statement
          prose: The organization correlates information from monitoring physical, cyber, and supply chain
            activities to achieve integrated, organization-wide situational awareness.
      - id: si-4.18
        title: Analyze Traffic / Covert Exfiltration
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (18)
        parts:
        - id: si-4.18_smt
          name: statement
          prose: 'The organization analyzes outbound communications traffic at the external boundary of
            the information system (i.e., system perimeter) and at [Assignment: organization-defined interior
            points within the system (e.g., subsystems, subnetworks)] to detect covert exfiltration of
            information.'
      - id: si-4.19
        title: Individuals Posing Greater Risk
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (19)
        parts:
        - id: si-4.19_smt
          name: statement
          prose: 'The organization implements [Assignment: organization-defined additional monitoring]
            of individuals who have been identified by [Assignment: organization-defined sources] as posing
            an increased level of risk.'
      - id: si-4.20
        title: Privileged Users
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (20)
        parts:
        - id: si-4.20_smt
          name: statement
          prose: 'The organization implements [Assignment: organization-defined additional monitoring]
            of privileged users.'
      - id: si-4.21
        title: Probationary Periods
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (21)
        parts:
        - id: si-4.21_smt
          name: statement
          prose: 'The organization implements [Assignment: organization-defined additional monitoring]
            of individuals during [Assignment: organization-defined probationary period].'
      - id: si-4.22
        title: Unauthorized Network Services
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (22)
        parts:
        - id: si-4.22_smt
          name: statement
          prose: 'The information system detects network services that have not been authorized or approved
            by [Assignment: organization-defined authorization or approval processes] and [Selection (one
            or more): audits; alerts [Assignment: organization-defined personnel or roles]].'
      - id: si-4.23
        title: Host-Based Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (23)
        parts:
        - id: si-4.23_smt
          name: statement
          prose: 'The organization implements [Assignment: organization-defined host-based monitoring
            mechanisms] at [Assignment: organization-defined information system components].'
      - id: si-4.24
        title: Indicators Of Compromise
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-4 (24)
        parts:
        - id: si-4.24_smt
          name: statement
          prose: The information system discovers, collects, distributes, and uses indicators of compromise.
    - id: si-5
      title: Security Alerts, Advisories, And Directives
      class: SP800-53
      props:
      - name: label
        value: SI-5
      parts:
      - id: si-5_smt
        name: statement
        prose: "The organization:\n  a.  Receives information system security alerts, advisories, and\
          \ directives\nfrom [Assignment: organization-defined external organizations] on an ongoing basis;\n\
          \  b.  Generates internal security alerts, advisories, and directives as deemed\nnecessary;\n\
          \  c.  Disseminates security alerts, advisories, and directives to: [Selection\n(one or more):\
          \ [Assignment: organization-defined personnel or roles]; [Assignment: organization-defined elements\
          \ within the organization]; [Assignment: organization-defined external organizations]]; and\n\
          \  d.  Implements security directives in accordance with established time frames,\nor notifies\
          \ the issuing organization of the degree of noncompliance."
      controls:
      - id: si-5.1
        title: Automated Alerts And Advisories
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-5 (1)
        parts:
        - id: si-5.1_smt
          name: statement
          prose: The organization employs automated mechanisms to make security alert and advisory information
            available throughout the organization.
    - id: si-6
      title: Security Function Verification
      class: SP800-53
      props:
      - name: label
        value: SI-6
      parts:
      - id: si-6_smt
        name: statement
        prose: "The information system:\n  a.  Verifies the correct operation of [Assignment: organization-defined\
          \ security\nfunctions];\n  b.  Performs this verification [Selection (one or more): [Assignment:\
          \ organization-defined\nsystem transitional states]; upon command by user with appropriate privilege;\
          \ [Assignment: organization-defined frequency]];\n  c.  Notifies [Assignment: organization-defined\
          \ personnel or roles] of failed\nsecurity verification tests; and\n  d.  [Selection (one or\
          \ more): shuts the information system down; restarts the\ninformation system; [Assignment: organization-defined\
          \ alternative action(s)]] when anomalies are discovered."
      controls:
      - id: si-6.1
        title: Notification Of Failed Security Tests
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-6 (1)
        parts:
        - id: si-6.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SI-6].'
      - id: si-6.2
        title: Automation Support For Distributed Testing
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-6 (2)
        parts:
        - id: si-6.2_smt
          name: statement
          prose: The information system implements automated mechanisms to support the management of distributed
            security testing.
      - id: si-6.3
        title: Report Verification Results
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-6 (3)
        parts:
        - id: si-6.3_smt
          name: statement
          prose: 'The organization reports the results of security function verification to [Assignment:
            organization-defined personnel or roles].'
    - id: si-7
      title: Software, Firmware, And Information Integrity
      class: SP800-53
      props:
      - name: label
        value: SI-7
      parts:
      - id: si-7_smt
        name: statement
        prose: 'The organization employs integrity verification tools to detect unauthorized changes to
          [Assignment: organization-defined software, firmware, and information].'
      controls:
      - id: si-7.1
        title: Integrity Checks
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (1)
        parts:
        - id: si-7.1_smt
          name: statement
          prose: 'The information system performs an integrity check of [Assignment: organization-defined
            software, firmware, and information] [Selection (one or more): at startup; at [Assignment:
            organization-defined transitional states or security-relevant events]; [Assignment: organization-defined
            frequency]].'
      - id: si-7.2
        title: Automated Notifications Of Integrity Violations
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (2)
        parts:
        - id: si-7.2_smt
          name: statement
          prose: 'The organization employs automated tools that provide notification to [Assignment: organization-defined
            personnel or roles] upon discovering discrepancies during integrity verification.'
      - id: si-7.3
        title: Centrally-Managed Integrity Tools
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (3)
        parts:
        - id: si-7.3_smt
          name: statement
          prose: The organization employs centrally managed integrity verification tools.
      - id: si-7.4
        title: Tamper-Evident Packaging
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (4)
        parts:
        - id: si-7.4_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SA-12].'
      - id: si-7.5
        title: Automated Response To Integrity Violations
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (5)
        parts:
        - id: si-7.5_smt
          name: statement
          prose: 'The information system automatically [Selection (one or more): shuts the information
            system down; restarts the information system; implements [Assignment: organization-defined
            security safeguards]] when integrity violations are discovered.'
      - id: si-7.6
        title: Cryptographic Protection
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (6)
        parts:
        - id: si-7.6_smt
          name: statement
          prose: The information system implements cryptographic mechanisms to detect unauthorized changes
            to software, firmware, and information.
      - id: si-7.7
        title: Integration Of Detection And Response
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (7)
        parts:
        - id: si-7.7_smt
          name: statement
          prose: 'The organization incorporates the detection of unauthorized [Assignment: organization-defined
            security-relevant changes to the information system] into the organizational incident response
            capability.'
      - id: si-7.8
        title: Auditing Capability For Significant Events
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (8)
        parts:
        - id: si-7.8_smt
          name: statement
          prose: 'The information system, upon detection of a potential integrity violation, provides
            the capability to audit the event and initiates the following actions: [Selection (one or
            more): generates an audit record; alerts current user; alerts [Assignment: organization-defined
            personnel or roles]; [Assignment: organization-defined other actions]].'
      - id: si-7.9
        title: Verify Boot Process
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (9)
        parts:
        - id: si-7.9_smt
          name: statement
          prose: 'The information system verifies the integrity of the boot process of [Assignment: organization-defined
            devices].'
      - id: si-7.10
        title: Protection Of Boot Firmware
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (10)
        parts:
        - id: si-7.10_smt
          name: statement
          prose: 'The information system implements [Assignment: organization-defined security safeguards]
            to protect the integrity of boot firmware in [Assignment: organization-defined devices].'
      - id: si-7.11
        title: Confined Environments With Limited Privileges
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (11)
        parts:
        - id: si-7.11_smt
          name: statement
          prose: 'The organization requires that [Assignment: organization-defined user-installed software]
            execute in a confined physical or virtual machine environment with limited privileges.'
      - id: si-7.12
        title: Integrity Verification
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (12)
        parts:
        - id: si-7.12_smt
          name: statement
          prose: 'The organization requires that the integrity of [Assignment: organization-defined user-installed
            software] be verified prior to execution.'
      - id: si-7.13
        title: Code Execution In Protected Environments
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (13)
        parts:
        - id: si-7.13_smt
          name: statement
          prose: 'The organization allows execution of binary or machine-executable code obtained from
            sources with limited or no warranty and without the provision of source code only in confined
            physical or virtual machine environments and with the explicit approval of [Assignment: organization-defined
            personnel or roles].'
      - id: si-7.14
        title: Binary Or Machine Executable Code
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (14)
        parts:
        - id: si-7.14_smt
          name: statement
          prose: "The organization:\n   (14)(a).  Prohibits the use of binary or machine-executable code\
            \ from sources\nwith limited or no warranty and without the provision of source code; and\n\
            \   (14)(b).  Provides exceptions to the source code requirement only for compelling\nmission/operational\
            \ requirements and with the approval of the authorizing official."
      - id: si-7.15
        title: Code Authentication
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (15)
        parts:
        - id: si-7.15_smt
          name: statement
          prose: 'The information system implements cryptographic mechanisms to authenticate [Assignment:
            organization-defined software or firmware components] prior to installation.'
      - id: si-7.16
        title: Time Limit On Process Execution W/O Supervision
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-7 (16)
        parts:
        - id: si-7.16_smt
          name: statement
          prose: 'The organization does not allow processes to execute without supervision for more than
            [Assignment: organization-defined time period].'
    - id: si-8
      title: Spam Protection
      class: SP800-53
      props:
      - name: label
        value: SI-8
      parts:
      - id: si-8_smt
        name: statement
        prose: "The organization:\n  a.  Employs spam protection mechanisms at information system entry\
          \ and exit\npoints to detect and take action on unsolicited messages; and\n  b.  Updates spam\
          \ protection mechanisms when new releases are available in accordance\nwith organizational configuration\
          \ management policy and procedures."
      controls:
      - id: si-8.1
        title: Central Management
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-8 (1)
        parts:
        - id: si-8.1_smt
          name: statement
          prose: The organization centrally manages spam protection mechanisms.
      - id: si-8.2
        title: Automatic Updates
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-8 (2)
        parts:
        - id: si-8.2_smt
          name: statement
          prose: The information system automatically updates spam protection mechanisms.
      - id: si-8.3
        title: Continuous Learning Capability
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-8 (3)
        parts:
        - id: si-8.3_smt
          name: statement
          prose: The information system implements spam protection mechanisms with a learning capability
            to more effectively identify legitimate communications traffic.
    - id: si-9
      title: Information Input Restrictions
      class: SP800-53
      props:
      - name: label
        value: SI-9
      parts:
      - id: si-9_smt
        name: statement
        prose: '[Withdrawn: Incorporated into AC-2, AC-3, AC-5, AC-6].'
    - id: si-10
      title: Information Input Validation
      class: SP800-53
      props:
      - name: label
        value: SI-10
      parts:
      - id: si-10_smt
        name: statement
        prose: 'The information system checks the validity of [Assignment: organization-defined information
          inputs].'
      controls:
      - id: si-10.1
        title: Manual Override Capability
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-10 (1)
        parts:
        - id: si-10.1_smt
          name: statement
          prose: "The information system:\n   (1)(a).  Provides a manual override capability for input\
            \ validation of [Assignment:\norganization-defined inputs];\n   (1)(b).  Restricts the use\
            \ of the manual override capability to only [Assignment:\norganization-defined authorized\
            \ individuals]; and\n   (1)(c).  Audits the use of the manual override capability."
      - id: si-10.2
        title: Review / Resolution Of Errors
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-10 (2)
        parts:
        - id: si-10.2_smt
          name: statement
          prose: 'The organization ensures that input validation errors are reviewed and resolved within
            [Assignment: organization-defined time period].'
      - id: si-10.3
        title: Predictable Behavior
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-10 (3)
        parts:
        - id: si-10.3_smt
          name: statement
          prose: The information system behaves in a predictable and documented manner that reflects organizational
            and system objectives when invalid inputs are received.
      - id: si-10.4
        title: Review / Timing Interactions
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-10 (4)
        parts:
        - id: si-10.4_smt
          name: statement
          prose: The organization accounts for timing interactions among information system components
            in determining appropriate responses for invalid inputs.
      - id: si-10.5
        title: Restrict Inputs To Trusted Sources And Approved Formats
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-10 (5)
        parts:
        - id: si-10.5_smt
          name: statement
          prose: 'The organization restricts the use of information inputs to [Assignment: organization-defined
            trusted sources] and/or [Assignment: organization-defined formats].'
    - id: si-11
      title: Error Handling
      class: SP800-53
      props:
      - name: label
        value: SI-11
      parts:
      - id: si-11_smt
        name: statement
        prose: "The information system:\n  a.  Generates error messages that provide information necessary\
          \ for corrective\nactions without revealing information that could be exploited by adversaries;\
          \ and\n  b.  Reveals error messages only to [Assignment: organization-defined personnel\nor\
          \ roles]."
    - id: si-12
      title: Information Handling And Retention
      class: SP800-53
      props:
      - name: label
        value: SI-12
      parts:
      - id: si-12_smt
        name: statement
        prose: The organization handles and retains information within the information system and information
          output from the system in accordance with applicable federal laws, Executive Orders, directives,
          policies, regulations, standards, and operational requirements.
    - id: si-13
      title: Predictable Failure Prevention
      class: SP800-53
      props:
      - name: label
        value: SI-13
      parts:
      - id: si-13_smt
        name: statement
        prose: "The organization:\n  a.  Determines mean time to failure (MTTF) for [Assignment: organization-defined\n\
          information system components] in specific environments of operation; and\n  b.  Provides substitute\
          \ information system components and a means to exchange\nactive and standby components at [Assignment:\
          \ organization-defined MTTF substitution criteria]."
      controls:
      - id: si-13.1
        title: Transferring Component Responsibilities
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-13 (1)
        parts:
        - id: si-13.1_smt
          name: statement
          prose: 'The organization takes information system components out of service by transferring
            component responsibilities to substitute components no later than [Assignment: organization-defined
            fraction or percentage] of mean time to failure.'
      - id: si-13.2
        title: Time Limit On Process Execution Without Supervision
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-13 (2)
        parts:
        - id: si-13.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SI-7 (16)].'
      - id: si-13.3
        title: Manual Transfer Between Components
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-13 (3)
        parts:
        - id: si-13.3_smt
          name: statement
          prose: 'The organization manually initiates transfers between active and standby information
            system components [Assignment: organization-defined frequency] if the mean time to failure
            exceeds [Assignment: organization-defined time period].'
      - id: si-13.4
        title: Standby Component Installation / Notification
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-13 (4)
        parts:
        - id: si-13.4_smt
          name: statement
          prose: "The organization, if information system component failures are detected:\n   (4)(a).\
            \  Ensures that the standby components are successfully and transparently\ninstalled within\
            \ [Assignment: organization-defined time period]; and\n   (4)(b).  [Selection (one or more):\
            \ activates [Assignment: organization-defined\nalarm]; automatically shuts down the information\
            \ system]."
      - id: si-13.5
        title: Failover Capability
        class: SP800-53-enhancement
        props:
        - name: label
          value: SI-13 (5)
        parts:
        - id: si-13.5_smt
          name: statement
          prose: 'The organization provides [Selection: real-time; near real-time] [Assignment: organization-defined
            failover capability] for the information system.'
    - id: si-14
      title: Non-Persistence
      class: SP800-53
      props:
      - name: label
        value: SI-14
      parts:
      - id: si-14_smt
        name: statement
        prose: 'The organization implements non-persistent [Assignment: organization-defined information
          system components and services] that are initiated in a known state and terminated [Selection
          (one or more): upon end of session of use; periodically at [Assignment: organization-defined
          frequency]].'
      controls:

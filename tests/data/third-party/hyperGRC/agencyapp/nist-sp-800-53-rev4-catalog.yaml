    - id: sa-8
      title: Security Engineering Principles
      class: SP800-53
      props:
      - name: label
        value: SA-8
      parts:
      - id: sa-8_smt
        name: statement
        prose: The organization applies information system security engineering principles in the specification,
          design, development, implementation, and modification of the information system.
    - id: sa-9
      title: External Information System Services
      class: SP800-53
      props:
      - name: label
        value: SA-9
      parts:
      - id: sa-9_smt
        name: statement
        prose: "The organization:\n  a.  Requires that providers of external information system services\
          \ comply with\norganizational information security requirements and employ [Assignment: organization-defined\
          \ security controls] in accordance with applicable federal laws, Executive Orders, directives,\
          \ policies, regulations, standards, and guidance;\n  b.  Defines and documents government oversight\
          \ and user roles and responsibilities\nwith regard  to external information system services;\
          \ and\n  c.  Employs [Assignment: organization-defined processes, methods, and techniques]\n\
          to monitor security control compliance by external service providers on an ongoing basis."
      controls:
      - id: sa-9.1
        title: Risk Assessments / Organizational Approvals
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-9 (1)
        parts:
        - id: sa-9.1_smt
          name: statement
          prose: "The organization:\n   (1)(a).  Conducts an organizational assessment of risk prior to\
            \ the acquisition\nor outsourcing of dedicated information security services; and\n   (1)(b).\
            \  Ensures that the acquisition or outsourcing of dedicated information\nsecurity services\
            \ is approved by [Assignment: organization-defined personnel or roles]."
      - id: sa-9.2
        title: Identification Of Functions / Ports / Protocols / Services
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-9 (2)
        parts:
        - id: sa-9.2_smt
          name: statement
          prose: 'The organization requires providers of [Assignment: organization-defined external information
            system services] to identify the functions, ports, protocols, and other services required
            for the use of such services.'
      - id: sa-9.3
        title: Establish / Maintain Trust Relationship With Providers
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-9 (3)
        parts:
        - id: sa-9.3_smt
          name: statement
          prose: 'The organization establishes, documents, and maintains trust relationships with external
            service providers based on [Assignment: organization-defined security requirements, properties,
            factors, or conditions defining acceptable trust relationships].'
      - id: sa-9.4
        title: Consistent Interests Of Consumers And Providers
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-9 (4)
        parts:
        - id: sa-9.4_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined security safeguards] to ensure
            that the interests of [Assignment: organization-defined external service providers] are consistent
            with and reflect organizational interests.'
      - id: sa-9.5
        title: Processing, Storage, And Service Location
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-9 (5)
        parts:
        - id: sa-9.5_smt
          name: statement
          prose: 'The organization restricts the location of [Selection (one or more): information processing;
            information/data; information system services] to [Assignment: organization-defined locations]
            based on [Assignment: organization-defined requirements or conditions].'
    - id: sa-10
      title: Developer Configuration Management
      class: SP800-53
      props:
      - name: label
        value: SA-10
      parts:
      - id: sa-10_smt
        name: statement
        prose: "The organization requires the developer of the information system, system component, or\
          \ information system service to:\n  a.  Perform configuration management during system, component,\
          \ or service [Selection\n(one or more): design; development; implementation; operation];\n \
          \ b.  Document, manage, and control the integrity of changes to [Assignment: organization-defined\n\
          configuration items under configuration management];\n  c.  Implement only organization-approved\
          \ changes to the system, component, or\nservice;\n  d.  Document approved changes to the system,\
          \ component, or service and the potential\nsecurity impacts of such changes; and\n  e.  Track\
          \ security flaws and flaw resolution within the system, component, or\nservice and report findings\
          \ to [Assignment: organization-defined personnel]."
      controls:
      - id: sa-10.1
        title: Software / Firmware Integrity Verification
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-10 (1)
        parts:
        - id: sa-10.1_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to enable integrity verification of software and firmware components.
      - id: sa-10.2
        title: Alternative Configuration Management Processes
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-10 (2)
        parts:
        - id: sa-10.2_smt
          name: statement
          prose: The organization provides an alternate configuration management process using organizational
            personnel in the absence of a dedicated developer configuration management team.
      - id: sa-10.3
        title: Hardware Integrity Verification
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-10 (3)
        parts:
        - id: sa-10.3_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to enable integrity verification of hardware components.
      - id: sa-10.4
        title: Trusted Generation
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-10 (4)
        parts:
        - id: sa-10.4_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to employ tools for comparing newly generated versions of security-relevant
            hardware descriptions and software/firmware source and object code with previous versions.
      - id: sa-10.5
        title: Mapping Integrity For Version Control
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-10 (5)
        parts:
        - id: sa-10.5_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to maintain the integrity of the mapping between the  master
            build data (hardware drawings and software/firmware code) describing the current version of
            security-relevant hardware, software, and firmware and the on-site master copy of the data
            for the current version.
      - id: sa-10.6
        title: Trusted Distribution
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-10 (6)
        parts:
        - id: sa-10.6_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to execute procedures for ensuring that security-relevant hardware,
            software, and firmware updates distributed to the organization are exactly as specified by
            the master copies.
    - id: sa-11
      title: Developer Security Testing And Evaluation
      class: SP800-53
      props:
      - name: label
        value: SA-11
      parts:
      - id: sa-11_smt
        name: statement
        prose: "The organization requires the developer of the information system, system component, or\
          \ information system service to:\n  a.  Create and implement a security assessment plan;\n \
          \ b.  Perform [Selection (one or more): unit; integration; system; regression]\ntesting/evaluation\
          \ at [Assignment: organization-defined depth and coverage];\n  c.  Produce evidence of the execution\
          \ of the security assessment plan and the\nresults of the security testing/evaluation;\n  d.\
          \  Implement a verifiable flaw remediation process; and\n  e.  Correct flaws identified during\
          \ security testing/evaluation."
      controls:
      - id: sa-11.1
        title: Static Code Analysis
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-11 (1)
        parts:
        - id: sa-11.1_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to employ static code analysis tools to identify common flaws
            and document the results of the analysis.
      - id: sa-11.2
        title: Threat And Vulnerability Analyses
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-11 (2)
        parts:
        - id: sa-11.2_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to perform threat and vulnerability analyses and subsequent
            testing/evaluation of the as-built system, component, or service.
      - id: sa-11.3
        title: Independent Verification Of Assessment Plans / Evidence
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-11 (3)
        parts:
        - id: sa-11.3_smt
          name: statement
          prose: "The organization:\n   (3)(a).  Requires an independent agent satisfying [Assignment:\
            \ organization-defined\nindependence criteria] to verify the correct implementation of the\
            \ developer security assessment plan and the evidence produced during security testing/evaluation;\
            \ and\n   (3)(b).  Ensures that the independent agent is either provided with sufficient\n\
            information to complete the verification process or granted the authority to obtain such information."
      - id: sa-11.4
        title: Manual Code Reviews
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-11 (4)
        parts:
        - id: sa-11.4_smt
          name: statement
          prose: 'The organization requires the developer of the information system, system component,
            or information system service to perform a manual code review of [Assignment: organization-defined
            specific code] using [Assignment: organization-defined processes, procedures, and/or techniques].'
      - id: sa-11.5
        title: Penetration Testing
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-11 (5)
        parts:
        - id: sa-11.5_smt
          name: statement
          prose: 'The organization requires the developer of the information system, system component,
            or information system service to perform penetration testing at [Assignment: organization-defined
            breadth/depth] and with [Assignment: organization-defined constraints].'
      - id: sa-11.6
        title: Attack Surface Reviews
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-11 (6)
        parts:
        - id: sa-11.6_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to perform attack surface reviews.
      - id: sa-11.7
        title: Verify Scope Of Testing / Evaluation
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-11 (7)
        parts:
        - id: sa-11.7_smt
          name: statement
          prose: 'The organization requires the developer of the information system, system component,
            or information system service to verify that the scope of security testing/evaluation provides
            complete coverage of required security controls at [Assignment: organization-defined depth
            of testing/evaluation].'
      - id: sa-11.8
        title: Dynamic Code Analysis
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-11 (8)
        parts:
        - id: sa-11.8_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to employ dynamic code analysis tools to identify common flaws
            and document the results of the analysis.
    - id: sa-12

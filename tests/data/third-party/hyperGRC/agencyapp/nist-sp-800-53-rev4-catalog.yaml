catalog:
  uuid: 87c1b49b-9a48-5353-8411-5821391c32f3
  metadata:
    title: NIST SP 800-53 Revision 4
    last-modified: '2024-01-15T00:00:00.000Z'
    version: '4'
    oscal-version: 1.1.3
    remarks: 'Converted from hyperGRC OpenControl standards/NIST-SP-800-53-rev4.yaml. Source: https://github.com/GovReady/hyperGRC/tree/master/example/agencyapp'
  groups:
  - id: ac
    title: Access Control
    class: family
    props:
    - name: label
      value: AC
    controls:
    - id: ac-1
      title: Access Control Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: AC-1
      parts:
      - id: ac-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  An access control policy that addresses purpose, scope, roles,\
          \ responsibilities,\nmanagement commitment, coordination among organizational entities, and\
          \ compliance; and\n    2.  Procedures to facilitate the implementation of the access control\
          \ policy\nand associated access controls; and\n  b.  Reviews and updates the current:\n    1.\
          \  Access control policy [Assignment: organization-defined frequency]; and\n    2.  Access control\
          \ procedures [Assignment: organization-defined frequency]."
    - id: ac-2
      title: Account Management
      class: SP800-53
      props:
      - name: label
        value: AC-2
      parts:
      - id: ac-2_smt
        name: statement
        prose: "The organization:\n  a.  Identifies and selects the following types of information system\
          \ accounts\nto support organizational missions/business functions: [Assignment: organization-defined\
          \ information system account types];\n  b.  Assigns account managers for information system\
          \ accounts;\n  c.  Establishes conditions for group and role membership;\n  d.  Specifies authorized\
          \ users of the information system, group and role membership,\nand access authorizations (i.e.,\
          \ privileges) and other attributes (as required) for each account;\n  e.  Requires approvals\
          \ by [Assignment: organization-defined personnel or roles]\nfor requests to create information\
          \ system accounts;\n  f.  Creates, enables, modifies, disables, and removes information system\
          \ accounts\nin accordance with [Assignment: organization-defined procedures or conditions];\n\
          \  g.  Monitors the use of information system accounts;\n  h.  Notifies account managers:\n\
          \    1.  When accounts are no longer required;\n    2.  When users are terminated or transferred;\
          \ and\n    3.  When individual information system usage or need-to-know changes;\n  i.  Authorizes\
          \ access to the information system based on:\n    1.  A valid access authorization;\n    2.\
          \  Intended system usage; and\n    3.  Other attributes as required by the organization or associated\
          \ missions/business\nfunctions;\n  j.  Reviews accounts for compliance with account management\
          \ requirements [Assignment:\norganization-defined frequency]; and\n  k.  Establishes a process\
          \ for reissuing shared/group account credentials (if\ndeployed) when individuals are removed\
          \ from the group."
      controls:
      - id: ac-2.1
        title: Automated System Account Management
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (1)
        parts:
        - id: ac-2.1_smt
          name: statement
          prose: The organization employs automated mechanisms to support the management of information
            system accounts.
      - id: ac-2.2
        title: Removal Of Temporary / Emergency Accounts
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (2)
        parts:
        - id: ac-2.2_smt
          name: statement
          prose: 'The information system automatically [Selection: removes; disables] temporary and emergency
            accounts after [Assignment: organization-defined time period for each type of account].'
      - id: ac-2.3
        title: Disable Inactive Accounts
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (3)
        parts:
        - id: ac-2.3_smt
          name: statement
          prose: 'The information system automatically disables inactive accounts after [Assignment: organization-defined
            time period].'
      - id: ac-2.4
        title: Automated Audit Actions
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (4)
        parts:
        - id: ac-2.4_smt
          name: statement
          prose: 'The information system automatically audits account creation, modification, enabling,
            disabling, and removal actions, and notifies [Assignment: organization-defined personnel or
            roles].'
      - id: ac-2.5
        title: Inactivity Logout
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (5)
        parts:
        - id: ac-2.5_smt
          name: statement
          prose: 'The organization requires that users log out when [Assignment: organization-defined
            time-period of expected inactivity or description of when to log out].'
      - id: ac-2.6
        title: Dynamic Privilege Management
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (6)
        parts:
        - id: ac-2.6_smt
          name: statement
          prose: 'The information system implements the following dynamic privilege management capabilities:
            [Assignment: organization-defined list of dynamic privilege management capabilities].'
      - id: ac-2.7
        title: Role-Based Schemes
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (7)
        parts:
        - id: ac-2.7_smt
          name: statement
          prose: "The organization:\n   (7)(a).  Establishes and administers privileged user accounts\
            \ in accordance\nwith a role-based access scheme that organizes allowed information system\
            \ access and privileges into roles;\n   (7)(b).  Monitors privileged role assignments; and\n\
            \   (7)(c).  Takes [Assignment: organization-defined actions] when privileged role\nassignments\
            \ are no longer appropriate."
      - id: ac-2.8
        title: Dynamic Account Creation
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (8)
        parts:
        - id: ac-2.8_smt
          name: statement
          prose: 'The information system creates [Assignment: organization-defined information system
            accounts] dynamically.'
      - id: ac-2.9
        title: Restrictions On Use Of Shared / Group Accounts
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (9)
        parts:
        - id: ac-2.9_smt
          name: statement
          prose: 'The organization only permits the use of shared/group accounts that meet [Assignment:
            organization-defined conditions for establishing shared/group accounts].'
      - id: ac-2.10
        title: Shared / Group Account Credential Termination
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (10)
        parts:
        - id: ac-2.10_smt
          name: statement
          prose: The information system terminates shared/group account credentials when members leave
            the group.
      - id: ac-2.11
        title: Usage Conditions
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (11)
        parts:
        - id: ac-2.11_smt
          name: statement
          prose: 'The information system enforces [Assignment: organization-defined circumstances and/or
            usage conditions] for [Assignment: organization-defined information system accounts].'
      - id: ac-2.12
        title: Account Monitoring / Atypical Usage
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (12)
        parts:
        - id: ac-2.12_smt
          name: statement
          prose: "The organization:\n   (12)(a).  Monitors information system accounts for [Assignment:\
            \ organization-defined\natypical usage]; and\n   (12)(b).  Reports atypical usage of information\
            \ system accounts to [Assignment:\norganization-defined personnel or roles]."
      - id: ac-2.13
        title: Disable Accounts For High-Risk Individuals
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-2 (13)
        parts:
        - id: ac-2.13_smt
          name: statement
          prose: 'The organization disables accounts of users posing a significant risk within [Assignment:
            organization-defined time period] of discovery of the risk.'
    - id: ac-3
      title: Access Enforcement
      class: SP800-53
      props:
      - name: label
        value: AC-3
      parts:
      - id: ac-3_smt
        name: statement
        prose: The information system enforces approved authorizations for logical access to information           and
          system resources in accordance with applicable access control policies.
      controls:
      - id: ac-3.1
        title: Restricted Access To Privileged Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-3 (1)
        parts:
        - id: ac-3.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into AC-6].'
      - id: ac-3.2
        title: Dual Authorization
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-3 (2)
        parts:
        - id: ac-3.2_smt
          name: statement
          prose: 'The information system enforces dual authorization for [Assignment: organization-defined
            privileged commands and/or other organization-defined actions].'
      - id: ac-3.3
        title: Mandatory Access Control
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-3 (3)
        parts:
        - id: ac-3.3_smt
          name: statement
          prose: "The information system enforces [Assignment: organization-defined mandatory access control\
            \ policy] over all subjects and objects where the policy:\n   (3)(a).  Is uniformly enforced\
            \ across all subjects and objects within the boundary\nof the information system;\n   (3)(b).\
            \  Specifies that a subject that has been granted access to information\nis constrained from\
            \ doing any of the following;\n   (3)(b)(1).  Passing the information to unauthorized subjects\
            \ or objects;\n   (3)(b)(2).  Granting its privileges to other subjects;\n   (3)(b)(3).  Changing\
            \ one or more security attributes on subjects, objects,\nthe information system, or information\
            \ system components;\n   (3)(b)(4).  Choosing the security attributes and attribute values\
            \ to be associated\nwith newly created or modified objects; or\n   (3)(b)(5).  Changing the\
            \ rules governing access control; and\n   (3)(c).  Specifies that [Assignment: organization-defined\
            \ subjects] may explicitly\nbe granted [Assignment: organization-defined privileges (i.e.,\
            \ they are trusted subjects)] such that they are not limited by some or all of the above constraints."
      - id: ac-3.4
        title: Discretionary Access Control
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-3 (4)
        parts:
        - id: ac-3.4_smt
          name: statement
          prose: "The information system enforces [Assignment: organization-defined discretionary access\
            \ control policy] over defined subjects and objects where the policy specifies that a subject\
            \ that has been granted access to information can do one or more of the following:\n   (4)(a).\
            \  Pass the  information to any other subjects or objects;\n   (4)(b).  Grant its privileges\
            \ to other subjects;\n   (4)(c).  Change security attributes on subjects, objects, the information\
            \ system,\nor the information system�s components;\n   (4)(d).  Choose the security attributes\
            \ to be associated with newly created\nor revised objects; or\n   (4)(e).  Change the rules\
            \ governing access control."
      - id: ac-3.5
        title: Security-Relevant Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-3 (5)
        parts:
        - id: ac-3.5_smt
          name: statement
          prose: 'The information system prevents access to [Assignment: organization-defined security-relevant
            information] except during secure, non-operable system states.'
      - id: ac-3.6
        title: Protection Of User And System Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-3 (6)
        parts:
        - id: ac-3.6_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-4 and SC-28].'
      - id: ac-3.7
        title: Role-Based Access Control
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-3 (7)
        parts:
        - id: ac-3.7_smt
          name: statement
          prose: 'The information system enforces a role-based access control policy over defined subjects
            and objects and controls access based upon [Assignment: organization-defined roles and users
            authorized to assume such roles].'
      - id: ac-3.8
        title: Revocation Of Access Authorizations
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-3 (8)
        parts:
        - id: ac-3.8_smt
          name: statement
          prose: 'The information system enforces the revocation of access authorizations resulting from
            changes to the security attributes of subjects and objects based on [Assignment: organization-defined
            rules governing the timing of revocations of access authorizations].'
      - id: ac-3.9
        title: Controlled Release
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-3 (9)
        parts:
        - id: ac-3.9_smt
          name: statement
          prose: "The information system does not release information outside of the established system\
            \ boundary unless:\n   (9)(a).  The receiving [Assignment: organization-defined information\
            \ system\nor system component] provides [Assignment: organization-defined security safeguards];\
            \ and\n   (9)(b).  [Assignment: organization-defined security safeguards] are used to\nvalidate\
            \ the appropriateness of the information designated for release."
      - id: ac-3.10
        title: Audited Override Of Access Control Mechanisms
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-3 (10)
        parts:
        - id: ac-3.10_smt
          name: statement
          prose: 'The organization employs an audited override of automated access control mechanisms
            under [Assignment: organization-defined conditions].'
    - id: ac-4
      title: Information Flow Enforcement
      class: SP800-53
      props:
      - name: label
        value: AC-4
      parts:
      - id: ac-4_smt
        name: statement
        prose: 'The information system enforces approved authorizations for controlling the flow of information
          within the system and between interconnected systems based on [Assignment: organization-defined
          information flow control policies].'
      controls:
      - id: ac-4.1
        title: Object Security Attributes
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (1)
        parts:
        - id: ac-4.1_smt
          name: statement
          prose: 'The information system uses [Assignment: organization-defined security attributes] associated
            with [Assignment: organization-defined information, source, and destination objects] to enforce
            [Assignment: organization-defined information flow control policies] as a basis for flow control
            decisions.'
      - id: ac-4.2
        title: Processing Domains
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (2)
        parts:
        - id: ac-4.2_smt
          name: statement
          prose: 'The information system uses protected processing domains to enforce [Assignment: organization-defined
            information flow control policies] as a basis for flow control decisions.'
      - id: ac-4.3
        title: Dynamic Information Flow Control
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (3)
        parts:
        - id: ac-4.3_smt
          name: statement
          prose: 'The information system enforces dynamic information flow control based on [Assignment:
            organization-defined policies].'
      - id: ac-4.4
        title: Content Check Encrypted Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (4)
        parts:
        - id: ac-4.4_smt
          name: statement
          prose: 'The information system prevents encrypted information from bypassing content-checking
            mechanisms by [Selection (one or more): decrypting the information; blocking the flow of the
            encrypted information; terminating communications sessions attempting to pass encrypted information;
            [Assignment: organization-defined procedure or method]].'
      - id: ac-4.5
        title: Embedded Data Types
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (5)
        parts:
        - id: ac-4.5_smt
          name: statement
          prose: 'The information system enforces [Assignment: organization-defined limitations] on embedding
            data types within other data types.'
      - id: ac-4.6
        title: Metadata
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (6)
        parts:
        - id: ac-4.6_smt
          name: statement
          prose: 'The information system enforces information flow control based on [Assignment: organization-defined
            metadata].'
      - id: ac-4.7
        title: One-Way Flow Mechanisms
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (7)
        parts:
        - id: ac-4.7_smt
          name: statement
          prose: 'The information system enforces [Assignment: organization-defined one-way information
            flows] using hardware mechanisms.'
      - id: ac-4.8
        title: Security Policy Filters
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (8)
        parts:
        - id: ac-4.8_smt
          name: statement
          prose: 'The information system enforces information flow control using [Assignment: organization-defined
            security policy filters] as a basis for flow control decisions for [Assignment: organization-defined
            information flows].'
      - id: ac-4.9
        title: Human Reviews
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (9)
        parts:
        - id: ac-4.9_smt
          name: statement
          prose: 'The information system enforces the use of human reviews for [Assignment: organization-defined
            information flows] under the following conditions: [Assignment: organization-defined conditions].'
      - id: ac-4.10
        title: Enable / Disable Security Policy Filters
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (10)
        parts:
        - id: ac-4.10_smt
          name: statement
          prose: 'The information system provides the capability for privileged administrators to enable/disable
            [Assignment: organization-defined security policy filters] under the following conditions:
            [Assignment: organization-defined conditions].'
      - id: ac-4.11
        title: Configuration Of Security Policy Filters
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (11)
        parts:
        - id: ac-4.11_smt
          name: statement
          prose: 'The information system provides the capability for privileged administrators to configure
            [Assignment: organization-defined security policy filters] to support different security policies.'
      - id: ac-4.12
        title: Data Type Identifiers
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (12)
        parts:
        - id: ac-4.12_smt
          name: statement
          prose: 'The information system, when transferring information between different security domains,
            uses [Assignment: organization-defined data type identifiers] to validate data essential for
            information flow decisions.'
      - id: ac-4.13
        title: Decomposition Into Policy-Relevant Subcomponents
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (13)
        parts:
        - id: ac-4.13_smt
          name: statement
          prose: 'The information system, when transferring information between different security domains,
            decomposes information into [Assignment: organization-defined policy-relevant subcomponents]
            for submission to policy enforcement mechanisms.'
      - id: ac-4.14
        title: Security Policy Filter Constraints
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (14)
        parts:
        - id: ac-4.14_smt
          name: statement
          prose: 'The information system, when transferring information between different security domains,
            implements [Assignment: organization-defined security policy filters] requiring fully enumerated
            formats that restrict data structure and content.'
      - id: ac-4.15
        title: Detection Of Unsanctioned Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (15)
        parts:
        - id: ac-4.15_smt
          name: statement
          prose: 'The information system, when transferring information between different security domains,
            examines the information for the presence of [Assignment: organized-defined unsanctioned information]
            and prohibits the transfer of such information in accordance with the [Assignment: organization-defined
            security policy].'
      - id: ac-4.16
        title: Information Transfers On Interconnected Systems
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (16)
        parts:
        - id: ac-4.16_smt
          name: statement
          prose: '[Withdrawn: Incorporated into AC-4].'
      - id: ac-4.17
        title: Domain Authentication
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (17)
        parts:
        - id: ac-4.17_smt
          name: statement
          prose: 'The information system uniquely identifies and authenticates source and destination
            points by [Selection (one or more): organization, system, application, individual] for information
            transfer.'
      - id: ac-4.18
        title: Security Attribute Binding
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (18)
        parts:
        - id: ac-4.18_smt
          name: statement
          prose: 'The information system binds security attributes to information using [Assignment: organization-defined
            binding techniques] to facilitate information flow policy enforcement.'
      - id: ac-4.19
        title: Validation Of Metadata
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (19)
        parts:
        - id: ac-4.19_smt
          name: statement
          prose: The information system, when transferring information between different security domains,
            applies the same security policy filtering to metadata as it applies to data payloads.
      - id: ac-4.20
        title: Approved Solutions
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (20)
        parts:
        - id: ac-4.20_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined solutions in approved configurations]
            to control the flow of [Assignment: organization-defined information] across security domains.'
      - id: ac-4.21
        title: Physical / Logical Separation Of Information Flows
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (21)
        parts:
        - id: ac-4.21_smt
          name: statement
          prose: 'The information system separates information flows logically or physically using [Assignment:
            organization-defined mechanisms and/or techniques] to accomplish [Assignment: organization-defined
            required separations by types of information].'
      - id: ac-4.22
        title: Access Only
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-4 (22)
        parts:
        - id: ac-4.22_smt
          name: statement
          prose: The information system provides access from a single device to computing platforms, applications,
            or data residing on multiple different security domains, while preventing any information
            flow between the different security domains.
    - id: ac-5
      title: Separation Of Duties
      class: SP800-53
      props:
      - name: label
        value: AC-5
      parts:
      - id: ac-5_smt
        name: statement
        prose: "The organization:\n  a.  Separates [Assignment: organization-defined duties of individuals];\n\
          \  b.  Documents separation of duties of individuals; and\n  c.  Defines information system\
          \ access authorizations to support separation of duties."
    - id: ac-6
      title: Least Privilege
      class: SP800-53
      props:
      - name: label
        value: AC-6
      parts:
      - id: ac-6_smt
        name: statement
        prose: The organization employs the principle of least privilege, allowing only authorized accesses
          for users (or processes acting on behalf of users) which are necessary to accomplish assigned
          tasks in accordance with organizational missions and business functions.
      controls:
      - id: ac-6.1
        title: Authorize Access To Security Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-6 (1)
        parts:
        - id: ac-6.1_smt
          name: statement
          prose: 'The organization explicitly authorizes access to [Assignment: organization-defined security
            functions (deployed in hardware, software, and firmware) and security-relevant information].'
      - id: ac-6.2
        title: Non-Privileged Access For Nonsecurity Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-6 (2)
        parts:
        - id: ac-6.2_smt
          name: statement
          prose: 'The organization requires that users of information system accounts, or roles, with
            access to [Assignment: organization-defined security functions or security-relevant information],
            use non-privileged accounts or roles, when accessing nonsecurity functions.'
      - id: ac-6.3
        title: Network Access To Privileged Commands
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-6 (3)
        parts:
        - id: ac-6.3_smt
          name: statement
          prose: 'The organization authorizes network access to [Assignment: organization-defined privileged
            commands] only for [Assignment: organization-defined compelling operational needs] and documents
            the rationale for such access in the security plan for the information system.'
      - id: ac-6.4
        title: Separate Processing Domains
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-6 (4)
        parts:
        - id: ac-6.4_smt
          name: statement
          prose: The information system provides separate processing domains to enable finer-grained allocation
            of user privileges.
      - id: ac-6.5
        title: Privileged Accounts
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-6 (5)
        parts:
        - id: ac-6.5_smt
          name: statement
          prose: 'The organization restricts privileged accounts on the information system to [Assignment:
            organization-defined personnel or roles].'
      - id: ac-6.6
        title: Privileged Access By Non-Organizational Users
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-6 (6)
        parts:
        - id: ac-6.6_smt
          name: statement
          prose: The organization prohibits privileged access to the information system by non-organizational
            users.
      - id: ac-6.7
        title: Review Of User Privileges
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-6 (7)
        parts:
        - id: ac-6.7_smt
          name: statement
          prose: "The organization:\n   (7)(a).  Reviews [Assignment: organization-defined frequency]\
            \ the privileges\nassigned to [Assignment: organization-defined roles or classes of users]\
            \ to validate the need for such privileges; and\n   (7)(b).  Reassigns or removes privileges,\
            \ if necessary, to correctly reflect\norganizational mission/business needs."
      - id: ac-6.8
        title: Privilege Levels For Code Execution
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-6 (8)
        parts:
        - id: ac-6.8_smt
          name: statement
          prose: 'The information system prevents [Assignment: organization-defined software] from executing
            at higher privilege levels than users executing the software.'
      - id: ac-6.9
        title: Auditing Use Of Privileged Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-6 (9)
        parts:
        - id: ac-6.9_smt
          name: statement
          prose: The information system audits the execution of privileged functions.
      - id: ac-6.10
        title: Prohibit Non-Privileged Users From Executing Privileged Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-6 (10)
        parts:
        - id: ac-6.10_smt
          name: statement
          prose: The information system prevents non-privileged users from executing privileged functions
            to include disabling, circumventing, or altering implemented security safeguards/countermeasures.
    - id: ac-7
      title: Unsuccessful Logon Attempts
      class: SP800-53
      props:
      - name: label
        value: AC-7
      parts:
      - id: ac-7_smt
        name: statement
        prose: "The information system:\n  a.  Enforces a limit of [Assignment: organization-defined number]\
          \ consecutive\ninvalid logon attempts by a user during a [Assignment: organization-defined time\
          \ period]; and\n  b.  Automatically [Selection: locks the account/node for an [Assignment: organization-defined\n\
          time period]; locks the account/node until released by an administrator; delays next logon prompt\
          \ according to [Assignment: organization-defined delay algorithm]] when the maximum number of\
          \ unsuccessful attempts is exceeded."
      controls:
      - id: ac-7.1
        title: Automatic Account Lock
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-7 (1)
        parts:
        - id: ac-7.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into AC-7].'
      - id: ac-7.2
        title: Purge / Wipe Mobile Device
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-7 (2)
        parts:
        - id: ac-7.2_smt
          name: statement
          prose: 'The information system purges/wipes information from [Assignment: organization-defined
            mobile devices] based on [Assignment: organization-defined purging/wiping requirements/techniques]
            after [Assignment: organization-defined number] consecutive, unsuccessful device logon attempts.'
    - id: ac-8
      title: System Use Notification
      class: SP800-53
      props:
      - name: label
        value: AC-8
      parts:
      - id: ac-8_smt
        name: statement
        prose: "The information system:\n  a.  Displays to users [Assignment: organization-defined system\
          \ use notification\nmessage or banner] before granting access to the system that provides privacy\
          \ and security notices consistent with applicable federal laws, Executive Orders, directives,\
          \ policies, regulations, standards, and guidance and states that:\n    1.  Users are accessing\
          \ a U.S. Government information system;\n    2.  Information system usage may be monitored,\
          \ recorded, and subject to audit;\n    3.  Unauthorized use of the information system is prohibited\
          \ and subject to\ncriminal and civil penalties; and\n    4.  Use of the information system indicates\
          \ consent to monitoring and recording;\n  b.  Retains the notification message or banner on\
          \ the screen until users acknowledge\nthe usage conditions and take explicit actions to log\
          \ on to or further access the information system; and\n  c.  For publicly accessible systems:\n\
          \    1.  Displays system use information [Assignment: organization-defined conditions],\nbefore\
          \ granting further access;\n    2.  Displays references, if any, to monitoring, recording, or\
          \ auditing that\nare consistent with privacy accommodations for such systems that generally\
          \ prohibit those activities; and\n    3.  Includes a description of the authorized uses of the\
          \ system."
    - id: ac-9
      title: Previous Logon (Access) Notification
      class: SP800-53
      props:
      - name: label
        value: AC-9
      parts:
      - id: ac-9_smt
        name: statement
        prose: The information system notifies the user, upon successful logon (access) to the system,
          of the date and time of the last logon (access).
      controls:
      - id: ac-9.1
        title: Unsuccessful Logons
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-9 (1)
        parts:
        - id: ac-9.1_smt
          name: statement
          prose: The information system notifies the user, upon successful logon/access, of the number
            of unsuccessful logon/access attempts since the last successful logon/access.
      - id: ac-9.2
        title: Successful / Unsuccessful Logons
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-9 (2)
        parts:
        - id: ac-9.2_smt
          name: statement
          prose: 'The information system notifies the user of the number of [Selection: successful logons/accesses;
            unsuccessful logon/access attempts; both] during [Assignment: organization-defined time period].'
      - id: ac-9.3
        title: Notification Of Account Changes
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-9 (3)
        parts:
        - id: ac-9.3_smt
          name: statement
          prose: 'The information system notifies the user of changes to [Assignment: organization-defined
            security-related characteristics/parameters of the user�s account] during [Assignment: organization-defined
            time period].'
      - id: ac-9.4
        title: Additional Logon Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-9 (4)
        parts:
        - id: ac-9.4_smt
          name: statement
          prose: 'The information system notifies the user, upon successful logon (access), of the following
            additional information: [Assignment: organization-defined information to be included in addition
            to the date and time of the last logon (access)].'
    - id: ac-10
      title: Concurrent Session Control
      class: SP800-53
      props:
      - name: label
        value: AC-10
      parts:
      - id: ac-10_smt
        name: statement
        prose: 'The information system limits the number of concurrent sessions for each [Assignment:
          organization-defined account and/or account type] to [Assignment: organization-defined number].'
    - id: ac-11
      title: Session Lock
      class: SP800-53
      props:
      - name: label
        value: AC-11
      parts:
      - id: ac-11_smt
        name: statement
        prose: "The information system:\n  a.  Prevents further access to the system by initiating a session\
          \ lock after\n[Assignment: organization-defined time period] of inactivity or upon receiving\
          \ a request from a user; and\n  b.  Retains the session lock until the user reestablishes access\
          \ using established\nidentification and authentication procedures."
      controls:
      - id: ac-11.1
        title: Pattern-Hiding Displays
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-11 (1)
        parts:
        - id: ac-11.1_smt
          name: statement
          prose: The information system conceals, via the session lock, information previously visible
            on the display with a publicly viewable image.
    - id: ac-12
      title: Session Termination
      class: SP800-53
      props:
      - name: label
        value: AC-12
      parts:
      - id: ac-12_smt
        name: statement
        prose: 'The information system automatically terminates a user session after [Assignment: organization-defined
          conditions or trigger events requiring session disconnect].'
      controls:
      - id: ac-12.1
        title: User-Initiated Logouts / Message Displays
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-12 (1)
        parts:
        - id: ac-12.1_smt
          name: statement
          prose: "The information system:\n   (1)(a).  Provides a logout capability for user-initiated\
            \ communications sessions\nwhenever authentication is used to gain access to [Assignment:\
            \ organization-defined information resources]; and\n   (1)(b).  Displays an explicit logout\
            \ message to users indicating the reliable\ntermination of authenticated communications sessions."
    - id: ac-13
      title: Supervision And Review - Access Control
      class: SP800-53
      props:
      - name: label
        value: AC-13
      parts:
      - id: ac-13_smt
        name: statement
        prose: '[Withdrawn: Incorporated into AC-2 and AU-6].'
    - id: ac-14
      title: Permitted Actions Without Identification Or Authentication
      class: SP800-53
      props:
      - name: label
        value: AC-14
      parts:
      - id: ac-14_smt
        name: statement
        prose: "The organization:\n  a.  Identifies [Assignment: organization-defined user actions] that\
          \ can be performed\non the information system without identification or authentication consistent\
          \ with organizational missions/business functions; and\n  b.  Documents and provides supporting\
          \ rationale in the security plan for the\ninformation system, user actions not requiring identification\
          \ or authentication."
      controls:
      - id: ac-14.1
        title: Necessary Uses
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-14 (1)
        parts:
        - id: ac-14.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into AC-14].'
    - id: ac-15
      title: Automated Marking
      class: SP800-53
      props:
      - name: label
        value: AC-15
      parts:
      - id: ac-15_smt
        name: statement
        prose: '[Withdrawn: Incorporated into MP-3].'
    - id: ac-16
      title: Security Attributes
      class: SP800-53
      props:
      - name: label
        value: AC-16
      parts:
      - id: ac-16_smt
        name: statement
        prose: "The organization:\n  a.  Provides the means to associate [Assignment: organization-defined\
          \ types\nof security attributes] having [Assignment: organization-defined security attribute\
          \ values] with information in storage, in process, and/or in transmission;\n  b.  Ensures that\
          \ the security attribute associations are made and retained with\nthe information;\n  c.  Establishes\
          \ the permitted [Assignment: organization-defined security attributes]\nfor [Assignment: organization-defined\
          \ information systems]; and\n  d.  Determines the permitted [Assignment: organization-defined\
          \ values or ranges]\nfor each of the established security attributes."
      controls:
      - id: ac-16.1
        title: Dynamic Attribute Association
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-16 (1)
        parts:
        - id: ac-16.1_smt
          name: statement
          prose: 'The information system dynamically associates security attributes with [Assignment:
            organization-defined subjects and objects] in accordance with [Assignment: organization-defined
            security policies] as information is created and combined.'
      - id: ac-16.2
        title: Attribute Value Changes By Authorized Individuals
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-16 (2)
        parts:
        - id: ac-16.2_smt
          name: statement
          prose: The information system provides authorized individuals (or processes acting on behalf
            of individuals) the capability to define or change the value of associated security attributes.
      - id: ac-16.3
        title: Maintenance Of Attribute Associations By Information System
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-16 (3)
        parts:
        - id: ac-16.3_smt
          name: statement
          prose: 'The information system maintains the association and integrity of [Assignment: organization-defined
            security attributes] to [Assignment: organization-defined subjects and objects].'
      - id: ac-16.4
        title: Association Of Attributes By Authorized Individuals
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-16 (4)
        parts:
        - id: ac-16.4_smt
          name: statement
          prose: 'The information system supports the association of [Assignment: organization-defined
            security attributes] with [Assignment: organization-defined subjects and objects] by authorized
            individuals (or processes acting on behalf of individuals).'
      - id: ac-16.5
        title: Attribute Displays For Output Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-16 (5)
        parts:
        - id: ac-16.5_smt
          name: statement
          prose: 'The information system displays security attributes in human-readable form on each object
            that the system transmits to output devices to identify [Assignment: organization-identified
            special dissemination, handling, or distribution instructions] using [Assignment: organization-identified
            human-readable, standard naming conventions].'
      - id: ac-16.6
        title: Maintenance Of Attribute Association By Organization
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-16 (6)
        parts:
        - id: ac-16.6_smt
          name: statement
          prose: 'The organization allows personnel to associate, and maintain the association of [Assignment:
            organization-defined security attributes] with [Assignment: organization-defined subjects
            and objects] in accordance with [Assignment: organization-defined security policies].'
      - id: ac-16.7
        title: Consistent Attribute Interpretation
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-16 (7)
        parts:
        - id: ac-16.7_smt
          name: statement
          prose: The organization provides a consistent interpretation of security attributes transmitted
            between distributed information system components.
      - id: ac-16.8
        title: Association Techniques / Technologies
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-16 (8)
        parts:
        - id: ac-16.8_smt
          name: statement
          prose: 'The information system implements [Assignment: organization-defined techniques or technologies]
            with [Assignment: organization-defined level of assurance] in associating security attributes
            to information.'
      - id: ac-16.9
        title: Attribute Reassignment
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-16 (9)
        parts:
        - id: ac-16.9_smt
          name: statement
          prose: 'The organization ensures that security attributes associated with information are reassigned
            only via re-grading mechanisms validated using [Assignment: organization-defined techniques
            or procedures].'
      - id: ac-16.10
        title: Attribute Configuration By Authorized Individuals
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-16 (10)
        parts:
        - id: ac-16.10_smt
          name: statement
          prose: The information system provides authorized individuals the capability to define or change
            the type and value of security attributes available for association with subjects and objects.
    - id: ac-17
      title: Remote Access
      class: SP800-53
      props:
      - name: label
        value: AC-17
      parts:
      - id: ac-17_smt
        name: statement
        prose: "The organization:\n  a.  Establishes and documents usage restrictions, configuration/connection\
          \ requirements,\nand implementation guidance for each type of remote access allowed; and\n \
          \ b.  Authorizes remote access to the information system prior to allowing such\nconnections."
      controls:
      - id: ac-17.1
        title: Automated Monitoring / Control
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-17 (1)
        parts:
        - id: ac-17.1_smt
          name: statement
          prose: The information system monitors and controls remote access methods.
      - id: ac-17.2
        title: Protection Of Confidentiality / Integrity Using Encryption
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-17 (2)
        parts:
        - id: ac-17.2_smt
          name: statement
          prose: The information system implements cryptographic mechanisms to protect the confidentiality
            and integrity of remote access sessions.
      - id: ac-17.3
        title: Managed Access Control Points
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-17 (3)
        parts:
        - id: ac-17.3_smt
          name: statement
          prose: 'The information system routes all remote accesses through [Assignment: organization-defined
            number] managed network access control points.'
      - id: ac-17.4
        title: Privileged Commands / Access
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-17 (4)
        parts:
        - id: ac-17.4_smt
          name: statement
          prose: "The organization:\n   (4)(a).  Authorizes the execution of privileged commands and access\
            \ to security-relevant\ninformation via remote access only for [Assignment: organization-defined\
            \ needs]; and\n   (4)(b).  Documents the rationale for such access in the security plan for\
            \ the\ninformation system."
      - id: ac-17.5
        title: Monitoring For Unauthorized Connections
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-17 (5)
        parts:
        - id: ac-17.5_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SI-4].'
      - id: ac-17.6
        title: Protection Of Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-17 (6)
        parts:
        - id: ac-17.6_smt
          name: statement
          prose: The organization ensures that users protect information about remote access mechanisms
            from unauthorized use and disclosure.
      - id: ac-17.7
        title: Additional Protection For Security Function Access
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-17 (7)
        parts:
        - id: ac-17.7_smt
          name: statement
          prose: '[Withdrawn: Incorporated into AC-3 (10)].'
      - id: ac-17.8
        title: Disable Nonsecure Network Protocols
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-17 (8)
        parts:
        - id: ac-17.8_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CM-7].'
      - id: ac-17.9
        title: Disconnect / Disable Access
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-17 (9)
        parts:
        - id: ac-17.9_smt
          name: statement
          prose: 'The organization provides the capability to expeditiously disconnect or disable remote
            access to the information system within [Assignment: organization-defined time period].'
    - id: ac-18
      title: Wireless Access
      class: SP800-53
      props:
      - name: label
        value: AC-18
      parts:
      - id: ac-18_smt
        name: statement
        prose: "The organization:\n  a.  Establishes usage restrictions, configuration/connection requirements,\
          \ and\nimplementation guidance for wireless access; and\n  b.  Authorizes wireless access to\
          \ the information system prior to allowing such\nconnections."
      controls:
      - id: ac-18.1
        title: Authentication And Encryption
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-18 (1)
        parts:
        - id: ac-18.1_smt
          name: statement
          prose: 'The information system protects wireless access to the system using authentication of
            [Selection (one or more): users; devices] and encryption.'
      - id: ac-18.2
        title: Monitoring Unauthorized Connections
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-18 (2)
        parts:
        - id: ac-18.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SI-4].'
      - id: ac-18.3
        title: Disable Wireless Networking
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-18 (3)
        parts:
        - id: ac-18.3_smt
          name: statement
          prose: The organization disables, when not intended for use, wireless networking capabilities
            internally embedded within information system components prior to issuance and deployment.
      - id: ac-18.4
        title: Restrict Configurations By Users
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-18 (4)
        parts:
        - id: ac-18.4_smt
          name: statement
          prose: The organization identifies and explicitly authorizes users allowed to independently
            configure wireless networking capabilities.
      - id: ac-18.5
        title: Antennas / Transmission Power Levels
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-18 (5)
        parts:
        - id: ac-18.5_smt
          name: statement
          prose: The organization selects radio antennas and calibrates transmission power levels to reduce
            the probability that usable signals can be received outside of organization-controlled boundaries.
    - id: ac-19
      title: Access Control For Mobile Devices
      class: SP800-53
      props:
      - name: label
        value: AC-19
      parts:
      - id: ac-19_smt
        name: statement
        prose: "The organization:\n  a.  Establishes usage restrictions, configuration requirements, connection\
          \ requirements,\nand implementation guidance for organization-controlled mobile devices; and\n\
          \  b.  Authorizes the connection of mobile devices to organizational information\nsystems."
      controls:
      - id: ac-19.1
        title: Use Of  Writable / Portable Storage Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-19 (1)
        parts:
        - id: ac-19.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-7].'
      - id: ac-19.2
        title: Use Of Personally Owned Portable Storage Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-19 (2)
        parts:
        - id: ac-19.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-7].'
      - id: ac-19.3
        title: Use Of Portable Storage Devices With No Identifiable Owner
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-19 (3)
        parts:
        - id: ac-19.3_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-7].'
      - id: ac-19.4
        title: Restrictions For Classified Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-19 (4)
        parts:
        - id: ac-19.4_smt
          name: statement
          prose: "The organization:\n   (4)(a).  Prohibits the use of unclassified mobile devices in facilities\
            \ containing\ninformation systems processing, storing, or transmitting classified information\
            \ unless specifically permitted by the authorizing official; and\n   (4)(b).  Enforces the\
            \ following restrictions on individuals permitted by the\nauthorizing official to use unclassified\
            \ mobile devices in facilities containing information systems processing, storing, or transmitting\
            \ classified information:\n   (4)(b)(1).  Connection of unclassified mobile devices to classified\
            \ information\nsystems is prohibited;\n   (4)(b)(2).  Connection of unclassified mobile devices\
            \ to unclassified information\nsystems requires approval from the authorizing official;\n\
            \   (4)(b)(3).  Use of internal or external modems or wireless interfaces within\nthe unclassified\
            \ mobile devices is prohibited; and\n   (4)(b)(4).  Unclassified mobile devices and the information\
            \ stored on those\ndevices are subject to random reviews and inspections by [Assignment: organization-defined\
            \ security officials], and if classified information is found, the incident handling policy\
            \ is followed.\n   (4)(c).  Restricts the connection of classified mobile devices to classified\n\
            information systems in accordance with [Assignment: organization-defined security policies]."
      - id: ac-19.5
        title: Full Device / Container-Based  Encryption
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-19 (5)
        parts:
        - id: ac-19.5_smt
          name: statement
          prose: 'The organization employs [Selection: full-device encryption; container encryption] to
            protect the confidentiality and integrity of information on [Assignment: organization-defined
            mobile devices].'
    - id: ac-20
      title: Use Of External Information Systems
      class: SP800-53
      props:
      - name: label
        value: AC-20
      parts:
      - id: ac-20_smt
        name: statement
        prose: "The organization establishes terms and conditions, consistent with any trust relationships\
          \ established with other organizations owning, operating, and/or maintaining external information\
          \ systems, allowing authorized individuals to:\n  a.  Access the information system from external\
          \ information systems; and\n  b.  Process, store, or transmit organization-controlled information\
          \ using external\ninformation systems."
      controls:
      - id: ac-20.1
        title: Limits On Authorized Use
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-20 (1)
        parts:
        - id: ac-20.1_smt
          name: statement
          prose: "The organization permits authorized individuals to use an external information system\
            \ to access the information system or to process, store, or transmit organization-controlled\
            \ information only when the organization:\n   (1)(a).  Verifies the implementation of required\
            \ security controls on the external\nsystem as specified in the organization�s information\
            \ security policy and security plan; or\n   (1)(b).  Retains approved information system connection\
            \ or processing agreements\nwith the organizational entity hosting the external information\
            \ system."
      - id: ac-20.2
        title: Portable Storage Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-20 (2)
        parts:
        - id: ac-20.2_smt
          name: statement
          prose: 'The organization [Selection: restricts; prohibits] the use of organization-controlled
            portable storage devices by authorized individuals on external information systems.'
      - id: ac-20.3
        title: Non-Organizationally Owned Systems / Components / Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-20 (3)
        parts:
        - id: ac-20.3_smt
          name: statement
          prose: 'The organization [Selection: restricts; prohibits] the use of non-organizationally owned
            information systems, system components, or devices to process, store, or transmit organizational
            information.'
      - id: ac-20.4
        title: Network Accessible Storage Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-20 (4)
        parts:
        - id: ac-20.4_smt
          name: statement
          prose: 'The organization prohibits the use of [Assignment: organization-defined network accessible
            storage devices] in external information systems.'
    - id: ac-21
      title: Information Sharing
      class: SP800-53
      props:
      - name: label
        value: AC-21
      parts:
      - id: ac-21_smt
        name: statement
        prose: "The organization:\n  a.  Facilitates information sharing by enabling authorized users\
          \ to determine\nwhether access authorizations assigned to the sharing partner match the access\
          \ restrictions on the information for [Assignment: organization-defined information sharing\
          \ circumstances where user discretion is required]; and\n  b.  Employs [Assignment: organization-defined\
          \ automated mechanisms or manual\nprocesses] to assist users in making information sharing/collaboration\
          \ decisions."
      controls:
      - id: ac-21.1
        title: Automated Decision Support
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-21 (1)
        parts:
        - id: ac-21.1_smt
          name: statement
          prose: The information system enforces information-sharing decisions by authorized users based
            on access authorizations of sharing partners and access restrictions on information to be
            shared.
      - id: ac-21.2
        title: Information Search And Retrieval
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-21 (2)
        parts:
        - id: ac-21.2_smt
          name: statement
          prose: 'The information system implements information search and retrieval services that enforce
            [Assignment: organization-defined information sharing restrictions].'
    - id: ac-22
      title: Publicly Accessible Content
      class: SP800-53
      props:
      - name: label
        value: AC-22
      parts:
      - id: ac-22_smt
        name: statement
        prose: "The organization:\n  a.  Designates individuals authorized to post information onto a\
          \ publicly accessible\ninformation system;\n  b.  Trains authorized individuals to ensure that\
          \ publicly accessible information\ndoes not contain nonpublic information;\n  c.  Reviews the\
          \ proposed content of information prior to posting onto the publicly\naccessible information\
          \ system to ensure that nonpublic information is not included; and\n  d.  Reviews the content\
          \ on the publicly accessible information system for nonpublic\ninformation [Assignment: organization-defined\
          \ frequency] and removes such information, if discovered."
    - id: ac-23
      title: Data Mining Protection
      class: SP800-53
      props:
      - name: label
        value: AC-23
      parts:
      - id: ac-23_smt
        name: statement
        prose: 'The organization employs [Assignment: organization-defined data mining prevention and
          detection techniques] for [Assignment: organization-defined data storage objects] to adequately
          detect and protect against data mining.'
    - id: ac-24
      title: Access Control Decisions
      class: SP800-53
      props:
      - name: label
        value: AC-24
      parts:
      - id: ac-24_smt
        name: statement
        prose: 'The organization establishes procedures to ensure [Assignment: organization-defined access
          control decisions] are applied to each access request prior to access enforcement.'
      controls:
      - id: ac-24.1
        title: Transmit Access Authorization Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-24 (1)
        parts:
        - id: ac-24.1_smt
          name: statement
          prose: 'The information system transmits [Assignment: organization-defined access authorization
            information] using [Assignment: organization-defined security safeguards] to [Assignment:
            organization-defined information systems] that enforce access control decisions.'
      - id: ac-24.2
        title: No User Or Process Identity
        class: SP800-53-enhancement
        props:
        - name: label
          value: AC-24 (2)
        parts:
        - id: ac-24.2_smt
          name: statement
          prose: 'The information system enforces access control decisions based on [Assignment: organization-defined
            security attributes] that do not include the identity of the user or process acting on behalf
            of the user.'
    - id: ac-25
      title: Reference Monitor
      class: SP800-53
      props:
      - name: label
        value: AC-25
      parts:
      - id: ac-25_smt
        name: statement
        prose: 'The information system implements a reference monitor for [Assignment: organization-defined
          access control policies] that is tamperproof, always invoked, and small enough to be subject
          to analysis and testing, the completeness of which can be assured.'
  - id: at
    title: Awareness and Training
    class: family
    props:
    - name: label
      value: AT
    controls:
    - id: at-1
      title: Security Awareness And Training Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: AT-1
      parts:
      - id: at-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A security awareness and training policy that addresses purpose,\
          \ scope,\nroles, responsibilities, management commitment, coordination among organizational\
          \ entities, and compliance; and\n    2.  Procedures to facilitate the implementation of the\
          \ security awareness\nand training policy and associated security awareness and training controls;\
          \ and\n  b.  Reviews and updates the current:\n    1.  Security awareness and training policy\
          \ [Assignment: organization-defined\nfrequency]; and\n    2.  Security awareness and training\
          \ procedures [Assignment: organization-defined\nfrequency]."
    - id: at-2
      title: Security Awareness Training
      class: SP800-53
      props:
      - name: label
        value: AT-2
      parts:
      - id: at-2_smt
        name: statement
        prose: "The organization provides basic security awareness training to information system users\
          \ (including managers, senior executives, and contractors):\n  a.  As part of initial training\
          \ for new users;\n  b.  When required by information system changes; and\n  c.  [Assignment:\
          \ organization-defined frequency] thereafter."
      controls:
      - id: at-2.1
        title: Practical Exercises
        class: SP800-53-enhancement
        props:
        - name: label
          value: AT-2 (1)
        parts:
        - id: at-2.1_smt
          name: statement
          prose: The organization includes practical exercises in security awareness training that simulate
            actual cyber attacks.
      - id: at-2.2
        title: Insider Threat
        class: SP800-53-enhancement
        props:
        - name: label
          value: AT-2 (2)
        parts:
        - id: at-2.2_smt
          name: statement
          prose: The organization includes security awareness training on recognizing and reporting potential
            indicators of insider threat.
    - id: at-3
      title: Role-Based Security Training
      class: SP800-53
      props:
      - name: label
        value: AT-3
      parts:
      - id: at-3_smt
        name: statement
        prose: "The organization provides role-based security training to personnel with assigned security\
          \ roles and responsibilities:\n  a.  Before authorizing access to the information system or\
          \ performing assigned\nduties;\n  b.  When required by information system changes; and\n  c.\
          \  [Assignment: organization-defined frequency] thereafter."
      controls:
      - id: at-3.1
        title: Environmental Controls
        class: SP800-53-enhancement
        props:
        - name: label
          value: AT-3 (1)
        parts:
        - id: at-3.1_smt
          name: statement
          prose: 'The organization provides [Assignment: organization-defined personnel or roles] with
            initial and [Assignment: organization-defined frequency] training in the employment and operation
            of environmental controls.'
      - id: at-3.2
        title: Physical Security Controls
        class: SP800-53-enhancement
        props:
        - name: label
          value: AT-3 (2)
        parts:
        - id: at-3.2_smt
          name: statement
          prose: 'The organization provides [Assignment: organization-defined personnel or roles] with
            initial and [Assignment: organization-defined frequency] training in the employment and operation
            of physical security controls.'
      - id: at-3.3
        title: Practical Exercises
        class: SP800-53-enhancement
        props:
        - name: label
          value: AT-3 (3)
        parts:
        - id: at-3.3_smt
          name: statement
          prose: The organization includes practical exercises in security training that reinforce training
            objectives.
      - id: at-3.4
        title: Suspicious Communications And Anomalous System Behavior
        class: SP800-53-enhancement
        props:
        - name: label
          value: AT-3 (4)
        parts:
        - id: at-3.4_smt
          name: statement
          prose: 'The organization provides training to its personnel on [Assignment: organization-defined
            indicators of malicious code] to recognize suspicious communications and anomalous behavior
            in organizational information systems.'
    - id: at-4
      title: Security Training Records
      class: SP800-53
      props:
      - name: label
        value: AT-4
      parts:
      - id: at-4_smt
        name: statement
        prose: "The organization:\n  a.  Documents and monitors individual information system security\
          \ training activities\nincluding basic security awareness training and specific information\
          \ system security training; and\n  b.  Retains individual training records for [Assignment:\
          \ organization-defined\ntime period]."
    - id: at-5
      title: Contacts With Security Groups And Associations
      class: SP800-53
      props:
      - name: label
        value: AT-5
      parts:
      - id: at-5_smt
        name: statement
        prose: '[Withdrawn: Incorporated into PM-15].'
  - id: au
    title: Audit and Accountability
    class: family
    props:
    - name: label
      value: AU
    controls:
    - id: au-1
      title: Audit And Accountability Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: AU-1
      parts:
      - id: au-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  An audit and accountability policy that addresses purpose, scope,\
          \ roles,\nresponsibilities, management commitment, coordination among organizational entities,\
          \ and compliance; and\n    2.  Procedures to facilitate the implementation of the audit and\
          \ accountability\npolicy and associated audit and accountability controls; and\n  b.  Reviews\
          \ and updates the current:\n    1.  Audit and accountability policy [Assignment: organization-defined\
          \ frequency];\nand\n    2.  Audit and accountability procedures [Assignment: organization-defined\n\
          frequency]."
    - id: au-2
      title: Audit Events
      class: SP800-53
      props:
      - name: label
        value: AU-2
      parts:
      - id: au-2_smt
        name: statement
        prose: "The organization:\n  a.  Determines that the information system is capable of auditing\
          \ the following\nevents: [Assignment: organization-defined auditable events];\n  b.  Coordinates\
          \ the security audit function with other organizational entities\nrequiring audit-related information\
          \ to enhance mutual support and to help guide the selection of auditable events;\n  c.  Provides\
          \ a rationale for why the auditable events are deemed to be adequate\nto support after-the-fact\
          \ investigations of security incidents; and\n  d.  Determines that the following events are\
          \ to be audited within the information\nsystem: [Assignment: organization-defined audited events\
          \ (the subset of the auditable events defined in AU-2 a.) along with the frequency of (or situation\
          \ requiring) auditing for each identified event]."
      controls:
      - id: au-2.1
        title: Compilation Of Audit Records From Multiple Sources
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-2 (1)
        parts:
        - id: au-2.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into AU-12].'
      - id: au-2.2
        title: Selection Of Audit Events By Component
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-2 (2)
        parts:
        - id: au-2.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into AU-12].'
      - id: au-2.3
        title: Reviews And Updates
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-2 (3)
        parts:
        - id: au-2.3_smt
          name: statement
          prose: 'The organization reviews and updates the audited events [Assignment: organization-defined
            frequency].'
      - id: au-2.4
        title: Privileged Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-2 (4)
        parts:
        - id: au-2.4_smt
          name: statement
          prose: '[Withdrawn: Incorporated into AC-6 (9)].'
    - id: au-3
      title: Content Of Audit Records
      class: SP800-53
      props:
      - name: label
        value: AU-3
      parts:
      - id: au-3_smt
        name: statement
        prose: The information system generates audit records containing information that establishes
          what type of event occurred, when the event occurred, where the event occurred, the source of
          the event, the outcome of the event, and the identity of any individuals or subjects associated
          with the event.
      controls:
      - id: au-3.1
        title: Additional Audit Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-3 (1)
        parts:
        - id: au-3.1_smt
          name: statement
          prose: 'The information system generates audit records containing the following additional information:
            [Assignment: organization-defined additional, more detailed information].'
      - id: au-3.2
        title: Centralized Management Of Planned Audit Record Content
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-3 (2)
        parts:
        - id: au-3.2_smt
          name: statement
          prose: 'The information system provides centralized management and configuration of the content
            to be captured in audit records generated by [Assignment: organization-defined information
            system components].'
    - id: au-4
      title: Audit Storage Capacity
      class: SP800-53
      props:
      - name: label
        value: AU-4
      parts:
      - id: au-4_smt
        name: statement
        prose: 'The organization allocates audit record storage capacity in accordance with [Assignment:
          organization-defined audit record storage requirements].'
      controls:
      - id: au-4.1
        title: Transfer To Alternate Storage
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-4 (1)
        parts:
        - id: au-4.1_smt
          name: statement
          prose: 'The information system off-loads audit records [Assignment: organization-defined frequency]
            onto a different system or media than the system being audited.'
    - id: au-5
      title: Response To Audit Processing Failures
      class: SP800-53
      props:
      - name: label
        value: AU-5
      parts:
      - id: au-5_smt
        name: statement
        prose: "The information system:\n  a.  Alerts [Assignment: organization-defined personnel or roles]\
          \ in the event\nof an audit processing failure; and\n  b.  Takes the following additional actions:\
          \ [Assignment: organization-defined\nactions to be taken (e.g., shut down information system,\
          \ overwrite oldest audit records, stop generating audit records)]."
      controls:
      - id: au-5.1
        title: Audit Storage Capacity
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-5 (1)
        parts:
        - id: au-5.1_smt
          name: statement
          prose: 'The information system provides a warning to [Assignment: organization-defined personnel,
            roles, and/or locations] within [Assignment: organization-defined time period] when allocated
            audit record storage volume reaches [Assignment: organization-defined percentage] of repository
            maximum audit record storage capacity.'
      - id: au-5.2
        title: Real-Time Alerts
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-5 (2)
        parts:
        - id: au-5.2_smt
          name: statement
          prose: 'The information system provides an alert in [Assignment: organization-defined real-time
            period] to [Assignment: organization-defined personnel, roles, and/or locations] when the
            following audit failure events occur: [Assignment: organization-defined audit failure events
            requiring real-time alerts].'
      - id: au-5.3
        title: Configurable Traffic Volume Thresholds
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-5 (3)
        parts:
        - id: au-5.3_smt
          name: statement
          prose: 'The information system enforces configurable network communications traffic volume thresholds
            reflecting limits on auditing capacity and [Selection: rejects; delays] network traffic above
            those thresholds.'
      - id: au-5.4
        title: Shutdown On Failure
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-5 (4)
        parts:
        - id: au-5.4_smt
          name: statement
          prose: 'The information system invokes a [Selection: full system shutdown; partial system shutdown;
            degraded operational mode with limited mission/business functionality available] in the event
            of [Assignment: organization-defined audit failures], unless an alternate audit capability
            exists.'
    - id: au-6
      title: Audit Review, Analysis, And Reporting
      class: SP800-53
      props:
      - name: label
        value: AU-6
      parts:
      - id: au-6_smt
        name: statement
        prose: "The organization:\n  a.  Reviews and analyzes information system audit records [Assignment:\
          \ organization-defined\nfrequency] for indications of [Assignment: organization-defined inappropriate\
          \ or unusual activity]; and\n  b.  Reports findings to [Assignment: organization-defined personnel\
          \ or roles]."
      controls:
      - id: au-6.1
        title: Process Integration
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-6 (1)
        parts:
        - id: au-6.1_smt
          name: statement
          prose: The organization employs automated mechanisms to integrate audit review, analysis, and
            reporting processes to support organizational processes for investigation and response to
            suspicious activities.
      - id: au-6.2
        title: Automated Security Alerts
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-6 (2)
        parts:
        - id: au-6.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SI-4].'
      - id: au-6.3
        title: Correlate Audit Repositories
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-6 (3)
        parts:
        - id: au-6.3_smt
          name: statement
          prose: The organization analyzes and correlates audit records across different repositories
            to gain organization-wide situational awareness.
      - id: au-6.4
        title: Central Review And Analysis
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-6 (4)
        parts:
        - id: au-6.4_smt
          name: statement
          prose: The information system provides the capability to centrally review and analyze audit
            records from multiple components within the system.
      - id: au-6.5
        title: Integration / Scanning And Monitoring Capabilities
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-6 (5)
        parts:
        - id: au-6.5_smt
          name: statement
          prose: 'The organization integrates analysis of audit records with analysis of [Selection (one
            or more): vulnerability scanning information; performance data; information system monitoring
            information; [Assignment: organization-defined data/information collected from other sources]]
            to further enhance the ability to identify inappropriate or unusual activity.'
      - id: au-6.6
        title: Correlation With Physical Monitoring
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-6 (6)
        parts:
        - id: au-6.6_smt
          name: statement
          prose: The organization correlates information from audit records with information obtained
            from monitoring physical access to further enhance the ability to identify suspicious, inappropriate,
            unusual, or malevolent activity.
      - id: au-6.7
        title: Permitted Actions
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-6 (7)
        parts:
        - id: au-6.7_smt
          name: statement
          prose: 'The organization specifies the permitted actions for each [Selection (one or more):
            information system process; role; user] associated with the review, analysis, and reporting
            of audit information.'
      - id: au-6.8
        title: Full Text Analysis Of Privileged Commands
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-6 (8)
        parts:
        - id: au-6.8_smt
          name: statement
          prose: The organization performs a full text analysis of audited privileged commands in a physically
            distinct component or subsystem of the information system, or other information system that
            is dedicated to that analysis.
      - id: au-6.9
        title: Correlation With Information From Nontechnical Sources
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-6 (9)
        parts:
        - id: au-6.9_smt
          name: statement
          prose: The organization correlates information from nontechnical sources with audit information
            to enhance organization-wide situational awareness.
      - id: au-6.10
        title: Audit Level Adjustment
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-6 (10)
        parts:
        - id: au-6.10_smt
          name: statement
          prose: The organization adjusts the level of audit review, analysis, and reporting within the
            information system when there is a change in risk based on law enforcement information, intelligence
            information, or other credible sources of information.
    - id: au-7
      title: Audit Reduction And Report Generation
      class: SP800-53
      props:
      - name: label
        value: AU-7
      parts:
      - id: au-7_smt
        name: statement
        prose: "The information system provides an audit reduction and report generation capability that:\n\
          \  a.  Supports on-demand audit review, analysis, and reporting requirements and\nafter-the-fact\
          \ investigations of security incidents; and\n  b.  Does not alter the original content or time\
          \ ordering of audit records."
      controls:
      - id: au-7.1
        title: Automatic Processing
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-7 (1)
        parts:
        - id: au-7.1_smt
          name: statement
          prose: 'The information system provides the capability to process audit records for events of
            interest based on [Assignment: organization-defined audit fields within audit records].'
      - id: au-7.2
        title: Automatic Sort And Search
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-7 (2)
        parts:
        - id: au-7.2_smt
          name: statement
          prose: 'The information system provides the capability to sort and search audit records for
            events of interest based on the content of [Assignment: organization-defined audit fields
            within audit records].'
    - id: au-8
      title: Time Stamps
      class: SP800-53
      props:
      - name: label
        value: AU-8
      parts:
      - id: au-8_smt
        name: statement
        prose: "The information system:\n  a.  Uses internal system clocks to generate time stamps for\
          \ audit records; and\n  b.  Records time stamps for audit records that can be mapped to Coordinated\n\
          Universal Time (UTC) or Greenwich Mean Time (GMT) and meets [Assignment: organization-defined\
          \ granularity of time measurement]."
      controls:
      - id: au-8.1
        title: Synchronization With Authoritative Time Source
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-8 (1)
        parts:
        - id: au-8.1_smt
          name: statement
          prose: "The information system:\n   (1)(a).  Compares the internal information system clocks\
            \ [Assignment: organization-defined\nfrequency] with [Assignment: organization-defined authoritative\
            \ time source]; and\n   (1)(b).  Synchronizes the internal system clocks to the authoritative\
            \ time\nsource when the time difference is greater than [Assignment: organization-defined\
            \ time period]."
      - id: au-8.2
        title: Secondary Authoritative Time Source
        class: SP800-53-enhancement
        props:
        - name: label
          value: AU-8 (2)
        parts:
        - id: au-8.2_smt
          name: statement
          prose: The information system identifies a secondary authoritative time source that is located
            in a different geographic region than the primary authoritative time source.
    - id: au-9
      title: Protection Of Audit Information
      class: SP800-53
      props:
      - name: label
        value: AU-9
      parts:
      - id: au-9_smt
        name: statement
        prose: The information system protects audit information and audit tools from unauthorized access,
          modification, and deletion.
      controls:
      - id: au-9.1
        title: Hardware Write-Once Media
        class: SP800-53-enhancement

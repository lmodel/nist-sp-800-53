      - id: sa-12.9
        title: Operations Security
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-12 (9)
        parts:
        - id: sa-12.9_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined Operations Security (OPSEC)

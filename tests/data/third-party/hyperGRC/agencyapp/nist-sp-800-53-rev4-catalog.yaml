        - name: label
          value: CM-2 (2)
        parts:
        - id: cm-2.2_smt
          name: statement
          prose: The organization employs automated mechanisms to maintain an up-to-date, complete, accurate,
            and readily available baseline configuration of the information system.
      - id: cm-2.3
        title: Retention Of Previous Configurations
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-2 (3)
        parts:
        - id: cm-2.3_smt
          name: statement
          prose: 'The organization retains [Assignment: organization-defined previous versions of baseline
            configurations of the information system] to support rollback.'
      - id: cm-2.4
        title: Unauthorized Software
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-2 (4)
        parts:
        - id: cm-2.4_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CM-7].'
      - id: cm-2.5
        title: Authorized Software
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-2 (5)
        parts:
        - id: cm-2.5_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CM-7].'
      - id: cm-2.6
        title: Development And Test Environments
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-2 (6)
        parts:
        - id: cm-2.6_smt
          name: statement
          prose: The organization maintains a baseline configuration for information system development
            and test environments that is managed separately from the operational baseline configuration.
      - id: cm-2.7
        title: Configure Systems, Components, Or Devices For High-Risk Areas
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-2 (7)
        parts:
        - id: cm-2.7_smt
          name: statement
          prose: "The organization:\n   (7)(a).  Issues [Assignment: organization-defined information\
            \ systems, system\ncomponents, or devices] with [Assignment: organization-defined configurations]\
            \ to individuals traveling to locations that the organization deems to be of significant risk;\
            \ and\n   (7)(b).  Applies [Assignment: organization-defined security safeguards] to\nthe\
            \ devices when the individuals return."
    - id: cm-3
      title: Configuration Change Control
      class: SP800-53
      props:
      - name: label
        value: CM-3
      parts:
      - id: cm-3_smt
        name: statement
        prose: "The organization:\n  a.  Determines the types of changes to the information system that\
          \ are configuration-controlled;\n  b.  Reviews proposed configuration-controlled changes to\
          \ the information system\nand approves or disapproves such changes with explicit consideration\
          \ for security impact analyses;\n  c.  Documents configuration change decisions associated with\
          \ the information\nsystem;\n  d.  Implements approved configuration-controlled changes to the\
          \ information\nsystem;\n  e.  Retains records of configuration-controlled changes to the information\
          \ system\nfor [Assignment: organization-defined time period];\n  f.  Audits and reviews activities\
          \ associated with configuration-controlled changes\nto the information system; and\n  g.  Coordinates\
          \ and provides oversight for configuration change control activities\nthrough [Assignment: organization-defined\
          \ configuration change control element (e.g., committee, board)] that convenes [Selection (one\
          \ or more): [Assignment: organization-defined frequency]; [Assignment: organization-defined\
          \ configuration change conditions]]."
      controls:
      - id: cm-3.1
        title: Automated Document / Notification / Prohibition Of Changes
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-3 (1)
        parts:
        - id: cm-3.1_smt
          name: statement
          prose: "The organization employs automated mechanisms to:\n   (1)(a).  Document proposed changes\
            \ to the information system;\n   (1)(b).  Notify [Assignment: organized-defined approval authorities]\
            \ of proposed\nchanges to the information system and request change approval;\n   (1)(c).\
            \  Highlight proposed changes to the information system that have not\nbeen approved or disapproved\
            \ by [Assignment: organization-defined time period];\n   (1)(d).  Prohibit changes to the\
            \ information system until designated approvals\nare received;\n   (1)(e).  Document all changes\
            \ to the information system; and\n   (1)(f).  Notify [Assignment: organization-defined personnel]\
            \ when approved\nchanges to the information system are completed."
      - id: cm-3.2
        title: Test / Validate / Document Changes
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-3 (2)
        parts:
        - id: cm-3.2_smt
          name: statement
          prose: The organization tests, validates, and documents changes to the information system before
            implementing the changes on the operational system.
      - id: cm-3.3
        title: Automated Change Implementation
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-3 (3)
        parts:
        - id: cm-3.3_smt
          name: statement
          prose: The organization employs automated mechanisms to implement changes to the current information
            system baseline and deploys the updated baseline across the installed base.
      - id: cm-3.4
        title: Security Representative
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-3 (4)
        parts:
        - id: cm-3.4_smt
          name: statement
          prose: 'The organization requires an information security representative to be a member of the
            [Assignment: organization-defined configuration change control element].'
      - id: cm-3.5
        title: Automated Security Response
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-3 (5)
        parts:
        - id: cm-3.5_smt
          name: statement
          prose: 'The information system implements [Assignment: organization-defined security responses]
            automatically if baseline configurations are changed in an unauthorized manner.'
      - id: cm-3.6
        title: Cryptography Management
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-3 (6)
        parts:
        - id: cm-3.6_smt
          name: statement
          prose: 'The organization ensures that cryptographic mechanisms used to provide [Assignment:
            organization-defined security safeguards] are under configuration management.'
    - id: cm-4
      title: Security Impact Analysis
      class: SP800-53
      props:
      - name: label
        value: CM-4
      parts:
      - id: cm-4_smt
        name: statement
        prose: The organization analyzes changes to the information system to determine potential security
          impacts prior to change implementation.
      controls:
      - id: cm-4.1
        title: Separate Test Environments
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-4 (1)
        parts:
        - id: cm-4.1_smt
          name: statement
          prose: The organization analyzes changes to the information system in a separate test environment
            before implementation in an operational environment, looking for security impacts due to flaws,
            weaknesses, incompatibility, or intentional malice.
      - id: cm-4.2
        title: Verification Of Security Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-4 (2)
        parts:
        - id: cm-4.2_smt
          name: statement
          prose: The organization, after the information system is changed, checks the security functions
            to verify that the functions are implemented correctly, operating as intended, and producing
            the desired outcome with regard to meeting the security requirements for the system.
    - id: cm-5
      title: Access Restrictions For Change
      class: SP800-53
      props:
      - name: label
        value: CM-5
      parts:
      - id: cm-5_smt
        name: statement
        prose: The organization defines, documents, approves, and enforces physical and logical access
          restrictions associated with changes to the information system.
      controls:
      - id: cm-5.1
        title: Automated Access Enforcement / Auditing
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-5 (1)
        parts:
        - id: cm-5.1_smt
          name: statement
          prose: The information system enforces access restrictions and supports auditing of the enforcement
            actions.
      - id: cm-5.2
        title: Review System Changes
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-5 (2)
        parts:
        - id: cm-5.2_smt
          name: statement
          prose: 'The organization reviews information system changes [Assignment: organization-defined
            frequency] and [Assignment: organization-defined circumstances] to determine whether unauthorized
            changes have occurred.'
      - id: cm-5.3
        title: Signed Components
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-5 (3)
        parts:
        - id: cm-5.3_smt
          name: statement
          prose: 'The information system prevents the installation of [Assignment: organization-defined
            software and firmware components] without verification that the component has been digitally
            signed using a certificate that is recognized and approved by the organization.'
      - id: cm-5.4
        title: Dual Authorization
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-5 (4)
        parts:
        - id: cm-5.4_smt
          name: statement
          prose: 'The organization enforces dual authorization for implementing changes to [Assignment:
            organization-defined information system components and system-level information].'
      - id: cm-5.5
        title: Limit Production / Operational Privileges
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-5 (5)
        parts:
        - id: cm-5.5_smt
          name: statement
          prose: "The organization:\n   (5)(a).  Limits privileges to change information system components\
            \ and system-related\ninformation within a production or operational environment; and\n  \
            \ (5)(b).  Reviews and reevaluates privileges [Assignment: organization-defined\nfrequency]."
      - id: cm-5.6
        title: Limit Library Privileges
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-5 (6)
        parts:
        - id: cm-5.6_smt
          name: statement
          prose: The organization limits privileges to change software resident within software libraries.
      - id: cm-5.7
        title: Automatic Implementation Of Security Safeguards
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-5 (7)
        parts:
        - id: cm-5.7_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SI-7].'
    - id: cm-6
      title: Configuration Settings
      class: SP800-53
      props:
      - name: label
        value: CM-6
      parts:
      - id: cm-6_smt
        name: statement
        prose: "The organization:\n  a.  Establishes and documents configuration settings for information\
          \ technology\nproducts employed within the information system using [Assignment: organization-defined\
          \ security configuration checklists] that reflect the most restrictive mode consistent with\
          \ operational requirements;\n  b.  Implements the configuration settings;\n  c.  Identifies,\
          \ documents, and approves any deviations from established configuration\nsettings for [Assignment:\
          \ organization-defined information system components] based on [Assignment: organization-defined\
          \ operational requirements]; and\n  d.  Monitors and controls changes to the configuration settings\
          \ in accordance\nwith organizational policies and procedures."
      controls:
      - id: cm-6.1
        title: Automated Central Management / Application / Verification
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-6 (1)
        parts:
        - id: cm-6.1_smt
          name: statement
          prose: 'The organization employs automated mechanisms to centrally manage, apply, and verify
            configuration settings for [Assignment: organization-defined information system components].'
      - id: cm-6.2
        title: Respond To Unauthorized Changes
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-6 (2)
        parts:
        - id: cm-6.2_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined security safeguards] to respond
            to unauthorized changes to [Assignment: organization-defined configuration settings].'
      - id: cm-6.3
        title: Unauthorized Change Detection
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-6 (3)
        parts:
        - id: cm-6.3_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SI-7].'
      - id: cm-6.4
        title: Conformance Demonstration
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-6 (4)
        parts:
        - id: cm-6.4_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CM-4].'
    - id: cm-7
      title: Least Functionality
      class: SP800-53
      props:
      - name: label
        value: CM-7
      parts:
      - id: cm-7_smt
        name: statement
        prose: "The organization:\n  a.  Configures the information system to provide only essential capabilities;\n\
          and\n  b.  Prohibits or restricts the use of the following functions, ports, protocols,\nand/or\
          \ services: [Assignment: organization-defined prohibited or restricted functions, ports, protocols,\
          \ and/or services]."
      controls:
      - id: cm-7.1
        title: Periodic Review
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-7 (1)
        parts:
        - id: cm-7.1_smt
          name: statement
          prose: "The organization:\n   (1)(a).  Reviews the information system [Assignment: organization-defined\
            \ frequency]\nto identify unnecessary and/or nonsecure functions, ports, protocols, and services;\
            \ and\n   (1)(b).  Disables [Assignment: organization-defined functions, ports, protocols,\n\
            and services within the information system deemed to be unnecessary and/or nonsecure]."
      - id: cm-7.2
        title: Prevent Program Execution
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-7 (2)
        parts:
        - id: cm-7.2_smt
          name: statement
          prose: 'The information system prevents program execution in accordance with [Selection (one
            or more): [Assignment: organization-defined policies regarding software program usage and
            restrictions]; rules authorizing the terms and conditions of software program usage].'
      - id: cm-7.3
        title: Registration Compliance
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-7 (3)
        parts:
        - id: cm-7.3_smt
          name: statement
          prose: 'The organization ensures compliance with [Assignment: organization-defined registration
            requirements for functions, ports, protocols, and services].'
      - id: cm-7.4
        title: Unauthorized Software / Blacklisting
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-7 (4)
        parts:
        - id: cm-7.4_smt
          name: statement
          prose: "The organization:\n   (4)(a).  Identifies [Assignment: organization-defined software\
            \ programs not\nauthorized to execute on the information system];\n   (4)(b).  Employs an\
            \ allow-all, deny-by-exception policy to prohibit the execution\nof unauthorized software\
            \ programs on the information system; and\n   (4)(c).  Reviews and updates the list of unauthorized\
            \ software programs [Assignment:\norganization-defined frequency]."
      - id: cm-7.5
        title: Authorized Software / Whitelisting
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-7 (5)
        parts:
        - id: cm-7.5_smt
          name: statement
          prose: "The organization:\n   (5)(a).  Identifies [Assignment: organization-defined software\
            \ programs authorized\nto execute on the information system];\n   (5)(b).  Employs a deny-all,\
            \ permit-by-exception policy to allow the execution\nof authorized software programs on the\
            \ information system; and\n   (5)(c).  Reviews and updates the list of authorized software\
            \ programs [Assignment:\norganization-defined frequency]."
    - id: cm-8
      title: Information System Component Inventory
      class: SP800-53
      props:
      - name: label
        value: CM-8
      parts:
      - id: cm-8_smt
        name: statement
        prose: "The organization:\n  a.  Develops and documents an inventory of information system components\
          \ that:\n    1.  Accurately reflects the current information system;\n    2.  Includes all components\
          \ within the authorization boundary of the information\nsystem;\n    3.  Is at the level of\
          \ granularity deemed necessary for tracking and reporting;\nand\n    4.  Includes [Assignment:\
          \ organization-defined information deemed necessary\nto achieve effective information system\
          \ component accountability]; and\n  b.  Reviews and updates the information system component\
          \ inventory [Assignment:\norganization-defined frequency]."
      controls:
      - id: cm-8.1
        title: Updates During Installations / Removals
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-8 (1)
        parts:
        - id: cm-8.1_smt
          name: statement
          prose: The organization updates the inventory of information system components as an integral
            part of component installations, removals, and information system updates.
      - id: cm-8.2
        title: Automated Maintenance
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-8 (2)
        parts:
        - id: cm-8.2_smt
          name: statement
          prose: The organization employs automated mechanisms to help maintain an up-to-date, complete,
            accurate, and readily available inventory of information system components.
      - id: cm-8.3
        title: Automated Unauthorized Component Detection
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-8 (3)
        parts:
        - id: cm-8.3_smt
          name: statement
          prose: "The organization:\n   (3)(a).  Employs automated mechanisms [Assignment: organization-defined\
            \ frequency]\nto detect the presence of unauthorized hardware, software, and firmware components\
            \ within the information system; and\n   (3)(b).  Takes the following actions when unauthorized\
            \ components are detected:\n[Selection (one or more): disables network access by such components;\
            \ isolates the components; notifies [Assignment: organization-defined personnel or roles]]."
      - id: cm-8.4
        title: Accountability Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-8 (4)
        parts:
        - id: cm-8.4_smt
          name: statement
          prose: 'The organization includes in the information system component inventory information,
            a means for identifying by [Selection (one or more): name; position; role], individuals responsible/accountable
            for administering those components.'
      - id: cm-8.5
        title: No Duplicate Accounting Of Components
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-8 (5)
        parts:
        - id: cm-8.5_smt
          name: statement
          prose: The organization verifies that all components within the authorization boundary of the
            information system are not duplicated in other information system component inventories.
      - id: cm-8.6
        title: Assessed Configurations / Approved Deviations
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-8 (6)
        parts:
        - id: cm-8.6_smt
          name: statement
          prose: The organization includes assessed component configurations and any approved deviations
            to current deployed configurations in the information system component inventory.
      - id: cm-8.7
        title: Centralized Repository
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-8 (7)
        parts:
        - id: cm-8.7_smt
          name: statement
          prose: The organization provides a centralized repository for the inventory of information system
            components.
      - id: cm-8.8
        title: Automated Location Tracking
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-8 (8)
        parts:
        - id: cm-8.8_smt
          name: statement
          prose: The organization employs automated mechanisms to support tracking of information system
            components by geographic location.
      - id: cm-8.9
        title: Assignment Of Components To Systems
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-8 (9)
        parts:
        - id: cm-8.9_smt
          name: statement
          prose: "The organization:\n   (9)(a).  Assigns [Assignment: organization-defined acquired information\
            \ system\ncomponents] to an information system; and\n   (9)(b).  Receives an acknowledgement\
            \ from the information system owner of this\nassignment."
    - id: cm-9
      title: Configuration Management Plan
      class: SP800-53
      props:
      - name: label
        value: CM-9
      parts:
      - id: cm-9_smt
        name: statement
        prose: "The organization develops, documents, and implements a configuration management plan for\
          \ the information system that:\n  a.  Addresses roles, responsibilities, and configuration management\
          \ processes\nand procedures;\n  b.  Establishes a process for identifying configuration items\
          \ throughout the\nsystem development life cycle and for managing the configuration of the configuration\
          \ items;\n  c.  Defines the configuration items for the information system and places the\n\
          configuration items under configuration management; and\n  d.  Protects the configuration management\
          \ plan from unauthorized disclosure\nand modification."
      controls:
      - id: cm-9.1
        title: Assignment Of Responsibility
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-9 (1)
        parts:
        - id: cm-9.1_smt
          name: statement
          prose: The organization assigns responsibility for developing the configuration management process
            to organizational personnel that are not directly involved in information system development.
    - id: cm-10
      title: Software Usage Restrictions
      class: SP800-53
      props:
      - name: label
        value: CM-10
      parts:
      - id: cm-10_smt
        name: statement
        prose: "The organization:\n  a.  Uses software and associated documentation in accordance with\
          \ contract agreements\nand copyright laws;\n  b.  Tracks the use of software and associated\
          \ documentation protected by quantity\nlicenses to control copying and distribution; and\n \
          \ c.  Controls and documents the use of peer-to-peer file sharing technology to\nensure that\
          \ this capability is not used for the unauthorized distribution, display, performance, or reproduction\
          \ of copyrighted work."
      controls:
      - id: cm-10.1
        title: Open Source Software
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-10 (1)
        parts:
        - id: cm-10.1_smt
          name: statement
          prose: 'The organization establishes the following restrictions on the use of open source software:
            [Assignment: organization-defined restrictions].'
    - id: cm-11
      title: User-Installed Software
      class: SP800-53
      props:
      - name: label
        value: CM-11
      parts:
      - id: cm-11_smt
        name: statement
        prose: "The organization:\n  a.  Establishes [Assignment: organization-defined policies] governing\
          \ the installation\nof software by users;\n  b.  Enforces software installation policies through\
          \ [Assignment: organization-defined\nmethods]; and\n  c.  Monitors policy compliance at [Assignment:\
          \ organization-defined frequency]."
      controls:
      - id: cm-11.1
        title: Alerts For Unauthorized Installations
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-11 (1)
        parts:
        - id: cm-11.1_smt
          name: statement
          prose: 'The information system alerts [Assignment: organization-defined personnel or roles]
            when the unauthorized installation of software is detected.'
      - id: cm-11.2
        title: Prohibit Installation Without Privileged Status
        class: SP800-53-enhancement
        props:
        - name: label
          value: CM-11 (2)
        parts:
        - id: cm-11.2_smt
          name: statement
          prose: The information system prohibits user installation of software without explicit privileged
            status.
  - id: cp
    title: Contingency Planning
    class: family
    props:
    - name: label
      value: CP
    controls:
    - id: cp-1
      title: Contingency Planning Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: CP-1
      parts:
      - id: cp-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A contingency planning policy that addresses purpose, scope, roles,\
          \ responsibilities,\nmanagement commitment, coordination among organizational entities, and\
          \ compliance; and\n    2.  Procedures to facilitate the implementation of the contingency planning\n\
          policy and associated contingency planning controls; and\n  b.  Reviews and updates the current:\n\
          \    1.  Contingency planning policy [Assignment: organization-defined frequency];\nand\n  \
          \  2.  Contingency planning procedures [Assignment: organization-defined frequency]."
    - id: cp-2
      title: Contingency Plan
      class: SP800-53
      props:
      - name: label
        value: CP-2
      parts:
      - id: cp-2_smt
        name: statement
        prose: "The organization:\n  a.  Develops a contingency plan for the information system that:\n\
          \    1.  Identifies essential missions and business functions and associated contingency\nrequirements;\n\
          \    2.  Provides recovery objectives, restoration priorities, and metrics;\n    3.  Addresses\
          \ contingency roles, responsibilities, assigned individuals with\ncontact information;\n   \
          \ 4.  Addresses maintaining essential missions and business functions despite\nan information\
          \ system disruption, compromise, or failure;\n    5.  Addresses eventual, full information system\
          \ restoration without deterioration\nof the security safeguards originally planned and implemented;\
          \ and\n    6.  Is reviewed and approved by [Assignment: organization-defined personnel\nor roles];\n\
          \  b.  Distributes copies of the contingency plan to [Assignment: organization-defined\nkey\
          \ contingency personnel (identified by name and/or by role) and organizational elements];\n\
          \  c.  Coordinates contingency planning activities with incident handling activities;\n  d.\
          \  Reviews the contingency plan for the information system [Assignment: organization-defined\n\
          frequency];\n  e.  Updates the contingency plan to address changes to the organization, information\n\
          system, or environment of operation and problems encountered during contingency plan implementation,\
          \ execution, or testing;\n  f.  Communicates contingency plan changes to [Assignment: organization-defined\n\
          key contingency personnel (identified by name and/or by role) and organizational elements];\
          \ and\n  g.  Protects the contingency plan from unauthorized disclosure and modification."
      controls:
      - id: cp-2.1
        title: Coordinate With Related Plans
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-2 (1)
        parts:
        - id: cp-2.1_smt
          name: statement
          prose: The organization coordinates contingency plan development with organizational elements
            responsible for related plans.
      - id: cp-2.2
        title: Capacity Planning
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-2 (2)
        parts:
        - id: cp-2.2_smt
          name: statement
          prose: The organization conducts capacity planning so that necessary capacity for information
            processing, telecommunications, and environmental support exists during contingency operations.
      - id: cp-2.3
        title: Resume Essential Missions / Business Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-2 (3)
        parts:
        - id: cp-2.3_smt
          name: statement
          prose: 'The organization plans for the resumption of essential missions and business functions
            within [Assignment: organization-defined time period] of contingency plan activation.'
      - id: cp-2.4
        title: Resume All Missions / Business Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-2 (4)
        parts:
        - id: cp-2.4_smt
          name: statement
          prose: 'The organization plans for the resumption of all missions and business functions within
            [Assignment: organization-defined time period] of contingency plan activation.'
      - id: cp-2.5
        title: Continue  Essential Missions / Business Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-2 (5)
        parts:
        - id: cp-2.5_smt
          name: statement
          prose: The organization plans for the continuance of essential missions and business functions
            with little or no loss of operational continuity and sustains that continuity until full information
            system restoration at primary processing and/or storage sites.
      - id: cp-2.6
        title: Alternate Processing / Storage Site
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-2 (6)
        parts:
        - id: cp-2.6_smt
          name: statement
          prose: The organization plans for the transfer of essential missions and business functions
            to alternate processing and/or storage sites with little or no loss of operational continuity
            and sustains that continuity through information system restoration to primary processing
            and/or storage sites.
      - id: cp-2.7
        title: Coordinate  With External Service Providers
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-2 (7)
        parts:
        - id: cp-2.7_smt
          name: statement
          prose: The organization coordinates its contingency plan with the contingency plans of external
            service providers to ensure that contingency requirements can be satisfied.
      - id: cp-2.8
        title: Identify Critical Assets
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-2 (8)
        parts:
        - id: cp-2.8_smt
          name: statement
          prose: The organization identifies critical information system assets supporting essential missions
            and business functions.
    - id: cp-3
      title: Contingency Training
      class: SP800-53
      props:
      - name: label
        value: CP-3
      parts:
      - id: cp-3_smt
        name: statement
        prose: "The organization provides contingency training to information system users consistent\
          \ with assigned roles and responsibilities:\n  a.  Within [Assignment: organization-defined\
          \ time period] of assuming a contingency\nrole or responsibility;\n  b.  When required by information\
          \ system changes; and\n  c.  [Assignment: organization-defined frequency] thereafter."
      controls:
      - id: cp-3.1
        title: Simulated Events
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-3 (1)
        parts:
        - id: cp-3.1_smt
          name: statement
          prose: The organization incorporates simulated events into contingency training to facilitate
            effective response by personnel in crisis situations.
      - id: cp-3.2
        title: Automated Training Environments
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-3 (2)
        parts:
        - id: cp-3.2_smt
          name: statement
          prose: The organization employs automated mechanisms to provide a more thorough and realistic
            contingency training environment.
    - id: cp-4
      title: Contingency Plan Testing
      class: SP800-53
      props:
      - name: label
        value: CP-4
      parts:
      - id: cp-4_smt
        name: statement
        prose: "The organization:\n  a.  Tests the contingency plan for the information system [Assignment:\
          \ organization-defined\nfrequency] using [Assignment: organization-defined tests] to determine\
          \ the effectiveness of the plan and the organizational readiness to execute the plan;\n  b.\
          \  Reviews the contingency plan test results; and\n  c.  Initiates corrective actions, if needed."
      controls:
      - id: cp-4.1
        title: Coordinate With Related Plans
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-4 (1)
        parts:
        - id: cp-4.1_smt
          name: statement
          prose: The organization coordinates contingency plan testing with organizational elements responsible
            for related plans.
      - id: cp-4.2
        title: Alternate Processing Site
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-4 (2)
        parts:
        - id: cp-4.2_smt
          name: statement
          prose: "The organization tests the contingency plan at the alternate processing site:\n   (2)(a).\
            \  To familiarize contingency personnel with the facility and available\nresources; and\n\
            \   (2)(b).  To evaluate the capabilities of the alternate processing site to support\ncontingency\
            \ operations."
      - id: cp-4.3
        title: Automated Testing
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-4 (3)
        parts:
        - id: cp-4.3_smt
          name: statement
          prose: The organization employs automated mechanisms to more thoroughly and effectively test
            the contingency plan.
      - id: cp-4.4
        title: Full Recovery / Reconstitution
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-4 (4)
        parts:
        - id: cp-4.4_smt
          name: statement
          prose: The organization includes a full recovery and reconstitution of the information system
            to a known state as part of contingency plan testing.
    - id: cp-5
      title: Contingency Plan Update
      class: SP800-53
      props:
      - name: label
        value: CP-5
      parts:
      - id: cp-5_smt
        name: statement
        prose: '[Withdrawn: Incorporated into CP-2].'
    - id: cp-6
      title: Alternate Storage Site
      class: SP800-53
      props:
      - name: label
        value: CP-6
      parts:
      - id: cp-6_smt
        name: statement
        prose: "The organization:\n  a.  Establishes an alternate storage site including necessary agreements\
          \ to\npermit the storage and retrieval of information system backup information; and\n  b. \
          \ Ensures that the alternate storage site provides information security safeguards\nequivalent\
          \ to that of the primary site."
      controls:
      - id: cp-6.1
        title: Separation From Primary Site
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-6 (1)
        parts:
        - id: cp-6.1_smt
          name: statement
          prose: The organization identifies an alternate storage site that is separated from the primary
            storage site to reduce susceptibility to the same threats.
      - id: cp-6.2
        title: Recovery Time / Point Objectives
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-6 (2)
        parts:
        - id: cp-6.2_smt
          name: statement
          prose: The organization configures the alternate storage site to facilitate recovery operations
            in accordance with recovery time and recovery point objectives.
      - id: cp-6.3
        title: Accessibility
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-6 (3)
        parts:
        - id: cp-6.3_smt
          name: statement
          prose: The organization identifies potential accessibility problems to the alternate storage
            site in the event of an area-wide disruption or disaster and outlines explicit mitigation
            actions.
    - id: cp-7
      title: Alternate Processing Site
      class: SP800-53
      props:
      - name: label
        value: CP-7
      parts:
      - id: cp-7_smt
        name: statement
        prose: "The organization:\n  a.  Establishes an alternate processing site including necessary\
          \ agreements\nto permit the transfer and resumption of [Assignment: organization-defined information\
          \ system operations] for essential missions/business functions within [Assignment: organization-defined\
          \ time period consistent with recovery time and recovery point objectives] when the primary\
          \ processing capabilities are unavailable;\n  b.  Ensures that equipment and supplies required\
          \ to transfer and resume operations\nare available at the alternate processing site or contracts\
          \ are in place to support delivery to the site within the organization-defined time period for\
          \ transfer/resumption; and\n  c.  Ensures that the alternate processing site provides information\
          \ security\nsafeguards equivalent to those of the primary site."
      controls:
      - id: cp-7.1
        title: Separation From Primary Site
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-7 (1)
        parts:
        - id: cp-7.1_smt
          name: statement
          prose: The organization identifies an alternate processing site that is separated from the primary
            processing site to reduce susceptibility to the same threats.
      - id: cp-7.2
        title: Accessibility
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-7 (2)
        parts:
        - id: cp-7.2_smt
          name: statement
          prose: The organization identifies potential accessibility problems to the alternate processing
            site in the event of an area-wide disruption or disaster and outlines explicit mitigation
            actions.
      - id: cp-7.3
        title: Priority Of Service
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-7 (3)
        parts:
        - id: cp-7.3_smt
          name: statement
          prose: The organization develops alternate processing site agreements that contain priority-of-service
            provisions in accordance with organizational availability requirements (including recovery
            time objectives).
      - id: cp-7.4
        title: Preparation For Use
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-7 (4)
        parts:
        - id: cp-7.4_smt
          name: statement
          prose: The organization prepares the alternate processing site so that the site is ready to
            be used as the operational site supporting essential missions and business functions.
      - id: cp-7.5
        title: Equivalent Information Security Safeguards
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-7 (5)
        parts:
        - id: cp-7.5_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CP-7].'
      - id: cp-7.6
        title: Inability To Return To Primary Site
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-7 (6)
        parts:
        - id: cp-7.6_smt
          name: statement
          prose: The organization plans and prepares for circumstances that preclude returning to the
            primary processing site.
    - id: cp-8
      title: Telecommunications Services
      class: SP800-53
      props:
      - name: label
        value: CP-8
      parts:
      - id: cp-8_smt
        name: statement
        prose: 'The organization establishes alternate telecommunications services including necessary
          agreements to permit the resumption of [Assignment: organization-defined information system
          operations] for essential missions and business functions within [Assignment: organization-defined
          time period] when the primary telecommunications capabilities are unavailable at either the
          primary or alternate processing or storage sites.'
      controls:
      - id: cp-8.1
        title: Priority Of Service Provisions
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-8 (1)
        parts:
        - id: cp-8.1_smt
          name: statement
          prose: "The organization:\n   (1)(a).  Develops primary and alternate telecommunications service\
            \ agreements\nthat contain priority-of-service provisions in accordance with organizational\
            \ availability requirements (including recovery time objectives); and\n   (1)(b).  Requests\
            \ Telecommunications Service Priority for all telecommunications\nservices used for national\
            \ security emergency preparedness in the event that the primary and/or alternate telecommunications\
            \ services are provided by a common carrier."
      - id: cp-8.2
        title: Single Points Of Failure
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-8 (2)
        parts:
        - id: cp-8.2_smt
          name: statement
          prose: The organization obtains alternate telecommunications services to reduce the likelihood
            of sharing a single point of failure with primary telecommunications services.
      - id: cp-8.3
        title: Separation Of Primary / Alternate Providers
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-8 (3)
        parts:
        - id: cp-8.3_smt
          name: statement
          prose: The organization obtains alternate telecommunications services from providers that are
            separated from primary service providers to reduce susceptibility to the same threats.
      - id: cp-8.4
        title: Provider Contingency Plan
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-8 (4)
        parts:
        - id: cp-8.4_smt
          name: statement
          prose: "The organization:\n   (4)(a).  Requires primary and alternate telecommunications service\
            \ providers\nto have contingency plans;\n   (4)(b).  Reviews provider contingency plans to\
            \ ensure that the plans meet organizational\ncontingency requirements; and\n   (4)(c).  Obtains\
            \ evidence of contingency testing/training by providers [Assignment:\norganization-defined\
            \ frequency]."
      - id: cp-8.5
        title: Alternate Telecommunication Service Testing
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-8 (5)
        parts:
        - id: cp-8.5_smt
          name: statement
          prose: 'The organization tests alternate telecommunication services [Assignment: organization-defined
            frequency].'
    - id: cp-9
      title: Information System Backup
      class: SP800-53
      props:
      - name: label
        value: CP-9
      parts:
      - id: cp-9_smt
        name: statement
        prose: "The organization:\n  a.  Conducts backups of user-level information contained in the information\n\
          system [Assignment: organization-defined frequency consistent with recovery time and recovery\
          \ point objectives];\n  b.  Conducts backups of system-level information contained in the information\n\
          system [Assignment: organization-defined frequency consistent with recovery time and recovery\
          \ point objectives];\n  c.  Conducts backups of information system documentation including security-related\n\
          documentation [Assignment: organization-defined frequency consistent with recovery time and\
          \ recovery point objectives]; and\n  d.  Protects the confidentiality, integrity, and availability\
          \ of backup information\nat storage locations."
      controls:
      - id: cp-9.1
        title: Testing For Reliability / Integrity
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-9 (1)
        parts:
        - id: cp-9.1_smt
          name: statement
          prose: 'The organization tests backup information [Assignment: organization-defined frequency]
            to verify media reliability and information integrity.'
      - id: cp-9.2
        title: Test Restoration Using Sampling
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-9 (2)
        parts:
        - id: cp-9.2_smt
          name: statement
          prose: The organization uses a sample of backup information in the restoration of selected information
            system functions as part of contingency plan testing.
      - id: cp-9.3
        title: Separate Storage For Critical Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-9 (3)
        parts:
        - id: cp-9.3_smt
          name: statement
          prose: 'The organization stores backup copies of [Assignment: organization-defined critical
            information system software and other security-related information] in a separate facility
            or in a fire-rated container that is not collocated with the operational system.'
      - id: cp-9.4
        title: Protection From Unauthorized Modification
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-9 (4)
        parts:
        - id: cp-9.4_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CP-9].'
      - id: cp-9.5
        title: Transfer To Alternate Storage Site
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-9 (5)
        parts:
        - id: cp-9.5_smt
          name: statement
          prose: 'The organization transfers information system backup information to the alternate storage
            site [Assignment: organization-defined time period and transfer rate consistent with the recovery
            time and recovery point objectives].'
      - id: cp-9.6
        title: Redundant Secondary System
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-9 (6)
        parts:
        - id: cp-9.6_smt
          name: statement
          prose: The organization accomplishes information system backup by maintaining a redundant secondary
            system that is not collocated with the primary system and that can be activated without loss
            of information or disruption to operations.
      - id: cp-9.7
        title: Dual Authorization
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-9 (7)
        parts:
        - id: cp-9.7_smt
          name: statement
          prose: 'The organization enforces dual authorization for the deletion or destruction of [Assignment:
            organization-defined backup information].'
    - id: cp-10
      title: Information System Recovery And Reconstitution
      class: SP800-53
      props:
      - name: label
        value: CP-10
      parts:
      - id: cp-10_smt
        name: statement
        prose: The organization provides for the recovery and reconstitution of the information system
          to a known state after a disruption, compromise, or failure.
      controls:
      - id: cp-10.1
        title: Contingency Plan Testing
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-10 (1)
        parts:
        - id: cp-10.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CP-4].'
      - id: cp-10.2
        title: Transaction Recovery
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-10 (2)
        parts:
        - id: cp-10.2_smt
          name: statement
          prose: The information system implements transaction recovery for systems that are transaction-based.
      - id: cp-10.3
        title: Compensating Security Controls
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-10 (3)
        parts:
        - id: cp-10.3_smt
          name: statement
          prose: '[Withdrawn: Addressed through tailoring procedures].'
      - id: cp-10.4
        title: Restore Within Time Period
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-10 (4)
        parts:
        - id: cp-10.4_smt
          name: statement
          prose: 'The organization provides the capability to restore information system components within
            [Assignment: organization-defined restoration time-periods] from configuration-controlled
            and integrity-protected information representing a known, operational state for the components.'
      - id: cp-10.5
        title: Failover Capability
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-10 (5)
        parts:
        - id: cp-10.5_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SI-13].'
      - id: cp-10.6
        title: Component Protection
        class: SP800-53-enhancement
        props:
        - name: label
          value: CP-10 (6)
        parts:
        - id: cp-10.6_smt
          name: statement
          prose: The organization protects backup and restoration hardware, firmware, and software.
    - id: cp-11
      title: Alternate Communications Protocols
      class: SP800-53
      props:
      - name: label
        value: CP-11
      parts:
      - id: cp-11_smt
        name: statement
        prose: 'The information system provides the capability to employ [Assignment: organization-defined
          alternative communications protocols] in support of maintaining continuity of operations.'
    - id: cp-12
      title: Safe Mode
      class: SP800-53
      props:
      - name: label
        value: CP-12
      parts:
      - id: cp-12_smt
        name: statement
        prose: 'The information system, when [Assignment: organization-defined conditions] are detected,
          enters a safe mode of operation with [Assignment: organization-defined restrictions of safe
          mode of operation].'
    - id: cp-13
      title: Alternative Security Mechanisms
      class: SP800-53
      props:
      - name: label
        value: CP-13
      parts:
      - id: cp-13_smt
        name: statement
        prose: 'The organization employs [Assignment: organization-defined alternative or supplemental
          security mechanisms] for satisfying [Assignment: organization-defined security functions] when
          the primary means of implementing the security function is unavailable or compromised.'
  - id: ia
    title: Identification and Authentication
    class: family
    props:
    - name: label
      value: IA
    controls:
    - id: ia-1
      title: Identification And Authentication Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: IA-1
      parts:
      - id: ia-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  An identification and authentication policy that addresses purpose,\
          \ scope,\nroles, responsibilities, management commitment, coordination among organizational\
          \ entities, and compliance; and\n    2.  Procedures to facilitate the implementation of the\
          \ identification and\nauthentication policy and associated identification and authentication\
          \ controls; and\n  b.  Reviews and updates the current:\n    1.  Identification and authentication\
          \ policy [Assignment: organization-defined\nfrequency]; and\n    2.  Identification and authentication\
          \ procedures [Assignment: organization-defined\nfrequency]."
    - id: ia-2
      title: Identification And Authentication (Organizational Users)
      class: SP800-53
      props:
      - name: label
        value: IA-2
      parts:
      - id: ia-2_smt
        name: statement
        prose: The information system uniquely identifies and authenticates organizational users (or processes
          acting on behalf of organizational users).
      controls:
      - id: ia-2.1
        title: Network Access To Privileged Accounts
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-2 (1)
        parts:
        - id: ia-2.1_smt
          name: statement
          prose: The information system implements multifactor authentication for network access to privileged
            accounts.
      - id: ia-2.2
        title: Network Access To Non-Privileged Accounts
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-2 (2)
        parts:
        - id: ia-2.2_smt
          name: statement
          prose: The information system implements multifactor authentication for network access to non-privileged
            accounts.
      - id: ia-2.3
        title: Local Access To Privileged Accounts
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-2 (3)
        parts:
        - id: ia-2.3_smt
          name: statement
          prose: The information system implements multifactor authentication for local access to privileged
            accounts.
      - id: ia-2.4
        title: Local Access To Non-Privileged Accounts
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-2 (4)
        parts:
        - id: ia-2.4_smt
          name: statement
          prose: The information system implements multifactor authentication for local access to non-privileged
            accounts.
      - id: ia-2.5
        title: Group Authentication
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-2 (5)
        parts:
        - id: ia-2.5_smt
          name: statement
          prose: The organization requires individuals to be authenticated with an individual authenticator
            when a group authenticator is employed.
      - id: ia-2.6
        title: Network Access To Privileged Accounts - Separate Device
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-2 (6)
        parts:
        - id: ia-2.6_smt
          name: statement
          prose: 'The information system implements multifactor authentication for network access to privileged
            accounts such that one of the factors is provided by a device separate from the system gaining
            access and the device meets [Assignment: organization-defined strength of mechanism requirements].'
      - id: ia-2.7
        title: Network Access To Non-Privileged Accounts - Separate Device
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-2 (7)
        parts:
        - id: ia-2.7_smt
          name: statement
          prose: 'The information system implements multifactor authentication for network access to non-privileged
            accounts such that one of the factors is provided by a device separate from the system gaining
            access and the device meets [Assignment: organization-defined strength of mechanism requirements].'
      - id: ia-2.8
        title: Network Access To Privileged Accounts - Replay Resistant
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-2 (8)
        parts:
        - id: ia-2.8_smt
          name: statement
          prose: The information system implements replay-resistant authentication mechanisms for network
            access to privileged accounts.
      - id: ia-2.9
        title: Network Access To Non-Privileged Accounts - Replay Resistant
        class: SP800-53-enhancement
        props:

            and to audit access attempts and access granted.
    - id: mp-5
      title: Media Transport
      class: SP800-53
      props:
      - name: label
        value: MP-5
      parts:
      - id: mp-5_smt
        name: statement
        prose: "The organization:\n  a.  Protects and controls [Assignment: organization-defined types\
          \ of information\nsystem media] during transport outside of controlled areas using [Assignment:\
          \ organization-defined security safeguards];\n  b.  Maintains accountability for information\
          \ system media during transport outside\nof controlled areas;\n  c.  Documents activities associated\
          \ with the transport of information system\nmedia; and\n  d.  Restricts the activities associated\
          \ with the transport of information system\nmedia to authorized personnel."
      controls:
      - id: mp-5.1
        title: Protection Outside Of Controlled Areas
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-5 (1)
        parts:
        - id: mp-5.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-5].'
      - id: mp-5.2
        title: Documentation Of Activities
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-5 (2)
        parts:
        - id: mp-5.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-5].'
      - id: mp-5.3
        title: Custodians
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-5 (3)
        parts:
        - id: mp-5.3_smt
          name: statement
          prose: The organization employs an identified custodian during transport of information system
            media outside of controlled areas.
      - id: mp-5.4
        title: Cryptographic Protection
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-5 (4)
        parts:
        - id: mp-5.4_smt
          name: statement
          prose: The information system implements cryptographic mechanisms to protect the confidentiality
            and integrity of information stored on digital media during transport outside of controlled
            areas.
    - id: mp-6
      title: Media Sanitization
      class: SP800-53
      props:
      - name: label
        value: MP-6
      parts:
      - id: mp-6_smt
        name: statement
        prose: "The organization:\n  a.  Sanitizes [Assignment: organization-defined information system\
          \ media] prior\nto disposal, release out of organizational control, or release for reuse using\
          \ [Assignment: organization-defined sanitization techniques and procedures] in accordance with\
          \ applicable federal and organizational standards and policies; and\n  b.  Employs sanitization\
          \ mechanisms with the strength and integrity commensurate\nwith the security category or classification\
          \ of the information."
      controls:
      - id: mp-6.1
        title: Review / Approve / Track / Document / Verify
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-6 (1)
        parts:
        - id: mp-6.1_smt
          name: statement
          prose: The organization reviews, approves, tracks, documents, and verifies media sanitization
            and disposal actions.
      - id: mp-6.2
        title: Equipment Testing
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-6 (2)
        parts:
        - id: mp-6.2_smt
          name: statement
          prose: 'The organization tests sanitization equipment and procedures [Assignment: organization-defined
            frequency] to verify that the intended sanitization is being achieved.'
      - id: mp-6.3
        title: Nondestructive Techniques
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-6 (3)
        parts:
        - id: mp-6.3_smt
          name: statement
          prose: 'The organization applies nondestructive sanitization techniques to portable storage
            devices prior to connecting such devices to the information system under the following circumstances:
            [Assignment: organization-defined circumstances requiring sanitization of portable storage
            devices].'
      - id: mp-6.4
        title: Controlled Unclassified Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-6 (4)
        parts:
        - id: mp-6.4_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-6].'
      - id: mp-6.5
        title: Classified Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-6 (5)
        parts:
        - id: mp-6.5_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-6].'
      - id: mp-6.6
        title: Media Destruction
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-6 (6)
        parts:
        - id: mp-6.6_smt
          name: statement
          prose: '[Withdrawn: Incorporated into MP-6].'
      - id: mp-6.7
        title: Dual Authorization
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-6 (7)
        parts:
        - id: mp-6.7_smt
          name: statement
          prose: 'The organization enforces dual authorization for the sanitization of [Assignment: organization-defined
            information system media].'
      - id: mp-6.8
        title: Remote Purging / Wiping Of Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-6 (8)
        parts:
        - id: mp-6.8_smt
          name: statement
          prose: 'The organization provides the capability to purge/wipe information from [Assignment:
            organization-defined information systems, system components, or devices] either remotely or
            under the following conditions: [Assignment: organization-defined conditions].'
    - id: mp-7
      title: Media Use
      class: SP800-53
      props:
      - name: label
        value: MP-7
      parts:
      - id: mp-7_smt
        name: statement
        prose: 'The organization [Selection: restricts; prohibits] the use of [Assignment: organization-defined
          types of information system media] on [Assignment: organization-defined information systems
          or system components] using [Assignment: organization-defined security safeguards].'
      controls:
      - id: mp-7.1
        title: Prohibit Use Without Owner
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-7 (1)
        parts:
        - id: mp-7.1_smt
          name: statement
          prose: The organization prohibits the use of portable storage devices in organizational information
            systems when such devices have no identifiable owner.
      - id: mp-7.2
        title: Prohibit Use Of Sanitization-Resistant Media
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-7 (2)
        parts:
        - id: mp-7.2_smt
          name: statement
          prose: The organization prohibits the use of sanitization-resistant media in organizational
            information systems.
    - id: mp-8
      title: Media Downgrading
      class: SP800-53
      props:
      - name: label
        value: MP-8
      parts:
      - id: mp-8_smt
        name: statement
        prose: "The organization:\n  a.  Establishes [Assignment: organization-defined information system\
          \ media downgrading\nprocess] that includes employing downgrading mechanisms with [Assignment:\
          \ organization-defined strength and integrity];\n  b.  Ensures that the information system media\
          \ downgrading process is commensurate\nwith the security category and/or classification level\
          \ of the information to be removed and the access authorizations of the potential recipients\
          \ of the downgraded information;\n  c.  Identifies [Assignment: organization-defined information\
          \ system media requiring\ndowngrading]; and\n  d.  Downgrades the identified information system\
          \ media using the established\nprocess."
      controls:
      - id: mp-8.1
        title: Documentation Of Process
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-8 (1)
        parts:
        - id: mp-8.1_smt
          name: statement
          prose: The organization documents information system media downgrading actions.
      - id: mp-8.2
        title: Equipment Testing
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-8 (2)
        parts:
        - id: mp-8.2_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined tests] of downgrading equipment
            and procedures to verify correct performance [Assignment: organization-defined frequency].'
      - id: mp-8.3
        title: Controlled Unclassified Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-8 (3)
        parts:
        - id: mp-8.3_smt
          name: statement
          prose: 'The organization downgrades information system media containing [Assignment: organization-defined
            Controlled Unclassified Information (CUI)] prior to public release in accordance with applicable
            federal and organizational standards and policies.'
      - id: mp-8.4
        title: Classified Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: MP-8 (4)
        parts:
        - id: mp-8.4_smt
          name: statement
          prose: The organization downgrades information system media containing classified information
            prior to release to individuals without required access authorizations in accordance with
            NSA standards and policies.
  - id: pe
    title: Physical and Environmental Protection
    class: family
    props:
    - name: label
      value: PE
    controls:
    - id: pe-1
      title: Physical And Environmental Protection Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: PE-1
      parts:
      - id: pe-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A physical and environmental protection policy that addresses\
          \ purpose,\nscope, roles, responsibilities, management commitment, coordination among organizational\
          \ entities, and compliance; and\n    2.  Procedures to facilitate the implementation of the\
          \ physical and environmental\nprotection policy and associated physical and environmental protection\
          \ controls; and\n  b.  Reviews and updates the current:\n    1.  Physical and environmental\
          \ protection  policy [Assignment: organization-defined\nfrequency]; and\n    2.  Physical and\
          \ environmental protection procedures [Assignment: organization-defined\nfrequency]."
    - id: pe-2
      title: Physical Access Authorizations
      class: SP800-53
      props:
      - name: label
        value: PE-2
      parts:
      - id: pe-2_smt
        name: statement
        prose: "The organization:\n  a.  Develops, approves, and maintains a list of individuals with\
          \ authorized\naccess to the facility where the information system resides;\n  b.  Issues authorization\
          \ credentials for facility access;\n  c.  Reviews the access list detailing authorized facility\
          \ access by individuals\n[Assignment: organization-defined frequency]; and\n  d.  Removes individuals\
          \ from the facility access list when access is no longer\nrequired."
      controls:
      - id: pe-2.1
        title: Access By Position / Role
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-2 (1)
        parts:
        - id: pe-2.1_smt
          name: statement
          prose: The organization authorizes physical access to the facility where the information system
            resides based on position or role.
      - id: pe-2.2
        title: Two Forms Of Identification
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-2 (2)
        parts:
        - id: pe-2.2_smt
          name: statement
          prose: 'The organization requires two forms of identification from [Assignment: organization-defined
            list of acceptable forms of identification] for visitor access to the facility where the information
            system resides.'
      - id: pe-2.3
        title: Restrict Unescorted Access
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-2 (3)
        parts:
        - id: pe-2.3_smt
          name: statement
          prose: 'The organization restricts unescorted access to the facility where the information system
            resides to personnel with [Selection (one or more): security clearances for all information
            contained within the system; formal access authorizations for all information contained within
            the system; need for access to all information contained within the system; [Assignment: organization-defined
            credentials]].'
    - id: pe-3
      title: Physical Access Control
      class: SP800-53
      props:
      - name: label
        value: PE-3
      parts:
      - id: pe-3_smt
        name: statement
        prose: "The organization:\n  a.  Enforces physical access authorizations at [Assignment: organization-defined\n\
          entry/exit points to the facility where the information system resides] by;\n    1.  Verifying\
          \ individual access authorizations before granting access to the\nfacility; and\n    2.  Controlling\
          \ ingress/egress to the facility using [Selection (one or more):\n[Assignment: organization-defined\
          \ physical access control systems/devices]; guards];\n  b.  Maintains physical access audit\
          \ logs for [Assignment: organization-defined\nentry/exit points];\n  c.  Provides [Assignment:\
          \ organization-defined security safeguards] to control\naccess to areas within the facility\
          \ officially designated as publicly accessible;\n  d.  Escorts visitors and monitors visitor\
          \ activity [Assignment: organization-defined\ncircumstances requiring visitor escorts and monitoring];\n\
          \  e.  Secures keys, combinations, and other physical access devices;\n  f.  Inventories [Assignment:\
          \ organization-defined physical access devices] every\n[Assignment: organization-defined frequency];\
          \ and\n  g.  Changes combinations and keys [Assignment: organization-defined frequency]\nand/or\
          \ when keys are lost, combinations are compromised, or individuals are transferred or terminated."
      controls:
      - id: pe-3.1
        title: Information System Access
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-3 (1)
        parts:
        - id: pe-3.1_smt
          name: statement
          prose: 'The organization enforces physical access authorizations to the information system in
            addition to the physical access controls for the facility at [Assignment: organization-defined
            physical spaces containing one or more components of the information system].'
      - id: pe-3.2
        title: Facility / Information System Boundaries
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-3 (2)
        parts:
        - id: pe-3.2_smt
          name: statement
          prose: 'The organization performs security checks [Assignment: organization-defined frequency]
            at the physical boundary of the facility or information system for unauthorized exfiltration
            of information or removal of information system components.'
      - id: pe-3.3
        title: Continuous Guards / Alarms / Monitoring
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-3 (3)
        parts:
        - id: pe-3.3_smt
          name: statement
          prose: The organization employs guards and/or alarms to monitor every physical access point
            to the facility where the information system resides 24 hours per day, 7 days per week.
      - id: pe-3.4
        title: Lockable Casings
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-3 (4)
        parts:
        - id: pe-3.4_smt
          name: statement
          prose: 'The organization uses lockable physical casings to protect [Assignment: organization-defined
            information system components] from unauthorized physical access.'
      - id: pe-3.5
        title: Tamper Protection
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-3 (5)
        parts:
        - id: pe-3.5_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined security safeguards] to [Selection
            (one or more): detect; prevent] physical tampering or alteration of [Assignment: organization-defined
            hardware components] within the information system.'
      - id: pe-3.6
        title: Facility Penetration Testing
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-3 (6)
        parts:
        - id: pe-3.6_smt
          name: statement
          prose: 'The organization employs a penetration testing process that includes [Assignment: organization-defined
            frequency], unannounced attempts to bypass or circumvent security controls associated with
            physical access points to the facility.'
    - id: pe-4
      title: Access Control For Transmission Medium
      class: SP800-53
      props:
      - name: label
        value: PE-4
      parts:
      - id: pe-4_smt
        name: statement
        prose: 'The organization controls physical access to [Assignment: organization-defined information
          system distribution and transmission lines] within organizational facilities using [Assignment:
          organization-defined security safeguards].'
    - id: pe-5
      title: Access Control For Output Devices
      class: SP800-53
      props:
      - name: label
        value: PE-5
      parts:
      - id: pe-5_smt
        name: statement
        prose: The organization controls physical access to information system output devices to prevent
          unauthorized individuals from obtaining the output.
      controls:
      - id: pe-5.1
        title: Access To Output By Authorized Individuals
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-5 (1)
        parts:
        - id: pe-5.1_smt
          name: statement
          prose: "The organization:\n   (1)(a).  Controls physical access to output from [Assignment:\
            \ organization-defined output devices]; and\n   (1)(b).  Ensures that only authorized individuals\
            \ receive output from the device."
      - id: pe-5.2
        title: Access To Output By Individual Identity
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-5 (2)
        parts:
        - id: pe-5.2_smt
          name: statement
          prose: "The information system:\n   (2)(a).  Controls physical access to output from [Assignment:\
            \ organization-defined output devices]; and\n   (2)(b).  Links individual identity to receipt\
            \ of the output from the device."
      - id: pe-5.3
        title: Marking Output Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-5 (3)
        parts:
        - id: pe-5.3_smt
          name: statement
          prose: 'The organization marks [Assignment: organization-defined information system output devices]
            indicating the appropriate security marking of the information permitted to be output from
            the device.'
    - id: pe-6
      title: Monitoring Physical Access
      class: SP800-53
      props:
      - name: label
        value: PE-6
      parts:
      - id: pe-6_smt
        name: statement
        prose: "The organization:\n  a.  Monitors physical access to the facility where the information\
          \ system resides\nto detect and respond to physical security incidents;\n  b.  Reviews physical\
          \ access logs [Assignment: organization-defined frequency]\nand upon occurrence of [Assignment:\
          \ organization-defined events or potential indications of events]; and\n  c.  Coordinates results\
          \ of reviews and investigations with the organizational\nincident response capability."
      controls:
      - id: pe-6.1
        title: Intrusion Alarms / Surveillance Equipment
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-6 (1)
        parts:
        - id: pe-6.1_smt
          name: statement
          prose: The organization monitors physical intrusion alarms and surveillance equipment.
      - id: pe-6.2
        title: Automated Intrusion Recognition / Responses
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-6 (2)
        parts:
        - id: pe-6.2_smt
          name: statement
          prose: 'The organization employs automated mechanisms to recognize [Assignment: organization-defined
            classes/types of intrusions] and initiate [Assignment: organization-defined response actions].'
      - id: pe-6.3
        title: Video Surveillance
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-6 (3)
        parts:
        - id: pe-6.3_smt
          name: statement
          prose: 'The organization employs video surveillance of [Assignment: organization-defined operational
            areas] and retains video recordings for [Assignment: organization-defined time period].'
      - id: pe-6.4
        title: Monitoring Physical Access To Information Systems
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-6 (4)
        parts:
        - id: pe-6.4_smt
          name: statement
          prose: 'The organization monitors physical access to the information system in addition to the
            physical access monitoring of the facility as [Assignment: organization-defined physical spaces
            containing one or more components of the information system].'
    - id: pe-7
      title: Visitor Control
      class: SP800-53
      props:
      - name: label
        value: PE-7
      parts:
      - id: pe-7_smt
        name: statement
        prose: '[Withdrawn: Incorporated into PE-2 and PE-3].'
    - id: pe-8
      title: Visitor Access Records
      class: SP800-53
      props:
      - name: label
        value: PE-8
      parts:
      - id: pe-8_smt
        name: statement
        prose: "The organization:\n  a.  Maintains visitor access records to the facility where the information\
          \ system\nresides for [Assignment: organization-defined time period]; and\n  b.  Reviews visitor\
          \ access records [Assignment: organization-defined frequency]."
      controls:
      - id: pe-8.1
        title: Automated Records Maintenance / Review
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-8 (1)
        parts:
        - id: pe-8.1_smt
          name: statement
          prose: The organization employs automated mechanisms to facilitate the maintenance and review
            of visitor access records.
      - id: pe-8.2
        title: Physical Access Records
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-8 (2)
        parts:
        - id: pe-8.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into PE-2].'
    - id: pe-9
      title: Power Equipment And Cabling
      class: SP800-53
      props:
      - name: label
        value: PE-9
      parts:
      - id: pe-9_smt
        name: statement
        prose: The organization protects power equipment and power cabling for the information system
          from damage and destruction.
      controls:
      - id: pe-9.1
        title: Redundant Cabling
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-9 (1)
        parts:
        - id: pe-9.1_smt
          name: statement
          prose: 'The organization employs redundant power cabling paths that are physically separated
            by [Assignment: organization-defined distance].'
      - id: pe-9.2
        title: Automatic Voltage Controls
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-9 (2)
        parts:
        - id: pe-9.2_smt
          name: statement
          prose: 'The organization employs automatic voltage controls for [Assignment: organization-defined
            critical information system components].'
    - id: pe-10
      title: Emergency Shutoff
      class: SP800-53
      props:
      - name: label
        value: PE-10
      parts:
      - id: pe-10_smt
        name: statement
        prose: "The organization:\n  a.  Provides the capability of shutting off power to the information\
          \ system\nor individual system components in emergency situations;\n  b.  Places emergency shutoff\
          \ switches or devices in [Assignment: organization-defined\nlocation by information system or\
          \ system component] to facilitate safe and easy access for personnel; and\n  c.  Protects emergency\
          \ power shutoff capability from unauthorized activation."
      controls:
      - id: pe-10.1
        title: Accidental / Unauthorized Activation
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-10 (1)
        parts:
        - id: pe-10.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into PE-10].'
    - id: pe-11
      title: Emergency Power
      class: SP800-53
      props:
      - name: label
        value: PE-11
      parts:
      - id: pe-11_smt
        name: statement
        prose: 'The organization provides a short-term uninterruptible power supply to facilitate [Selection
          (one or more): an orderly shutdown of the information system; transition of the information
          system to long-term alternate power] in the event of a primary power source loss.'
      controls:
      - id: pe-11.1
        title: Long-Term Alternate Power Supply - Minimal Operational Capability
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-11 (1)
        parts:
        - id: pe-11.1_smt
          name: statement
          prose: The organization provides a long-term alternate power supply for the information system
            that is capable of maintaining minimally required operational capability in the event of an
            extended loss of the primary power source.
      - id: pe-11.2
        title: Long-Term Alternate Power Supply - Self-Contained
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-11 (2)
        parts:
        - id: pe-11.2_smt
          name: statement
          prose: "The organization provides a long-term alternate power supply for the information system\
            \ that is:\n   (2)(a).  Self-contained;\n   (2)(b).  Not reliant on external power generation;\
            \ and\n   (2)(c).  Capable of maintaining [Selection: minimally required operational\ncapability;\
            \ full operational capability] in the event of an extended loss of the primary power source."
    - id: pe-12
      title: Emergency Lighting
      class: SP800-53
      props:
      - name: label
        value: PE-12
      parts:
      - id: pe-12_smt
        name: statement
        prose: The organization employs and maintains automatic emergency lighting for the information
          system that activates in the event of a power outage or disruption and that covers emergency
          exits and evacuation routes within the facility.
      controls:
      - id: pe-12.1
        title: Essential Missions / Business Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-12 (1)
        parts:
        - id: pe-12.1_smt
          name: statement
          prose: The organization provides emergency lighting for all areas within the facility supporting
            essential missions and business functions.
    - id: pe-13
      title: Fire Protection
      class: SP800-53
      props:
      - name: label
        value: PE-13
      parts:
      - id: pe-13_smt
        name: statement
        prose: The organization employs and maintains fire suppression and detection devices/systems for
          the information system that are supported by an independent energy source.
      controls:
      - id: pe-13.1
        title: Detection Devices / Systems
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-13 (1)
        parts:
        - id: pe-13.1_smt
          name: statement
          prose: 'The organization employs fire detection devices/systems for the information system that
            activate automatically and notify [Assignment: organization-defined personnel or roles] and
            [Assignment: organization-defined emergency responders] in the event of a fire.'
      - id: pe-13.2
        title: Suppression Devices / Systems
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-13 (2)
        parts:
        - id: pe-13.2_smt
          name: statement
          prose: 'The organization employs fire suppression devices/systems for the information system
            that provide automatic notification of any activation to Assignment: organization-defined
            personnel or roles] and [Assignment: organization-defined emergency responders].'
      - id: pe-13.3
        title: Automatic Fire Suppression
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-13 (3)
        parts:
        - id: pe-13.3_smt
          name: statement
          prose: The organization employs an automatic fire suppression capability for the information
            system when the facility is not staffed on a continuous basis.
      - id: pe-13.4
        title: Inspections
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-13 (4)
        parts:
        - id: pe-13.4_smt
          name: statement
          prose: 'The organization ensures that the facility undergoes [Assignment: organization-defined
            frequency] inspections by authorized and qualified inspectors and resolves identified deficiencies
            within [Assignment: organization-defined time period].'
    - id: pe-14
      title: Temperature And Humidity Controls
      class: SP800-53
      props:
      - name: label
        value: PE-14
      parts:
      - id: pe-14_smt
        name: statement
        prose: "The organization:\n  a.  Maintains temperature and humidity levels within the facility\
          \ where the\ninformation system resides at [Assignment: organization-defined acceptable levels];\
          \ and\n  b.  Monitors temperature and humidity levels [Assignment: organization-defined\nfrequency]."
      controls:
      - id: pe-14.1
        title: Automatic Controls
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-14 (1)
        parts:
        - id: pe-14.1_smt
          name: statement
          prose: The organization employs automatic temperature and humidity controls in the facility
            to prevent fluctuations potentially harmful to the information system.
      - id: pe-14.2
        title: Monitoring With Alarms / Notifications
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-14 (2)
        parts:
        - id: pe-14.2_smt
          name: statement
          prose: The organization employs temperature and humidity monitoring that provides an alarm or
            notification of changes potentially harmful to personnel or equipment.
    - id: pe-15
      title: Water Damage Protection
      class: SP800-53
      props:
      - name: label
        value: PE-15
      parts:
      - id: pe-15_smt
        name: statement
        prose: The organization protects the information system from damage resulting from water leakage
          by providing master shutoff or isolation valves that are accessible, working properly, and known
          to key personnel.
      controls:
      - id: pe-15.1
        title: Automation Support
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-15 (1)
        parts:
        - id: pe-15.1_smt
          name: statement
          prose: 'The organization employs automated mechanisms to detect the presence of water in the
            vicinity of the information system and alerts [Assignment: organization-defined personnel
            or roles].'
    - id: pe-16
      title: Delivery And Removal
      class: SP800-53
      props:
      - name: label
        value: PE-16
      parts:
      - id: pe-16_smt
        name: statement
        prose: 'The organization authorizes, monitors, and controls [Assignment: organization-defined
          types of information system components] entering and exiting the facility and maintains records
          of those items.'
    - id: pe-17
      title: Alternate Work Site
      class: SP800-53
      props:
      - name: label
        value: PE-17
      parts:
      - id: pe-17_smt
        name: statement
        prose: "The organization:\n  a.  Employs [Assignment: organization-defined security controls]\
          \ at alternate\nwork sites;\n  b.  Assesses as feasible, the effectiveness of security controls\
          \ at alternate\nwork sites; and\n  c.  Provides a means for employees to communicate with information\
          \ security\npersonnel in case of security incidents or problems."
    - id: pe-18
      title: Location Of Information System Components
      class: SP800-53
      props:
      - name: label
        value: PE-18
      parts:
      - id: pe-18_smt
        name: statement
        prose: 'The organization positions information system components within the facility to minimize
          potential damage from [Assignment: organization-defined physical and environmental hazards]
          and to minimize the opportunity for unauthorized access.'
      controls:
      - id: pe-18.1
        title: Facility Site
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-18 (1)
        parts:
        - id: pe-18.1_smt
          name: statement
          prose: The organization plans the location or site of the facility where the information system
            resides with regard to physical and environmental hazards and for existing facilities, considers
            the physical and environmental hazards in its risk mitigation strategy.
    - id: pe-19
      title: Information Leakage
      class: SP800-53
      props:
      - name: label
        value: PE-19
      parts:
      - id: pe-19_smt
        name: statement
        prose: The organization protects the information system from information leakage due to electromagnetic
          signals emanations.
      controls:
      - id: pe-19.1
        title: National Emissions / Tempest Policies And Procedures
        class: SP800-53-enhancement
        props:
        - name: label
          value: PE-19 (1)
        parts:
        - id: pe-19.1_smt
          name: statement
          prose: The organization ensures that information system components, associated data communications,
            and networks are protected in accordance with national emissions and TEMPEST policies and
            procedures based on the security category or classification of the information.
    - id: pe-20
      title: Asset Monitoring And Tracking
      class: SP800-53
      props:
      - name: label
        value: PE-20
      parts:
      - id: pe-20_smt
        name: statement
        prose: "The organization:\n  a.  Employs [Assignment: organization-defined asset location technologies]\
          \ to\ntrack and monitor the location and movement of [Assignment: organization-defined assets]\
          \ within [Assignment: organization-defined controlled areas]; and\n  b.  Ensures that asset\
          \ location technologies are employed in accordance with\napplicable federal laws, Executive\
          \ Orders, directives, regulations, policies, standards, and guidance."
  - id: pl
    title: Planning
    class: family
    props:
    - name: label
      value: PL
    controls:
    - id: pl-1
      title: Security Planning Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: PL-1
      parts:
      - id: pl-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A security planning policy that addresses purpose, scope, roles,\
          \ responsibilities,\nmanagement commitment, coordination among organizational entities, and\
          \ compliance; and\n    2.  Procedures to facilitate the implementation of the security planning\
          \ policy\nand associated security planning controls; and\n  b.  Reviews and updates the current:\n\
          \    1.  Security planning policy [Assignment: organization-defined frequency];\nand\n    2.\
          \  Security planning procedures [Assignment: organization-defined frequency]."
    - id: pl-2
      title: System Security Plan
      class: SP800-53
      props:
      - name: label
        value: PL-2
      parts:
      - id: pl-2_smt
        name: statement
        prose: "The organization:\n  a.  Develops a security plan for the information system that:\n \
          \   1.  Is consistent with the organization�s enterprise architecture;\n    2.  Explicitly defines\
          \ the authorization boundary for the system;\n    3.  Describes the operational context of the\
          \ information system in terms of\nmissions and business processes;\n    4.  Provides the security\
          \ categorization of the information system including\nsupporting rationale;\n    5.  Describes\
          \ the operational environment for the information system and relationships\nwith or connections\
          \ to other information systems;\n    6.  Provides an overview of the security requirements for\
          \ the system;\n    7.  Identifies any relevant overlays, if applicable;\n    8.  Describes the\
          \ security controls in place or planned for meeting those\nrequirements including a rationale\
          \ for the tailoring decisions; and\n    9.  Is reviewed and approved by the authorizing official\
          \ or designated representative\nprior to plan implementation;\n  b.  Distributes copies of the\
          \ security plan and communicates subsequent changes\nto the plan to [Assignment: organization-defined\
          \ personnel or roles];\n  c.  Reviews the security plan for the information system [Assignment:\
          \ organization-defined\nfrequency];\n  d.  Updates the plan to address changes to the information\
          \ system/environment\nof operation or problems identified during plan implementation or security\
          \ control assessments; and\n  e.  Protects the security plan from unauthorized disclosure and\
          \ modification."
      controls:
      - id: pl-2.1
        title: Concept Of Operations
        class: SP800-53-enhancement
        props:
        - name: label
          value: PL-2 (1)
        parts:
        - id: pl-2.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into PL-7].'
      - id: pl-2.2
        title: Functional Architecture
        class: SP800-53-enhancement
        props:
        - name: label
          value: PL-2 (2)
        parts:
        - id: pl-2.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into PL-8].'
      - id: pl-2.3
        title: Plan / Coordinate With Other Organizational Entities
        class: SP800-53-enhancement
        props:
        - name: label
          value: PL-2 (3)
        parts:
        - id: pl-2.3_smt
          name: statement
          prose: 'The organization plans and coordinates security-related activities affecting the information
            system with [Assignment: organization-defined individuals or groups] before conducting such
            activities in order to reduce the impact on other organizational entities.'
    - id: pl-3
      title: System Security Plan Update
      class: SP800-53
      props:
      - name: label
        value: PL-3
      parts:
      - id: pl-3_smt
        name: statement
        prose: '[Withdrawn: Incorporated into PL-2].'
    - id: pl-4
      title: Rules Of Behavior
      class: SP800-53
      props:
      - name: label
        value: PL-4
      parts:
      - id: pl-4_smt
        name: statement
        prose: "The organization:\n  a.  Establishes and makes readily available to individuals requiring\
          \ access\nto the information system, the rules that describe their responsibilities and expected\
          \ behavior with regard to information and information system usage;\n  b.  Receives a signed\
          \ acknowledgment from such individuals, indicating that\nthey have read, understand, and agree\
          \ to abide by the rules of behavior, before authorizing access to information and the information\
          \ system;\n  c.  Reviews and updates the rules of behavior [Assignment: organization-defined\n\
          frequency]; and\n  d.  Requires individuals who have signed a previous version of the rules\
          \ of\nbehavior to read and re-sign when the rules of behavior are revised/updated."
      controls:
      - id: pl-4.1
        title: Social Media And Networking Restrictions
        class: SP800-53-enhancement
        props:
        - name: label
          value: PL-4 (1)
        parts:
        - id: pl-4.1_smt
          name: statement
          prose: The organization includes in the rules of behavior, explicit restrictions on the use
            of social media/networking sites and posting organizational information on public websites.
    - id: pl-5
      title: Privacy Impact Assessment
      class: SP800-53
      props:
      - name: label
        value: PL-5
      parts:
      - id: pl-5_smt
        name: statement
        prose: '[Withdrawn: Incorporated into Appendix J, AR-2].'
    - id: pl-6
      title: Security-Related Activity Planning
      class: SP800-53
      props:
      - name: label
        value: PL-6
      parts:
      - id: pl-6_smt
        name: statement
        prose: '[Withdrawn: Incorporated into PL-2].'
    - id: pl-7
      title: Security Concept Of Operations
      class: SP800-53
      props:
      - name: label
        value: PL-7
      parts:
      - id: pl-7_smt
        name: statement
        prose: "The organization:\n  a.  Develops a security Concept of Operations (CONOPS) for the information\
          \ system\ncontaining at a minimum, how the organization intends to operate the system from the\
          \ perspective of information security; and\n  b.  Reviews and updates the CONOPS [Assignment:\
          \ organization-defined frequency]."
    - id: pl-8
      title: Information Security Architecture
      class: SP800-53
      props:
      - name: label
        value: PL-8
      parts:
      - id: pl-8_smt
        name: statement
        prose: "The organization:\n  a.  Develops an information security architecture for the information\
          \ system\nthat:\n    1.  Describes the overall philosophy, requirements, and approach to be\
          \ taken\nwith regard to protecting the confidentiality, integrity, and availability of organizational\
          \ information;\n    2.  Describes how the information security architecture is integrated into\n\
          and supports the enterprise architecture; and\n    3.  Describes any information security assumptions\
          \ about, and dependencies\non, external services;\n  b.  Reviews and updates the information\
          \ security architecture [Assignment: organization-defined\nfrequency] to reflect updates in\
          \ the enterprise architecture; and\n  c.  Ensures that planned information security architecture\
          \ changes are reflected\nin the security plan, the security Concept of Operations (CONOPS),\
          \ and organizational procurements/acquisitions."
      controls:
      - id: pl-8.1
        title: Defense-In-Depth
        class: SP800-53-enhancement
        props:
        - name: label
          value: PL-8 (1)
        parts:
        - id: pl-8.1_smt
          name: statement
          prose: "The organization designs its security architecture using a defense-in-depth approach\
            \ that:\n   (1)(a).  Allocates [Assignment: organization-defined security safeguards] to\n\
            [Assignment: organization-defined locations and architectural layers]; and\n   (1)(b).  Ensures\
            \ that the allocated security safeguards operate in a coordinated\nand mutually reinforcing\
            \ manner."
      - id: pl-8.2
        title: Supplier Diversity
        class: SP800-53-enhancement
        props:
        - name: label
          value: PL-8 (2)
        parts:
        - id: pl-8.2_smt
          name: statement
          prose: 'The organization requires that [Assignment: organization-defined security safeguards]
            allocated to [Assignment: organization-defined locations and architectural layers] are obtained
            from different suppliers.'
    - id: pl-9
      title: Central Management
      class: SP800-53
      props:
      - name: label
        value: PL-9
      parts:
      - id: pl-9_smt
        name: statement
        prose: 'The organization centrally manages [Assignment: organization-defined security controls
          and related processes].'
  - id: pm
    title: Program Management
    class: family
    props:
    - name: label
      value: PM
    controls:
    - id: pm-1
      title: Information Security Program Plan
      class: SP800-53
      props:
      - name: label
        value: PM-1
      parts:
      - id: pm-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops and disseminates an organization-wide information security\
          \ program\nplan that:\n    1.  Provides an overview of the requirements for the security program\
          \ and\na description of the security program management controls and common controls in place\
          \ or planned for meeting those requirements;\n    2.  Includes the identification and assignment\
          \ of roles, responsibilities,\nmanagement commitment, coordination among organizational entities,\
          \ and compliance;\n    3.  Reflects coordination among organizational entities responsible for\
          \ the\ndifferent aspects of information security (i.e., technical, physical, personnel, cyber-physical);\
          \ and\n    4.  Is approved by a senior official with responsibility and accountability\nfor\
          \ the risk being incurred to organizational operations (including mission, functions, image,\
          \ and reputation), organizational assets, individuals, other organizations, and the Nation;\n\
          \  b.  Reviews the organization-wide information security program plan [Assignment:\norganization-defined\
          \ frequency];\n  c.  Updates the plan to address organizational changes and problems identified\n\
          during plan implementation or security control assessments; and\n  d.  Protects the information\
          \ security program plan from unauthorized disclosure\nand modification."
    - id: pm-2
      title: Senior Information Security Officer
      class: SP800-53
      props:
      - name: label
        value: PM-2
      parts:
      - id: pm-2_smt
        name: statement
        prose: The organization appoints a senior information security officer with the mission and resources
          to coordinate, develop, implement, and maintain an organization-wide information security program.
    - id: pm-3
      title: Information Security Resources
      class: SP800-53
      props:
      - name: label
        value: PM-3
      parts:
      - id: pm-3_smt
        name: statement
        prose: "The organization:\n  a.  Ensures that all capital planning and investment requests include\
          \ the resources\nneeded to implement the information security program and documents all exceptions\
          \ to this requirement;\n  b.  Employs a business case/Exhibit 300/Exhibit 53 to record the resources\
          \ required;\nand\n  c.  Ensures that information security resources are available for expenditure\n\
          as planned."
    - id: pm-4
      title: Plan Of Action And Milestones Process
      class: SP800-53
      props:
      - name: label
        value: PM-4
      parts:
      - id: pm-4_smt
        name: statement
        prose: "The organization:\n  a.  Implements a process for ensuring that plans of action and milestones\
          \ for\nthe security program and associated organizational information systems:\n    1.  Are\
          \ developed and maintained;\n    2.  Document the remedial information security actions to adequately\
          \ respond\nto risk to organizational operations and assets, individuals, other organizations,\
          \ and the Nation; and\n    3.  Are reported in accordance with OMB FISMA reporting requirements.\n\
          \  b.  Reviews plans of action and milestones for consistency with the organizational\nrisk\
          \ management strategy and organization-wide priorities for risk response actions."
    - id: pm-5
      title: Information System Inventory
      class: SP800-53
      props:
      - name: label
        value: PM-5
      parts:
      - id: pm-5_smt
        name: statement
        prose: The organization develops and maintains an inventory of its information systems.
    - id: pm-6
      title: Information Security Measures Of Performance
      class: SP800-53
      props:
      - name: label
        value: PM-6
      parts:
      - id: pm-6_smt
        name: statement
        prose: The organization develops, monitors, and reports on the results of information security
          measures of performance.
    - id: pm-7
      title: Enterprise Architecture
      class: SP800-53
      props:
      - name: label
        value: PM-7
      parts:
      - id: pm-7_smt
        name: statement
        prose: The organization develops an enterprise architecture with consideration for information
          security and the resulting risk to organizational operations, organizational assets, individuals,
          other organizations, and the Nation.
    - id: pm-8
      title: Critical Infrastructure Plan
      class: SP800-53
      props:
      - name: label
        value: PM-8
      parts:
      - id: pm-8_smt
        name: statement
        prose: The organization addresses information security issues in the development, documentation,
          and updating of a critical infrastructure and key resources protection plan.
    - id: pm-9
      title: Risk Management Strategy
      class: SP800-53
      props:
      - name: label
        value: PM-9
      parts:
      - id: pm-9_smt
        name: statement
        prose: "The organization:\n  a.  Develops a comprehensive strategy to manage risk to organizational\
          \ operations\nand assets, individuals, other organizations, and the Nation associated with the\
          \ operation and use of information systems;\n  b.  Implements the risk management strategy consistently\
          \ across the organization;\nand\n  c.  Reviews and updates the risk management strategy [Assignment:\
          \ organization-defined\nfrequency] or as required, to address organizational changes."
    - id: pm-10
      title: Security Authorization Process
      class: SP800-53
      props:
      - name: label
        value: PM-10
      parts:
      - id: pm-10_smt
        name: statement
        prose: "The organization:\n  a.  Manages (i.e., documents, tracks, and reports) the security state\
          \ of organizational\ninformation systems and the environments in which those systems operate\
          \ through security authorization processes;\n  b.  Designates individuals to fulfill specific\
          \ roles and responsibilities within\nthe organizational risk management process; and\n  c. \
          \ Fully integrates the security authorization processes into an organization-wide\nrisk management\
          \ program."
    - id: pm-11
      title: Mission/Business Process Definition
      class: SP800-53
      props:
      - name: label
        value: PM-11
      parts:
      - id: pm-11_smt
        name: statement
        prose: "The organization:\n  a.  Defines mission/business processes with consideration for information\
          \ security\nand the resulting risk to organizational operations, organizational assets, individuals,\
          \ other organizations, and the Nation; and\n  b.  Determines information protection needs arising\
          \ from the defined mission/business\nprocesses and revises the processes as necessary, until\
          \ achievable protection needs are obtained."
    - id: pm-12
      title: Insider Threat Program
      class: SP800-53
      props:
      - name: label
        value: PM-12
      parts:
      - id: pm-12_smt
        name: statement
        prose: The organization implements an insider threat program that includes a cross-discipline
          insider threat incident handling team.
    - id: pm-13
      title: Information Security Workforce
      class: SP800-53
      props:
      - name: label
        value: PM-13
      parts:
      - id: pm-13_smt
        name: statement
        prose: The organization establishes an information security workforce development and improvement
          program.
    - id: pm-14
      title: Testing, Training, And Monitoring
      class: SP800-53
      props:
      - name: label
        value: PM-14
      parts:
      - id: pm-14_smt
        name: statement
        prose: "The organization:\n  a.  Implements a process for ensuring that organizational plans for\
          \ conducting\nsecurity testing, training, and monitoring activities associated with organizational\
          \ information systems:\n    1.  Are developed and maintained; and\n    2.  Continue to be executed\
          \ in a timely manner;\n  b.  Reviews testing, training, and monitoring plans for consistency\
          \ with the\norganizational risk management strategy and organization-wide priorities for risk\
          \ response actions."
    - id: pm-15
      title: Contacts With Security Groups And Associations
      class: SP800-53
      props:
      - name: label
        value: PM-15
      parts:
      - id: pm-15_smt
        name: statement
        prose: "The organization establishes and institutionalizes contact with selected groups and associations\
          \ within the security community:\n  a.  To facilitate ongoing security education and training\
          \ for organizational\npersonnel;\n  b.  To maintain currency with recommended security practices,\
          \ techniques, and\ntechnologies; and\n  c.  To share current security-related information including\
          \ threats, vulnerabilities,\nand incidents."
    - id: pm-16
      title: Threat Awareness Program
      class: SP800-53
      props:
      - name: label
        value: PM-16
      parts:
      - id: pm-16_smt
        name: statement
        prose: The organization implements a threat awareness program that includes a cross-organization
          information-sharing capability.
  - id: ps
    title: Personnel Security
    class: family
    props:
    - name: label
      value: PS
    controls:
    - id: ps-1
      title: Personnel Security Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: PS-1
      parts:
      - id: ps-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A personnel security policy that addresses purpose, scope, roles,\
          \ responsibilities,\nmanagement commitment, coordination among organizational entities, and\
          \ compliance; and\n    2.  Procedures to facilitate the implementation of the personnel security\n\
          policy and associated personnel security controls; and\n  b.  Reviews and updates the current:\n\
          \    1.  Personnel security policy [Assignment: organization-defined frequency];\nand\n    2.\
          \  Personnel security procedures [Assignment: organization-defined frequency]."
    - id: ps-2
      title: Position Risk Designation
      class: SP800-53
      props:
      - name: label
        value: PS-2
      parts:
      - id: ps-2_smt
        name: statement
        prose: "The organization:\n  a.  Assigns a risk designation to all organizational positions;\n\
          \  b.  Establishes screening criteria for individuals filling those positions; and\n  c.  Reviews\
          \ and updates position risk designations [Assignment: organization-defined frequency]."
    - id: ps-3
      title: Personnel Screening
      class: SP800-53
      props:
      - name: label
        value: PS-3
      parts:
      - id: ps-3_smt
        name: statement
        prose: "The organization:\n  a.  Screens individuals prior to authorizing access to the information\
          \ system;\nand\n  b.  Rescreens individuals according to [Assignment: organization-defined conditions\n\
          requiring rescreening and, where rescreening is so indicated, the frequency of such rescreening]."
      controls:
      - id: ps-3.1
        title: Classified Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: PS-3 (1)
        parts:
        - id: ps-3.1_smt
          name: statement
          prose: The organization ensures that individuals accessing an information system processing,
            storing, or transmitting classified information are cleared and indoctrinated to the highest
            classification level of the information to which they have access on the system.
      - id: ps-3.2
        title: Formal Indoctrination
        class: SP800-53-enhancement
        props:
        - name: label
          value: PS-3 (2)
        parts:
        - id: ps-3.2_smt
          name: statement
          prose: The organization ensures that individuals accessing an information system processing,
            storing, or transmitting types of classified information which require formal indoctrination,
            are formally indoctrinated for all of the relevant types of information to which they have
            access on the system.
      - id: ps-3.3
        title: Information With Special Protection Measures
        class: SP800-53-enhancement
        props:
        - name: label
          value: PS-3 (3)
        parts:
        - id: ps-3.3_smt
          name: statement
          prose: "The organization ensures that individuals accessing an information system processing,\
            \ storing, or transmitting information requiring special protection:\n   (3)(a).  Have valid\
            \ access authorizations that are demonstrated by assigned\nofficial government duties; and\n\
            \   (3)(b).  Satisfy [Assignment: organization-defined additional personnel screening\ncriteria]."
    - id: ps-4
      title: Personnel Termination
      class: SP800-53
      props:
      - name: label
        value: PS-4
      parts:
      - id: ps-4_smt
        name: statement
        prose: "The organization, upon termination of individual employment:\n  a.  Disables information\
          \ system access within [Assignment: organization-defined\ntime period];\n  b.  Terminates/revokes\
          \ any authenticators/credentials associated with the individual;\n  c.  Conducts exit interviews\
          \ that include a discussion of [Assignment: organization-defined\ninformation security topics];\n\
          \  d.  Retrieves all security-related organizational information system-related\nproperty;\n\
          \  e.  Retains access to organizational information and information systems formerly\ncontrolled\
          \ by terminated individual; and\n  f.  Notifies [Assignment: organization-defined personnel\
          \ or roles] within [Assignment:\norganization-defined time period]."
      controls:
      - id: ps-4.1
        title: Post-Employment Requirements
        class: SP800-53-enhancement
        props:
        - name: label
          value: PS-4 (1)
        parts:
        - id: ps-4.1_smt
          name: statement
          prose: "The organization:\n   (1)(a).  Notifies terminated individuals of applicable, legally\
            \ binding post-employment\nrequirements for the protection of organizational information;\
            \ and\n   (1)(b).  Requires terminated individuals to sign an acknowledgment of post-employment\n\
            requirements as part of the organizational termination process."
      - id: ps-4.2
        title: Automated Notification
        class: SP800-53-enhancement
        props:
        - name: label
          value: PS-4 (2)
        parts:
        - id: ps-4.2_smt
          name: statement
          prose: 'The organization employs automated mechanisms to notify [Assignment: organization-defined
            personnel or roles] upon termination of an individual.'
    - id: ps-5
      title: Personnel Transfer
      class: SP800-53
      props:
      - name: label
        value: PS-5
      parts:
      - id: ps-5_smt
        name: statement
        prose: "The organization:\n  a.  Reviews and confirms ongoing operational need for current logical\
          \ and physical\naccess authorizations to information systems/facilities when individuals are\
          \ reassigned or transferred to other positions within the organization;\n  b.  Initiates [Assignment:\
          \ organization-defined transfer or reassignment actions]\nwithin [Assignment: organization-defined\
          \ time period following the formal transfer action];\n  c.  Modifies access authorization as\
          \ needed to correspond with any changes in\noperational need due to reassignment or transfer;\
          \ and\n  d.  Notifies [Assignment: organization-defined personnel or roles] within [Assignment:\n\
          organization-defined time period]."
    - id: ps-6
      title: Access Agreements
      class: SP800-53
      props:
      - name: label
        value: PS-6
      parts:
      - id: ps-6_smt
        name: statement
        prose: "The organization:\n  a.  Develops and documents access agreements for organizational information\n\
          systems;\n  b.  Reviews and updates the access agreements [Assignment: organization-defined\n\
          frequency]; and\n  c.  Ensures that individuals requiring access to organizational information\n\
          and information systems:\n    1.  Sign appropriate access agreements prior to being granted\
          \ access; and\n    2.  Re-sign access agreements to maintain access to organizational information\n\
          systems when access agreements have been updated or [Assignment: organization-defined frequency]."
      controls:
      - id: ps-6.1
        title: Information Requiring Special Protection
        class: SP800-53-enhancement
        props:
        - name: label
          value: PS-6 (1)
        parts:
        - id: ps-6.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into PS-3].'
      - id: ps-6.2
        title: Classified Information Requiring Special Protection
        class: SP800-53-enhancement
        props:
        - name: label
          value: PS-6 (2)
        parts:
        - id: ps-6.2_smt
          name: statement
          prose: "The organization ensures that access to classified information requiring special protection\
            \ is granted only to individuals who:\n   (2)(a).  Have a valid access authorization that\
            \ is demonstrated by assigned\nofficial government duties;\n   (2)(b).  Satisfy associated\
            \ personnel security criteria; and\n   (2)(c).  Have read, understood, and signed a nondisclosure\
            \ agreement."
      - id: ps-6.3
        title: Post-Employment Requirements
        class: SP800-53-enhancement
        props:
        - name: label
          value: PS-6 (3)
        parts:
        - id: ps-6.3_smt
          name: statement
          prose: "The organization:\n   (3)(a).  Notifies individuals of applicable, legally binding post-employment\n\
            requirements for protection of organizational information; and\n   (3)(b).  Requires individuals\
            \ to sign an acknowledgment of these requirements,\nif applicable, as part of granting initial\
            \ access to covered information."
    - id: ps-7
      title: Third-Party Personnel Security
      class: SP800-53
      props:
      - name: label
        value: PS-7
      parts:
      - id: ps-7_smt
        name: statement
        prose: "The organization:\n  a.  Establishes personnel security requirements including security\
          \ roles and\nresponsibilities for third-party providers;\n  b.  Requires third-party providers\
          \ to comply with personnel security policies\nand procedures established by the organization;\n\
          \  c.  Documents personnel security requirements;\n  d.  Requires third-party providers to notify\
          \ [Assignment: organization-defined\npersonnel or roles] of any personnel transfers or terminations\
          \ of third-party personnel who possess organizational credentials and/or badges, or who have\
          \ information system privileges within [Assignment: organization-defined time period]; and\n\
          \  e.  Monitors provider compliance."
    - id: ps-8
      title: Personnel Sanctions
      class: SP800-53
      props:
      - name: label
        value: PS-8
      parts:
      - id: ps-8_smt
        name: statement
        prose: "The organization:\n  a.  Employs a formal sanctions process for individuals failing to\
          \ comply with\nestablished information security policies and procedures; and\n  b.  Notifies\
          \ [Assignment: organization-defined personnel or roles] within [Assignment:\norganization-defined\
          \ time period] when a formal employee sanctions process is initiated, identifying the individual\
          \ sanctioned and the reason for the sanction."
  - id: ra
    title: Risk Assessment
    class: family
    props:
    - name: label
      value: RA
    controls:
    - id: ra-1
      title: Risk Assessment Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: RA-1
      parts:
      - id: ra-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A risk assessment policy that addresses purpose, scope, roles,\
          \ responsibilities,\nmanagement commitment, coordination among organizational entities, and\
          \ compliance; and\n    2.  Procedures to facilitate the implementation of the risk assessment\
          \ policy\nand associated risk assessment controls; and\n  b.  Reviews and updates the current:\n\
          \    1.  Risk assessment policy [Assignment: organization-defined frequency]; and\n    2.  Risk\
          \ assessment procedures [Assignment: organization-defined frequency]."
    - id: ra-2
      title: Security Categorization
      class: SP800-53
      props:
      - name: label
        value: RA-2
      parts:
      - id: ra-2_smt
        name: statement
        prose: "The organization:\n  a.  Categorizes information and the information system in accordance\
          \ with applicable\nfederal laws, Executive Orders, directives, policies, regulations, standards,\
          \ and guidance;\n  b.  Documents the security categorization results (including supporting rationale)\n\
          in the security plan for the information system; and\n  c.  Ensures that the authorizing official\
          \ or authorizing official designated\nrepresentative reviews and approves the security categorization\
          \ decision."
    - id: ra-3
      title: Risk Assessment
      class: SP800-53
      props:
      - name: label
        value: RA-3
      parts:
      - id: ra-3_smt
        name: statement
        prose: "The organization:\n  a.  Conducts an assessment of risk, including the likelihood and\
          \ magnitude of\nharm, from the unauthorized access, use, disclosure, disruption, modification,\
          \ or destruction of the information system and the information it processes, stores, or transmits;\n\
          \  b.  Documents risk assessment results in [Selection: security plan; risk assessment\nreport;\
          \ [Assignment: organization-defined document]];\n  c.  Reviews risk assessment results [Assignment:\
          \ organization-defined frequency];\n  d.  Disseminates risk assessment results to [Assignment:\
          \ organization-defined\npersonnel or roles]; and\n  e.  Updates the risk assessment [Assignment:\
          \ organization-defined frequency]\nor whenever there are significant changes to the information\
          \ system or environment of operation (including the identification of new threats and vulnerabilities),\
          \ or other conditions that may impact the security state of the system."
    - id: ra-4
      title: Risk Assessment Update
      class: SP800-53
      props:
      - name: label
        value: RA-4
      parts:
      - id: ra-4_smt
        name: statement
        prose: '[Withdrawn: Incorporated into RA-3].'
    - id: ra-5
      title: Vulnerability Scanning
      class: SP800-53
      props:
      - name: label
        value: RA-5
      parts:
      - id: ra-5_smt
        name: statement
        prose: "The organization:\n  a.  Scans for vulnerabilities in the information system and hosted\
          \ applications\n[Assignment: organization-defined frequency and/or randomly in accordance with\
          \ organization-defined process] and when new vulnerabilities potentially affecting the system/applications\
          \ are identified and reported;\n  b.  Employs vulnerability scanning tools and techniques that\
          \ facilitate interoperability\namong tools and automate parts of the vulnerability management\
          \ process by using standards for:\n    1.  Enumerating platforms, software flaws, and improper\
          \ configurations;\n    2.  Formatting checklists and test procedures; and\n    3.  Measuring\
          \ vulnerability impact;\n  c.  Analyzes vulnerability scan reports and results from security\
          \ control assessments;\n  d.  Remediates legitimate vulnerabilities [Assignment: organization-defined\n\
          response times] in accordance with an organizational assessment of risk; and\n  e.  Shares information\
          \ obtained from the vulnerability scanning process and\nsecurity control assessments with [Assignment:\
          \ organization-defined personnel or roles] to help eliminate similar vulnerabilities in other\
          \ information systems (i.e., systemic weaknesses or deficiencies)."
      controls:
      - id: ra-5.1
        title: Update Tool Capability
        class: SP800-53-enhancement
        props:
        - name: label
          value: RA-5 (1)
        parts:
        - id: ra-5.1_smt
          name: statement
          prose: The organization employs vulnerability scanning tools that include the capability to
            readily update the information system vulnerabilities to be scanned.
      - id: ra-5.2
        title: Update By Frequency / Prior To New Scan / When Identified
        class: SP800-53-enhancement
        props:
        - name: label
          value: RA-5 (2)
        parts:
        - id: ra-5.2_smt
          name: statement
          prose: 'The organization updates the information system vulnerabilities scanned [Selection (one
            or more): [Assignment: organization-defined frequency]; prior to a new scan; when new vulnerabilities
            are identified and reported].'
      - id: ra-5.3
        title: Breadth / Depth Of Coverage
        class: SP800-53-enhancement
        props:
        - name: label
          value: RA-5 (3)
        parts:
        - id: ra-5.3_smt
          name: statement
          prose: The organization employs vulnerability scanning procedures that can identify the breadth
            and depth of coverage (i.e., information system components scanned and vulnerabilities checked).
      - id: ra-5.4
        title: Discoverable Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: RA-5 (4)
        parts:
        - id: ra-5.4_smt
          name: statement
          prose: 'The organization determines what information about the information system is discoverable
            by adversaries and subsequently takes [Assignment: organization-defined corrective actions].'
      - id: ra-5.5
        title: Privileged Access
        class: SP800-53-enhancement
        props:
        - name: label
          value: RA-5 (5)
        parts:
        - id: ra-5.5_smt
          name: statement
          prose: 'The information system implements privileged access authorization to [Assignment: organization-identified
            information system components] for selected [Assignment: organization-defined vulnerability
            scanning activities].'
      - id: ra-5.6
        title: Automated Trend Analyses
        class: SP800-53-enhancement
        props:
        - name: label
          value: RA-5 (6)
        parts:
        - id: ra-5.6_smt
          name: statement
          prose: The organization employs automated mechanisms to compare the results of vulnerability
            scans over time to determine trends in information system vulnerabilities.
      - id: ra-5.7
        title: Automated Detection And Notification Of Unauthorized Components
        class: SP800-53-enhancement
        props:
        - name: label
          value: RA-5 (7)
        parts:
        - id: ra-5.7_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CM-8].'
      - id: ra-5.8
        title: Review Historic Audit Logs
        class: SP800-53-enhancement
        props:
        - name: label
          value: RA-5 (8)
        parts:
        - id: ra-5.8_smt
          name: statement
          prose: The organization reviews historic audit logs to determine if a vulnerability identified
            in the information system has been previously exploited.
      - id: ra-5.9
        title: Penetration Testing And Analyses
        class: SP800-53-enhancement
        props:
        - name: label
          value: RA-5 (9)
        parts:
        - id: ra-5.9_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CA-8].'
      - id: ra-5.10
        title: Correlate Scanning Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: RA-5 (10)
        parts:
        - id: ra-5.10_smt
          name: statement
          prose: The organization correlates the output from vulnerability scanning tools to determine
            the presence of multi-vulnerability/multi-hop attack vectors.
    - id: ra-6
      title: Technical Surveillance Countermeasures Survey
      class: SP800-53
      props:
      - name: label
        value: RA-6
      parts:
      - id: ra-6_smt
        name: statement
        prose: 'The organization employs a technical surveillance countermeasures survey at [Assignment:
          organization-defined locations] [Selection (one or more): [Assignment: organization-defined
          frequency]; [Assignment: organization-defined events or indicators occur]].'
  - id: sa
    title: System and Services Acquisition
    class: family
    props:
    - name: label
      value: SA
    controls:
    - id: sa-1
      title: System And Services Acquisition Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: SA-1
      parts:
      - id: sa-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A system and services acquisition policy that addresses purpose,\
          \ scope,\nroles, responsibilities, management commitment, coordination among organizational\
          \ entities, and compliance; and\n    2.  Procedures to facilitate the implementation of the\
          \ system and services\nacquisition policy and associated system and services acquisition controls;\
          \ and\n  b.  Reviews and updates the current:\n    1.  System and services acquisition policy\
          \ [Assignment: organization-defined\nfrequency]; and\n    2.  System and services acquisition\
          \ procedures [Assignment: organization-defined\nfrequency]."
    - id: sa-2
      title: Allocation Of Resources
      class: SP800-53
      props:
      - name: label
        value: SA-2
      parts:
      - id: sa-2_smt
        name: statement
        prose: "The organization:\n  a.  Determines information security requirements for the information\
          \ system\nor information system service in mission/business process planning;\n  b.  Determines,\
          \ documents, and allocates the resources required to protect the\ninformation system or information\
          \ system service as part of its capital planning and investment control process; and\n  c. \
          \ Establishes a discrete line item for information security in organizational\nprogramming and\
          \ budgeting documentation."
    - id: sa-3
      title: System Development Life Cycle
      class: SP800-53
      props:
      - name: label
        value: SA-3
      parts:
      - id: sa-3_smt
        name: statement
        prose: "The organization:\n  a.  Manages the information system using [Assignment: organization-defined\
          \ system\ndevelopment life cycle] that incorporates information security considerations;\n \
          \ b.  Defines and documents information security roles and responsibilities throughout\nthe\
          \ system development life cycle;\n  c.  Identifies individuals having information security roles\
          \ and responsibilities;\nand\n  d.  Integrates the organizational information security risk\
          \ management process\ninto system development life cycle activities."
    - id: sa-4
      title: Acquisition Process
      class: SP800-53
      props:
      - name: label
        value: SA-4
      parts:
      - id: sa-4_smt
        name: statement
        prose: "The organization includes the following requirements, descriptions, and criteria, explicitly\
          \ or by reference, in the acquisition contract for the information system, system component,\
          \ or information system service in accordance with applicable federal laws, Executive Orders,\
          \ directives, policies, regulations, standards, guidelines, and organizational mission/business\
          \ needs:\n  a.  Security functional requirements;\n  b.  Security strength requirements;\n \
          \ c.  Security assurance requirements;\n  d.  Security-related documentation requirements;\n\
          \  e.  Requirements for protecting security-related documentation;\n  f.  Description of the\
          \ information system development environment and environment\nin which the system is intended\
          \ to operate; and\n  g.  Acceptance criteria."
      controls:
      - id: sa-4.1
        title: Functional Properties Of Security Controls
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-4 (1)
        parts:
        - id: sa-4.1_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to provide a description of the functional properties of the
            security controls to be employed.
      - id: sa-4.2
        title: Design / Implementation Information For Security Controls
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-4 (2)
        parts:
        - id: sa-4.2_smt
          name: statement
          prose: 'The organization requires the developer of the information system, system component,
            or information system service to provide design and implementation information for the security
            controls to be employed that includes: [Selection (one or more): security-relevant external
            system interfaces; high-level design; low-level design; source code or hardware schematics;
            [Assignment: organization-defined design/implementation information]] at [Assignment: organization-defined
            level of detail].'
      - id: sa-4.3
        title: Development Methods / Techniques / Practices
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-4 (3)
        parts:
        - id: sa-4.3_smt
          name: statement
          prose: 'The organization requires the developer of the information system, system component,
            or information system service to demonstrate the use of a system development life cycle that
            includes [Assignment: organization-defined state-of-the-practice system/security engineering
            methods, software development methods, testing/evaluation/validation techniques, and quality
            control processes].'
      - id: sa-4.4
        title: Assignment Of Components To Systems
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-4 (4)
        parts:
        - id: sa-4.4_smt
          name: statement
          prose: '[Withdrawn: Incorporated into CM-8 (9)].'
      - id: sa-4.5
        title: System / Component / Service Configurations
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-4 (5)
        parts:
        - id: sa-4.5_smt
          name: statement
          prose: "The organization requires the developer of the information system, system component,\
            \ or information system service to:\n   (5)(a).  Deliver the system, component, or service\
            \ with [Assignment: organization-defined\nsecurity configurations] implemented; and\n   (5)(b).\
            \  Use the configurations as the default for any subsequent system, component,\nor service\
            \ reinstallation or upgrade."
      - id: sa-4.6
        title: Use Of Information Assurance Products
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-4 (6)
        parts:
        - id: sa-4.6_smt
          name: statement
          prose: "The organization:\n   (6)(a).  Employs only government off-the-shelf (GOTS) or commercial\
            \ off-the-shelf\n(COTS) information assurance (IA) and IA-enabled information technology products\
            \ that compose an NSA-approved solution to protect classified information when the networks\
            \ used to transmit the information are at a lower classification level than the information\
            \ being transmitted; and\n   (6)(b).  Ensures that these products have been evaluated and/or\
            \ validated by\nNSA or in accordance with NSA-approved procedures."
      - id: sa-4.7
        title: Niap-Approved  Protection Profiles
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-4 (7)
        parts:
        - id: sa-4.7_smt
          name: statement
          prose: "The organization:\n   (7)(a).  Limits the use of commercially provided information assurance\
            \ (IA)\nand IA-enabled information technology products to those products that have been successfully\
            \ evaluated against a National Information Assurance partnership (NIAP)-approved Protection\
            \ Profile for a specific technology type, if such a profile exists; and\n   (7)(b).  Requires,\
            \ if no NIAP-approved Protection Profile exists for a specific\ntechnology type but a commercially\
            \ provided information technology product relies on cryptographic functionality to enforce\
            \ its security policy, that the cryptographic module is FIPS-validated."
      - id: sa-4.8
        title: Continuous Monitoring Plan
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-4 (8)
        parts:
        - id: sa-4.8_smt
          name: statement
          prose: 'The organization requires the developer of the information system, system component,
            or information system service to produce a plan for the continuous monitoring of security
            control effectiveness that contains [Assignment: organization-defined level of detail].'
      - id: sa-4.9
        title: Functions / Ports / Protocols / Services In Use
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-4 (9)
        parts:
        - id: sa-4.9_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to identify early in the system development life cycle, the
            functions, ports, protocols, and services intended for organizational use.
      - id: sa-4.10
        title: Use Of Approved Piv Products
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-4 (10)
        parts:
        - id: sa-4.10_smt
          name: statement
          prose: The organization employs only information technology products on the FIPS 201-approved
            products list for Personal Identity Verification (PIV) capability implemented within organizational
            information systems.
    - id: sa-5
      title: Information System Documentation
      class: SP800-53
      props:
      - name: label
        value: SA-5
      parts:
      - id: sa-5_smt
        name: statement
        prose: "The organization:\n  a.  Obtains administrator documentation for the information system,\
          \ system component,\nor information system service that describes:\n    1.  Secure configuration,\
          \ installation, and operation of the system, component,\nor service;\n    2.  Effective use\
          \ and maintenance of security functions/mechanisms; and\n    3.  Known vulnerabilities regarding\
          \ configuration and use of administrative\n(i.e., privileged) functions;\n  b.  Obtains user\
          \ documentation for the information system, system component,\nor information system service\
          \ that describes:\n    1.  User-accessible security functions/mechanisms and how to effectively\
          \ use\nthose security functions/mechanisms;\n    2.  Methods for user interaction, which enables\
          \ individuals to use the system,\ncomponent, or service in a more secure manner; and\n    3.\
          \  User responsibilities in maintaining the security of the system, component,\nor service;\n\
          \  c.  Documents attempts to obtain information system, system component, or information\nsystem\
          \ service documentation when such documentation is either unavailable or nonexistent and takes\
          \ [Assignment: organization-defined actions] in response;\n  d.  Protects documentation as required,\
          \ in accordance with the risk management\nstrategy; and\n  e.  Distributes documentation to\
          \ [Assignment: organization-defined personnel\nor roles]."
      controls:

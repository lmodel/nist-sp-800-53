            for the information system, system component, or information system service.'
      - id: sa-12.10
        title: Validate As Genuine And Not Altered
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-12 (10)
        parts:
        - id: sa-12.10_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined security safeguards] to validate
            that the information system or system component received is genuine and has not been altered.'
      - id: sa-12.11
        title: Penetration Testing / Analysis Of Elements, Processes, And Actors
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-12 (11)
        parts:
        - id: sa-12.11_smt
          name: statement
          prose: 'The organization employs [Selection (one or more): organizational analysis, independent
            third-party analysis, organizational penetration testing, independent third-party penetration
            testing] of [Assignment: organization-defined supply chain elements, processes, and actors]
            associated with the information system, system component, or information system service.'
      - id: sa-12.12
        title: Inter-Organizational Agreements
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-12 (12)
        parts:
        - id: sa-12.12_smt
          name: statement
          prose: The organization establishes inter-organizational agreements and procedures with entities
            involved in the supply chain for the information system, system component, or information
            system service.
      - id: sa-12.13
        title: Critical Information System Components
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-12 (13)
        parts:
        - id: sa-12.13_smt
          name: statement
          prose: 'The organization employs [Assignment: organization-defined security safeguards] to ensure
            an adequate supply of [Assignment: organization-defined critical information system components].'
      - id: sa-12.14
        title: Identity And Traceability
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-12 (14)
        parts:
        - id: sa-12.14_smt
          name: statement
          prose: 'The organization establishes and retains unique identification of [Assignment: organization-defined
            supply chain elements, processes, and actors] for the information system, system component,
            or information system service.'
      - id: sa-12.15
        title: Processes To Address Weaknesses Or Deficiencies
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-12 (15)
        parts:
        - id: sa-12.15_smt
          name: statement
          prose: The organization establishes a process to address weaknesses or deficiencies in supply
            chain elements identified during independent or organizational assessments of such elements.
    - id: sa-13
      title: Trustworthiness
      class: SP800-53
      props:
      - name: label
        value: SA-13
      parts:
      - id: sa-13_smt
        name: statement
        prose: "The organization:\n  a.  Describes the trustworthiness required in the [Assignment: organization-defined\n\
          information system, information system component, or information system service] supporting\
          \ its critical missions/business functions; and\n  b.  Implements [Assignment: organization-defined\
          \ assurance overlay] to achieve\nsuch trustworthiness."
    - id: sa-14
      title: Criticality Analysis
      class: SP800-53
      props:
      - name: label
        value: SA-14
      parts:
      - id: sa-14_smt
        name: statement
        prose: 'The organization identifies critical information system components and functions by performing
          a criticality analysis for [Assignment: organization-defined information systems, information
          system components, or information system services] at [Assignment: organization-defined decision
          points in the system development life cycle].'
      controls:
      - id: sa-14.1
        title: Critical Components With  No Viable Alternative Sourcing
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-14 (1)
        parts:
        - id: sa-14.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SA-20].'
    - id: sa-15
      title: Development Process, Standards, And Tools
      class: SP800-53
      props:
      - name: label
        value: SA-15
      parts:
      - id: sa-15_smt
        name: statement
        prose: "The organization:\n  a.  Requires the developer of the information system, system component,\
          \ or information\nsystem service to follow a documented development process that:\n    1.  Explicitly\
          \ addresses security requirements;\n    2.  Identifies the standards and tools used in the development\
          \ process;\n    3.  Documents the specific tool options and tool configurations used in the\n\
          development process; and\n    4.  Documents, manages, and ensures the integrity of changes to\
          \ the process\nand/or tools used in development; and\n  b.  Reviews the development process,\
          \ standards, tools, and tool options/configurations\n[Assignment: organization-defined frequency]\
          \ to determine if the process, standards, tools, and tool options/configurations selected and\
          \ employed can satisfy [Assignment: organization-defined security requirements]."
      controls:
      - id: sa-15.1
        title: Quality Metrics
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (1)
        parts:
        - id: sa-15.1_smt
          name: statement
          prose: "The organization requires the developer of the information system, system component,\
            \ or information system service to:\n   (1)(a).  Define quality metrics at the beginning of\
            \ the development process;\nand\n   (1)(b).  Provide evidence of meeting the quality metrics\
            \ [Selection (one or\nmore): [Assignment: organization-defined frequency]; [Assignment: organization-defined\
            \ program review milestones]; upon delivery]."
      - id: sa-15.2
        title: Security Tracking Tools
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (2)
        parts:
        - id: sa-15.2_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to select and employ a security tracking tool for use during
            the development process.
      - id: sa-15.3
        title: Criticality Analysis
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (3)
        parts:
        - id: sa-15.3_smt
          name: statement
          prose: 'The organization requires the developer of the information system, system component,
            or information system service to perform a criticality analysis at [Assignment: organization-defined
            breadth/depth] and at [Assignment: organization-defined decision points in the system development
            life cycle].'
      - id: sa-15.4
        title: Threat Modeling / Vulnerability Analysis
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (4)
        parts:
        - id: sa-15.4_smt
          name: statement
          prose: "The organization requires that developers perform threat modeling and a vulnerability\
            \ analysis for the information system at [Assignment: organization-defined breadth/depth]\
            \ that:\n   (4)(a).  Uses [Assignment: organization-defined information concerning impact,\n\
            environment of operations, known or assumed threats, and acceptable risk levels];\n   (4)(b).\
            \  Employs [Assignment: organization-defined tools and methods]; and\n   (4)(c).  Produces\
            \ evidence that meets [Assignment: organization-defined acceptance\ncriteria]."
      - id: sa-15.5
        title: Attack Surface Reduction
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (5)
        parts:
        - id: sa-15.5_smt
          name: statement
          prose: 'The organization requires the developer of the information system, system component,
            or information system service to reduce attack surfaces to [Assignment: organization-defined
            thresholds].'
      - id: sa-15.6
        title: Continuous Improvement
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (6)
        parts:
        - id: sa-15.6_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to implement an explicit process to continuously improve the
            development process.
      - id: sa-15.7
        title: Automated Vulnerability Analysis
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (7)
        parts:
        - id: sa-15.7_smt
          name: statement
          prose: "The organization requires the developer of the information system, system component,\
            \ or information system service to:\n   (7)(a).  Perform an automated vulnerability analysis\
            \ using [Assignment: organization-defined\ntools];\n   (7)(b).  Determine the exploitation\
            \ potential for discovered vulnerabilities;\n   (7)(c).  Determine potential risk mitigations\
            \ for delivered vulnerabilities;\nand\n   (7)(d).  Deliver the outputs of the tools and results\
            \ of the analysis to [Assignment:\norganization-defined personnel or roles]."
      - id: sa-15.8
        title: Reuse Of Threat / Vulnerability Information
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (8)
        parts:
        - id: sa-15.8_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to use threat modeling and vulnerability analyses from similar
            systems, components, or services to inform the current development process.
      - id: sa-15.9
        title: Use Of Live Data
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (9)
        parts:
        - id: sa-15.9_smt
          name: statement
          prose: The organization approves, documents, and controls the use of live data in development
            and test environments for the information system, system component, or information system
            service.
      - id: sa-15.10
        title: Incident Response Plan
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (10)
        parts:
        - id: sa-15.10_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to provide an incident response plan.
      - id: sa-15.11
        title: Archive Information System / Component
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-15 (11)
        parts:
        - id: sa-15.11_smt
          name: statement
          prose: The organization requires the developer of the information system or system component
            to archive the system or component to be released or delivered together with the corresponding
            evidence supporting the final security review.
    - id: sa-16
      title: Developer-Provided Training
      class: SP800-53
      props:
      - name: label
        value: SA-16
      parts:
      - id: sa-16_smt
        name: statement
        prose: 'The organization requires the developer of the information system, system component, or
          information system service to provide [Assignment: organization-defined training] on the correct
          use and operation of the implemented security functions, controls, and/or mechanisms.'
    - id: sa-17
      title: Developer Security Architecture And Design
      class: SP800-53
      props:
      - name: label
        value: SA-17
      parts:
      - id: sa-17_smt
        name: statement
        prose: "The organization requires the developer of the information system, system component, or\
          \ information system service to produce a design specification and security architecture that:\n\
          \  a.  Is consistent with and supportive of the organization�s security architecture\nwhich\
          \ is established within and is an integrated part of the organization�s enterprise architecture;\n\
          \  b.  Accurately and completely describes the required security functionality,\nand the allocation\
          \ of security controls among physical and logical components; and\n  c.  Expresses how individual\
          \ security functions, mechanisms, and services work\ntogether to provide required security capabilities\
          \ and a unified approach to protection."
      controls:
      - id: sa-17.1
        title: Formal Policy Model
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-17 (1)
        parts:
        - id: sa-17.1_smt
          name: statement
          prose: "The organization requires the developer of the information system, system component,\
            \ or information system service to:\n   (1)(a).  Produce, as an integral part of the development\
            \ process, a formal\npolicy model describing the [Assignment: organization-defined elements\
            \ of organizational security policy] to be enforced; and\n   (1)(b).  Prove that the formal\
            \ policy model is internally consistent and sufficient\nto enforce the defined elements of\
            \ the organizational security policy when implemented."
      - id: sa-17.2
        title: Security-Relevant Components
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-17 (2)
        parts:
        - id: sa-17.2_smt
          name: statement
          prose: "The organization requires the developer of the information system, system component,\
            \ or information system service to:\n   (2)(a).  Define security-relevant hardware, software,\
            \ and firmware; and\n   (2)(b).  Provide a rationale that the definition for security-relevant\
            \ hardware,\nsoftware, and firmware is complete."
      - id: sa-17.3
        title: Formal Correspondence
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-17 (3)
        parts:
        - id: sa-17.3_smt
          name: statement
          prose: "The organization requires the developer of the information system, system component,\
            \ or information system service to:\n   (3)(a).  Produce, as an integral part of the development\
            \ process, a formal\ntop-level specification that specifies the interfaces to security-relevant\
            \ hardware, software, and firmware in terms of exceptions, error messages, and effects;\n\
            \   (3)(b).  Show via proof to the extent feasible with additional informal demonstration\n\
            as necessary, that the formal top-level specification is consistent with the formal policy\
            \ model;\n   (3)(c).  Show via informal demonstration, that the formal top-level specification\n\
            completely covers the interfaces to security-relevant hardware, software, and firmware;\n\
            \   (3)(d).  Show that the formal top-level specification is an accurate description\nof the\
            \ implemented security-relevant hardware, software, and firmware; and\n   (3)(e).  Describe\
            \ the security-relevant hardware, software, and firmware mechanisms\nnot addressed in the\
            \ formal top-level specification but strictly internal to the security-relevant hardware,\
            \ software, and firmware."
      - id: sa-17.4
        title: Informal Correspondence
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-17 (4)
        parts:
        - id: sa-17.4_smt
          name: statement
          prose: "The organization requires the developer of the information system, system component,\
            \ or information system service to:\n   (4)(a).  Produce, as an integral part of the development\
            \ process, an informal\ndescriptive top-level specification that specifies the interfaces\
            \ to security-relevant hardware, software, and firmware in terms of exceptions, error messages,\
            \ and effects;\n   (4)(b).  Show via [Selection: informal demonstration, convincing argument\
            \ with\nformal methods as feasible] that the descriptive top-level specification is consistent\
            \ with the formal policy model;\n   (4)(c).  Show via informal demonstration, that the descriptive\
            \ top-level specification\ncompletely  covers the interfaces to security-relevant hardware,\
            \ software, and firmware;\n   (4)(d).  Show that the descriptive top-level specification is\
            \ an accurate description\nof the interfaces to security-relevant hardware, software, and\
            \ firmware; and\n   (4)(e).  Describe the security-relevant hardware, software, and firmware\
            \ mechanisms\nnot addressed in the descriptive top-level specification but strictly internal\
            \ to the security-relevant hardware, software, and firmware."
      - id: sa-17.5
        title: Conceptually Simple Design
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-17 (5)
        parts:
        - id: sa-17.5_smt
          name: statement
          prose: "The organization requires the developer of the information system, system component,\
            \ or information system service to:\n   (5)(a).  Design and structure the security-relevant\
            \ hardware, software, and\nfirmware to use a complete, conceptually simple protection mechanism\
            \ with precisely defined semantics; and\n   (5)(b).  Internally structure the security-relevant\
            \ hardware, software, and\nfirmware with specific regard for this mechanism."
      - id: sa-17.6
        title: Structure For Testing
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-17 (6)
        parts:
        - id: sa-17.6_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to structure security-relevant hardware, software, and firmware
            to facilitate testing.
      - id: sa-17.7
        title: Structure For Least Privilege
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-17 (7)
        parts:
        - id: sa-17.7_smt
          name: statement
          prose: The organization requires the developer of the information system, system component,
            or information system service to structure security-relevant hardware, software, and firmware
            to facilitate controlling access with least privilege.
    - id: sa-18
      title: Tamper Resistance And Detection
      class: SP800-53
      props:
      - name: label
        value: SA-18
      parts:
      - id: sa-18_smt
        name: statement
        prose: The organization implements a tamper protection program for the information system, system
          component, or information system service.
      controls:
      - id: sa-18.1
        title: Multiple Phases Of Sdlc
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-18 (1)
        parts:
        - id: sa-18.1_smt
          name: statement
          prose: The organization employs anti-tamper technologies and techniques during multiple phases
            in the system development life cycle including design, development, integration, operations,
            and maintenance.
      - id: sa-18.2
        title: Inspection Of Information Systems, Components, Or Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-18 (2)
        parts:
        - id: sa-18.2_smt
          name: statement
          prose: 'The organization inspects [Assignment: organization-defined information systems, system
            components, or devices] [Selection (one or more): at random; at [Assignment: organization-defined
            frequency], upon [Assignment: organization-defined indications of need for inspection]] to
            detect tampering.'
    - id: sa-19
      title: Component Authenticity
      class: SP800-53
      props:
      - name: label
        value: SA-19
      parts:
      - id: sa-19_smt
        name: statement
        prose: "The organization:\n  a.  Develops and implements anti-counterfeit policy and procedures\
          \ that include\nthe means to detect and prevent counterfeit components from entering the information\
          \ system; and\n  b.  Reports counterfeit information system components to [Selection (one or\n\
          more): source of counterfeit component; [Assignment: organization-defined external reporting\
          \ organizations]; [Assignment: organization-defined personnel or roles]]."
      controls:
      - id: sa-19.1
        title: Anti-Counterfeit Training
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-19 (1)
        parts:
        - id: sa-19.1_smt
          name: statement
          prose: 'The organization trains [Assignment: organization-defined personnel or roles] to detect
            counterfeit information system components (including hardware, software, and firmware).'
      - id: sa-19.2
        title: Configuration Control For Component Service / Repair
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-19 (2)
        parts:
        - id: sa-19.2_smt
          name: statement
          prose: 'The organization maintains configuration control over [Assignment: organization-defined
            information system components] awaiting service/repair and serviced/repaired components awaiting
            return to service.'
      - id: sa-19.3
        title: Component Disposal
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-19 (3)
        parts:
        - id: sa-19.3_smt
          name: statement
          prose: 'The organization disposes of information system components using [Assignment: organization-defined
            techniques and methods].'
      - id: sa-19.4
        title: Anti-Counterfeit Scanning
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-19 (4)
        parts:
        - id: sa-19.4_smt
          name: statement
          prose: 'The organization scans for counterfeit information system components [Assignment: organization-defined
            frequency].'
    - id: sa-20
      title: Customized Development Of Critical Components
      class: SP800-53
      props:
      - name: label
        value: SA-20
      parts:
      - id: sa-20_smt
        name: statement
        prose: 'The organization re-implements or custom develops [Assignment: organization-defined critical
          information system components].'
    - id: sa-21
      title: Developer Screening
      class: SP800-53
      props:
      - name: label
        value: SA-21
      parts:
      - id: sa-21_smt
        name: statement
        prose: "The organization requires that the developer of [Assignment: organization-defined information\
          \ system, system component, or information system service]:\n  a.  Have appropriate access authorizations\
          \ as determined by assigned [Assignment:\norganization-defined official government duties];\
          \ and\n  b.  Satisfy [Assignment: organization-defined additional personnel screening\ncriteria]."
      controls:
      - id: sa-21.1
        title: Validation Of Screening
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-21 (1)
        parts:
        - id: sa-21.1_smt
          name: statement
          prose: 'The organization requires the developer of the information system, system component,
            or information system service take [Assignment: organization-defined actions] to ensure that
            the required access authorizations and screening criteria are satisfied.'
    - id: sa-22
      title: Unsupported System Components
      class: SP800-53
      props:
      - name: label
        value: SA-22
      parts:
      - id: sa-22_smt
        name: statement
        prose: "The organization:\n  a.  Replaces information system components when support for the components\
          \ is\nno longer available from the developer, vendor, or manufacturer; and\n  b.  Provides justification\
          \ and documents approval for the continued use of unsupported\nsystem components required to\
          \ satisfy mission/business needs."
      controls:
      - id: sa-22.1
        title: Alternative Sources For Continued Support
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-22 (1)
        parts:
        - id: sa-22.1_smt
          name: statement
          prose: 'The organization provides [Selection (one or more): in-house support; [Assignment: organization-defined
            support from external providers]] for unsupported information system components.'
  - id: sc
    title: System and Communications Protection
    class: family
    props:
    - name: label
      value: SC
    controls:
    - id: sc-1
      title: System And Communications Protection Policy And Procedures
      class: SP800-53
      props:
      - name: label
        value: SC-1
      parts:
      - id: sc-1_smt
        name: statement
        prose: "The organization:\n  a.  Develops, documents, and disseminates to [Assignment: organization-defined\n\
          personnel or roles]:\n    1.  A system and communications protection policy that addresses purpose,\n\
          scope, roles, responsibilities, management commitment, coordination among organizational entities,\
          \ and compliance; and\n    2.  Procedures to facilitate the implementation of the system and\
          \ communications\nprotection policy and associated system and communications protection controls;\
          \ and\n  b.  Reviews and updates the current:\n    1.  System and communications protection\
          \ policy [Assignment: organization-defined\nfrequency]; and\n    2.  System and communications\
          \ protection procedures [Assignment: organization-defined\nfrequency]."
    - id: sc-2
      title: Application Partitioning
      class: SP800-53
      props:
      - name: label
        value: SC-2
      parts:
      - id: sc-2_smt
        name: statement
        prose: The information system separates user functionality (including user interface services)
          from information system management functionality.
      controls:
      - id: sc-2.1
        title: Interfaces For Non-Privileged Users
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-2 (1)
        parts:
        - id: sc-2.1_smt
          name: statement
          prose: The information system prevents the presentation of information system management-related
            functionality at an interface for non-privileged users.
    - id: sc-3
      title: Security Function Isolation
      class: SP800-53
      props:
      - name: label
        value: SC-3
      parts:
      - id: sc-3_smt
        name: statement
        prose: The information system isolates security functions from nonsecurity functions.
      controls:
      - id: sc-3.1
        title: Hardware Separation
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-3 (1)
        parts:
        - id: sc-3.1_smt
          name: statement
          prose: The information system utilizes underlying hardware separation mechanisms to implement
            security function isolation.
      - id: sc-3.2
        title: Access / Flow Control Functions
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-3 (2)
        parts:
        - id: sc-3.2_smt
          name: statement
          prose: The information system isolates security functions enforcing access and information flow
            control from nonsecurity functions and from other security functions.
      - id: sc-3.3
        title: Minimize Nonsecurity Functionality
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-3 (3)
        parts:
        - id: sc-3.3_smt
          name: statement
          prose: The organization minimizes the number of nonsecurity functions included within the isolation
            boundary containing security functions.
      - id: sc-3.4
        title: Module Coupling And Cohesiveness
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-3 (4)
        parts:
        - id: sc-3.4_smt
          name: statement
          prose: The organization implements security functions as largely independent modules that maximize
            internal cohesiveness within modules and minimize coupling between modules.
      - id: sc-3.5
        title: Layered Structures
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-3 (5)
        parts:
        - id: sc-3.5_smt
          name: statement
          prose: The organization implements security functions as a layered structure minimizing interactions
            between layers of the design and avoiding any dependence by lower layers on the functionality
            or correctness of higher layers.
    - id: sc-4
      title: Information In Shared Resources
      class: SP800-53
      props:
      - name: label
        value: SC-4
      parts:
      - id: sc-4_smt
        name: statement
        prose: The information system prevents unauthorized and unintended information transfer via shared
          system resources.
      controls:
      - id: sc-4.1
        title: Security Levels
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-4 (1)
        parts:
        - id: sc-4.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SC-4].'
      - id: sc-4.2
        title: Periods Processing
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-4 (2)
        parts:
        - id: sc-4.2_smt
          name: statement
          prose: 'The information system prevents unauthorized information transfer via shared resources
            in accordance with [Assignment: organization-defined procedures] when system processing explicitly
            switches between different information classification levels or security categories.'
    - id: sc-5
      title: Denial Of Service Protection
      class: SP800-53
      props:
      - name: label
        value: SC-5
      parts:
      - id: sc-5_smt
        name: statement
        prose: 'The information system protects against or limits the effects of the following types of
          denial of service attacks: [Assignment: organization-defined types of denial of service attacks
          or references to sources for such information] by employing [Assignment: organization-defined
          security safeguards].'
      controls:
      - id: sc-5.1
        title: Restrict Internal Users
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-5 (1)
        parts:
        - id: sc-5.1_smt
          name: statement
          prose: 'The information system restricts the ability of individuals to launch [Assignment: organization-defined
            denial of service attacks] against other information systems.'
      - id: sc-5.2
        title: Excess Capacity / Bandwidth / Redundancy
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-5 (2)
        parts:
        - id: sc-5.2_smt
          name: statement
          prose: The information system manages excess capacity, bandwidth, or other redundancy to limit
            the effects of information flooding denial of service attacks.
      - id: sc-5.3
        title: Detection / Monitoring
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-5 (3)
        parts:
        - id: sc-5.3_smt
          name: statement
          prose: "The organization:\n   (3)(a).  Employs [Assignment: organization-defined monitoring\
            \ tools] to detect\nindicators of denial of service attacks against the information system;\
            \ and\n   (3)(b).  Monitors [Assignment: organization-defined information system resources]\n\
            to determine if sufficient resources exist to prevent effective denial of service attacks."
    - id: sc-6
      title: Resource Availability
      class: SP800-53
      props:
      - name: label
        value: SC-6
      parts:
      - id: sc-6_smt
        name: statement
        prose: 'The information system protects the availability of resources by allocating [Assignment:
          organization-defined resources] by [Selection (one or more); priority; quota; [Assignment: organization-defined
          security safeguards]].'
    - id: sc-7
      title: Boundary Protection
      class: SP800-53
      props:
      - name: label
        value: SC-7
      parts:
      - id: sc-7_smt
        name: statement
        prose: "The information system:\n  a.  Monitors and controls communications at the external boundary\
          \ of the system\nand at key internal boundaries within the system;\n  b.  Implements subnetworks\
          \ for publicly accessible system components that are\n[Selection: physically; logically] separated\
          \ from internal organizational networks; and\n  c.  Connects to external networks or information\
          \ systems only through managed\ninterfaces consisting of boundary protection devices arranged\
          \ in accordance with an organizational security architecture."
      controls:
      - id: sc-7.1
        title: Physically Separated Subnetworks
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-7 (1)
        parts:
        - id: sc-7.1_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SC-7].'
      - id: sc-7.2
        title: Public Access
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-7 (2)
        parts:
        - id: sc-7.2_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SC-7].'
      - id: sc-7.3
        title: Access Points
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-7 (3)
        parts:
        - id: sc-7.3_smt
          name: statement
          prose: The organization limits the number of external network connections to the information
            system.
      - id: sc-7.4
        title: External Telecommunications Services
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-7 (4)
        parts:
        - id: sc-7.4_smt
          name: statement
          prose: "The organization:\n   (4)(a).  Implements a managed interface for each external telecommunication\n\
            service;\n   (4)(b).  Establishes a traffic flow policy for each managed interface;\n   (4)(c).\
            \  Protects the confidentiality and integrity of the information being\ntransmitted across\
            \ each interface;\n   (4)(d).  Documents each exception to the traffic flow policy with a\
            \ supporting\nmission/business need and duration of that need; and\n   (4)(e).  Reviews exceptions\
            \ to the traffic flow policy [Assignment: organization-defined\nfrequency] and removes exceptions\
            \ that are no longer supported by an explicit mission/business need."
      - id: sc-7.5
        title: Deny By Default / Allow By Exception
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-7 (5)
        parts:
        - id: sc-7.5_smt
          name: statement
          prose: The information system at managed interfaces denies network communications traffic by
            default and allows network communications traffic by exception (i.e., deny all, permit by
            exception).
      - id: sc-7.6
        title: Response To Recognized Failures
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-7 (6)
        parts:
        - id: sc-7.6_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SC-7 (18)].'
      - id: sc-7.7
        title: Prevent Split Tunneling For Remote Devices
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-7 (7)
        parts:
        - id: sc-7.7_smt
          name: statement
          prose: The information system, in conjunction with a remote device, prevents the device from
            simultaneously establishing non-remote connections with the system and communicating via some
            other connection to resources in external networks.
      - id: sc-7.8
        title: Route Traffic To Authenticated Proxy Servers
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-7 (8)
        parts:
        - id: sc-7.8_smt
          name: statement
          prose: 'The information system routes [Assignment: organization-defined internal communications
            traffic] to [Assignment: organization-defined external networks] through authenticated proxy
            servers at managed interfaces.'
      - id: sc-7.9
        title: Restrict Threatening Outgoing Communications Traffic
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-7 (9)
        parts:
        - id: sc-7.9_smt
          name: statement
          prose: "The information system:\n   (9)(a).  Detects and denies outgoing communications traffic\
            \ posing a threat\nto external information systems; and\n   (9)(b).  Audits the identity of\
            \ internal users associated with denied communications."
      - id: sc-7.10
        title: Prevent Unauthorized Exfiltration
        class: SP800-53-enhancement
        props:
        - name: label
          value: SC-7 (10)
        parts:
        - id: sc-7.10_smt
          name: statement

      - id: ia-5.13
        title: Expiration Of Cached Authenticators
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-5 (13)
        parts:
        - id: ia-5.13_smt
          name: statement
          prose: 'The information system prohibits the use of cached authenticators after [Assignment:
            organization-defined time period].'
      - id: ia-5.14
        title: Managing Content Of Pki Trust Stores
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-5 (14)
        parts:
        - id: ia-5.14_smt
          name: statement
          prose: The organization, for PKI-based authentication, employs a deliberate organization-wide

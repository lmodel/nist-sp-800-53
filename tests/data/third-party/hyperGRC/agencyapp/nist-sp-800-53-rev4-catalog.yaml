    - id: ia-5
      title: Authenticator Management
      class: SP800-53
      props:
      - name: label
        value: IA-5
      parts:
      - id: ia-5_smt
        name: statement
        prose: "The organization manages information system authenticators by:\n  a.  Verifying, as part\
          \ of the initial authenticator distribution, the identity\nof the individual, group, role, or\
          \ device receiving the authenticator;\n  b.  Establishing initial authenticator content for\
          \ authenticators defined by\nthe organization;\n  c.  Ensuring that authenticators have sufficient\
          \ strength of mechanism for their\nintended use;\n  d.  Establishing and implementing administrative\
          \ procedures for initial authenticator\ndistribution, for lost/compromised or damaged authenticators,\
          \ and for revoking authenticators;\n  e.  Changing default content of authenticators prior to\
          \ information system installation;\n  f.  Establishing minimum and maximum lifetime restrictions\
          \ and reuse conditions\nfor authenticators;\n  g.  Changing/refreshing authenticators [Assignment:\
          \ organization-defined time\nperiod by authenticator type];\n  h.  Protecting authenticator\
          \ content from unauthorized disclosure and modification;\n  i.  Requiring individuals to take,\
          \ and having devices implement, specific security\nsafeguards to protect authenticators; and\n\
          \  j.  Changing authenticators for group/role accounts when membership to those\naccounts changes."
      controls:
      - id: ia-5.1
        title: Password-Based Authentication
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-5 (1)
        parts:
        - id: ia-5.1_smt
          name: statement
          prose: "The information system, for password-based authentication:\n   (1)(a).  Enforces minimum\
            \ password complexity of [Assignment: organization-defined\nrequirements for case sensitivity,\
            \ number of characters, mix of upper-case letters, lower-case letters, numbers, and special\
            \ characters, including minimum requirements for each type];\n   (1)(b).  Enforces at least\
            \ the following number of changed characters when\nnew passwords are created: [Assignment:\
            \ organization-defined number];\n   (1)(c).  Stores and transmits only cryptographically-protected\
            \ passwords;\n   (1)(d).  Enforces password minimum and maximum lifetime restrictions of [Assignment:\n\
            organization-defined numbers for lifetime minimum, lifetime maximum];\n   (1)(e).  Prohibits\
            \ password reuse for [Assignment: organization-defined number]\ngenerations; and\n   (1)(f).\
            \  Allows the use of a temporary password for system logons with an immediate\nchange to a\
            \ permanent password."
      - id: ia-5.2
        title: Pki-Based Authentication
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-5 (2)
        parts:
        - id: ia-5.2_smt
          name: statement
          prose: "The information system, for PKI-based authentication:\n   (2)(a).  Validates certifications\
            \ by constructing and verifying a certification\npath to an accepted trust anchor including\
            \ checking certificate status information;\n   (2)(b).  Enforces authorized access to the\
            \ corresponding private key;\n   (2)(c).  Maps the authenticated identity to the account of\
            \ the individual or\ngroup; and\n   (2)(d).  Implements a local cache of revocation data to\
            \ support path discovery\nand validation in case of inability to access revocation information\
            \ via the network."
      - id: ia-5.3
        title: In-Person Or Trusted Third-Party Registration
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-5 (3)
        parts:
        - id: ia-5.3_smt
          name: statement
          prose: 'The organization requires that the registration process to receive [Assignment: organization-defined
            types of and/or specific authenticators] be conducted [Selection: in person; by a trusted
            third party] before [Assignment: organization-defined registration authority] with authorization
            by [Assignment: organization-defined personnel or roles].'
      - id: ia-5.4
        title: Automated Support  For Password Strength Determination
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-5 (4)
        parts:
        - id: ia-5.4_smt
          name: statement
          prose: 'The organization employs automated tools to determine if password authenticators are
            sufficiently strong to satisfy [Assignment: organization-defined requirements].'

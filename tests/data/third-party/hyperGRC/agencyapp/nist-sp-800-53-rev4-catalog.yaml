      - id: sa-12.6
        title: Minimizing Procurement Time
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-12 (6)
        parts:
        - id: sa-12.6_smt
          name: statement
          prose: '[Withdrawn: Incorporated into SA-12 (1)].'
      - id: sa-12.7

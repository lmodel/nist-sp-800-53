      - id: ia-5.12
        title: Biometric-Based Authentication
        class: SP800-53-enhancement
        props:
        - name: label
          value: IA-5 (12)
        parts:
        - id: ia-5.12_smt
          name: statement
          prose: 'The information system, for biometric-based authentication, employs mechanisms that

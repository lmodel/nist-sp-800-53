        prose: "The organization manages information system identifiers by:\n  a.  Receiving authorization\
          \ from [Assignment: organization-defined personnel\nor roles] to assign an individual, group,\
          \ role, or device identifier;\n  b.  Selecting an identifier that identifies an individual,\
          \ group, role, or device;\n  c.  Assigning the identifier to the intended individual, group,\
          \ role, or device;\n  d.  Preventing reuse of identifiers for [Assignment: organization-defined\
          \ time\nperiod]; and\n  e.  Disabling the identifier after [Assignment: organization-defined\

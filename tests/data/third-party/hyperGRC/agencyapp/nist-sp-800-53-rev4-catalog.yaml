      - id: sa-12.8
        title: Use Of All-Source Intelligence
        class: SP800-53-enhancement
        props:
        - name: label
          value: SA-12 (8)
        parts:
        - id: sa-12.8_smt
          name: statement
          prose: The organization uses all-source intelligence analysis of suppliers and potential suppliers
